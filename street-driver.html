<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Retro top-down driving game on real streets. Type a US zip code and cruise the real road network rendered as chunky pixel art.">
<title>Street Cruiser — Drive Real Streets</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #10120f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #f0f0e8;
    overscroll-behavior: none; touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #app { position: fixed; inset: 0; }

  /* ---- pixel canvas ---- */
  #game {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #3a7d3a;
  }

  /* ---- screens ---- */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    z-index: 20;
  }
  .hidden { display: none !important; }

  #start { background: linear-gradient(160deg, #1b2a3a 0%, #0e1622 100%); }
  .title {
    font-size: clamp(2rem, 9vw, 3.6rem);
    font-weight: 900; letter-spacing: -0.02em; margin: 0 0 6px;
    color: #ffe14d;
    text-shadow: 3px 3px 0 #b8480f, 6px 6px 0 rgba(0,0,0,.35);
  }
  .subtitle { color: #9fb4c8; margin: 0 0 28px; font-size: clamp(.85rem,3.6vw,1.05rem); max-width: 30ch; }
  .ziprow { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; justify-content: center; }
  #zipInput {
    font-size: 1.6rem; font-weight: 800; letter-spacing: .35em;
    width: 6.5em; text-align: center; padding: 12px 10px;
    border: 3px solid #3d5870; border-radius: 12px;
    background: #0a1018; color: #ffe14d; outline: none;
    text-indent: .35em;
  }
  #zipInput:focus { border-color: #ffe14d; }
  .btn {
    font-size: 1.15rem; font-weight: 800; cursor: pointer;
    padding: 12px 26px; border: none; border-radius: 12px;
    background: #ffb524; color: #20140a;
    box-shadow: 0 4px 0 #b8480f; transition: transform .06s, box-shadow .06s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8480f; }
  .btn.ghost { background: #2a3b4d; color: #cfe0f0; box-shadow: 0 4px 0 #16222e; }
  #randomBtn { margin-top: 16px; font-size: .9rem; background:none; border:none; color:#7fa8d0; text-decoration:underline; cursor:pointer; }
  #zipError { color: #ff8a7a; min-height: 1.4em; margin: 14px 0 0; font-size: .95rem; font-weight: 600; max-width: 32ch; }
  .hint { color: #6f8499; font-size: .78rem; margin-top: 22px; max-width: 34ch; line-height: 1.5; }

  /* ---- loading ---- */
  #loading { background: #0e1622; gap: 18px; }
  .spinner {
    width: 54px; height: 54px; border-radius: 50%;
    border: 6px solid #2a3b4d; border-top-color: #ffe14d;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingText { color: #cfe0f0; font-weight: 700; font-size: 1.05rem; }
  #loadingSub { color: #6f8499; font-size: .82rem; margin-top: -8px; }

  /* ---- HUD ---- */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: max(10px, env(safe-area-inset-top)) 14px 0 max(14px, env(safe-area-inset-left));
    z-index: 15; pointer-events: none;
  }
  .hud-pill {
    background: rgba(8,14,22,.62); backdrop-filter: blur(3px);
    border: 2px solid rgba(255,255,255,.12); border-radius: 10px;
    padding: 7px 12px; font-weight: 700; font-size: .92rem;
    pointer-events: auto;
  }
  #locLabel { color: #ffe14d; max-width: 56vw; line-height: 1.25; }
  #speedLabel { color: #8fe08f; font-variant-numeric: tabular-nums; }
  #newZipBtn {
    pointer-events: auto; cursor: pointer;
    font-size: 1.4rem; line-height: 1; font-weight: 900;
    width: 44px; height: 44px; border-radius: 10px;
    background: rgba(8,14,22,.62); color: #fff; border: 2px solid rgba(255,255,255,.18);
  }
  .hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  /* ---- touch controls ---- */
  #controls { position: absolute; inset: 0; z-index: 14; pointer-events: none; }
  .pad {
    position: absolute; bottom: max(22px, env(safe-area-inset-bottom));
    display: flex; gap: 14px; pointer-events: none;
  }
  .pad.left  { left: max(18px, env(safe-area-inset-left)); }
  .pad.right { right: max(18px, env(safe-area-inset-right)); }
  .ctrl {
    pointer-events: auto; cursor: pointer;
    width: 78px; height: 78px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 900; color: #fff;
    background: rgba(20,28,38,.42);
    border: 3px solid rgba(255,255,255,.28);
    user-select: none; touch-action: none;
    transition: background .08s, transform .08s;
  }
  .ctrl.pressed { background: rgba(255,181,36,.72); color:#20140a; transform: scale(.93); }
  .ctrl.gas { background: rgba(60,200,90,.30); }
  .ctrl.gas.pressed { background: rgba(60,220,90,.8); }
  .ctrl.brake { background: rgba(220,70,60,.28); }
  .ctrl.brake.pressed { background: rgba(240,70,60,.8); }

  @media (max-height: 380px) { .ctrl { width: 66px; height: 66px; font-size: 1.6rem; } }

  .credit { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); color:#46586a; font-size:.68rem; pointer-events:none; }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <!-- HUD (game) -->
  <div id="hud" class="hidden">
    <div id="locLabel" class="hud-pill">Driving…</div>
    <div class="hud-right">
      <button id="newZipBtn" title="New zip code" aria-label="Enter a new zip code">↻</button>
      <div id="speedLabel" class="hud-pill">0 mph</div>
    </div>
  </div>

  <!-- Touch controls (game) -->
  <div id="controls" class="hidden">
    <div class="pad left">
      <div class="ctrl steer" data-key="left" aria-label="Steer left">◀</div>
      <div class="ctrl steer" data-key="right" aria-label="Steer right">▶</div>
    </div>
    <div class="pad right">
      <div class="ctrl brake" data-key="brake" aria-label="Brake / reverse">▼</div>
      <div class="ctrl gas" data-key="gas" aria-label="Gas">▲</div>
    </div>
  </div>

  <!-- Start screen -->
  <div id="start" class="screen">
    <h1 class="title">STREET CRUISER</h1>
    <p class="subtitle">Type a US zip code and cruise its real streets in chunky pixel art.</p>
    <div class="ziprow">
      <input id="zipInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="5"
             placeholder="90210" autocomplete="off" aria-label="US zip code">
      <button id="driveBtn" class="btn">Drive</button>
    </div>
    <p id="zipError" role="alert"></p>
    <button id="randomBtn">🎲 Surprise me with a random spot</button>
    <p class="hint">Tip: turn your phone landscape. Use the on-screen buttons, or Arrow keys / WASD on a keyboard.</p>
  </div>

  <!-- Loading screen -->
  <div id="loading" class="screen hidden">
    <div class="spinner"></div>
    <div id="loadingText">Loading streets…</div>
    <div id="loadingSub"></div>
  </div>

  <div class="credit">Map data © OpenStreetMap contributors</div>
</div>

<script>
"use strict";
(function () {
  // ============================================================
  //  Constants & palette
  // ============================================================
  const RENDER_RADIUS = 800;      // meters fetched from Overpass
  const VW = 480, VH = 270;       // internal pixel resolution (16:9-ish)
  const PAL = {
    grass:    "#3f8a3a",
    grassDk:  "#367731",
    asphalt:  "#52555c",
    asphaltLt:"#5e626a",
    casing:   "#34363b",
    marking:  "#e8e4cf",
    carBody:  "#e23b3b",
    carBody2: "#2f6fe0",
    carRoof:  "#1c1c22",
    carWind:  "#bfe8ff",
    shadow:   "rgba(0,0,0,0.28)",
  };

  // Road width (in meters) + whether it gets a dashed center line, per highway class.
  const ROAD_STYLE = {
    motorway:      { w: 16, dash: true },
    trunk:         { w: 14, dash: true },
    primary:       { w: 12, dash: true },
    secondary:     { w: 10, dash: true },
    tertiary:      { w: 9,  dash: false },
    residential:   { w: 7,  dash: false },
    unclassified:  { w: 7,  dash: false },
    living_street: { w: 6,  dash: false },
    service:       { w: 5,  dash: false },
    _default:      { w: 7,  dash: false },
  };

  const RANDOM_ZIPS = [
    "90210","10001","94103","60601","02108","98101","33139","78701",
    "80202","30303","19103","37203","70130","85004","97201","20001",
    "48226","53703","04101","89101","87501","59801","83702","57104",
  ];

  // ============================================================
  //  DOM refs
  // ============================================================
  const $ = (id) => document.getElementById(id);
  const canvas = $("game");
  const ctx = canvas.getContext("2d");
  const screens = { start: $("start"), loading: $("loading") };
  const hud = $("hud"), controls = $("controls");
  const zipInput = $("zipInput"), zipError = $("zipError");
  const locLabel = $("locLabel"), speedLabel = $("speedLabel");
  const loadingSub = $("loadingSub");

  // ============================================================
  //  Game state
  // ============================================================
  let state = "start";       // start | loading | game
  let roads = [];            // [{ pts:[{x,y}], style }]
  let bounds = null;
  let car = null;            // { x, y, heading, speed }
  let lastT = 0, rafId = 0;
  let busy = false;          // request debounce

  const input = { left:false, right:false, gas:false, brake:false };

  // ============================================================
  //  Screen / state machine
  // ============================================================
  function show(s) {
    state = s;
    screens.start.classList.toggle("hidden", s !== "start");
    screens.loading.classList.toggle("hidden", s !== "loading");
    hud.classList.toggle("hidden", s !== "game");
    controls.classList.toggle("hidden", s !== "game");
    if (s === "game") canvas.style.background = PAL.grass;
  }

  // ============================================================
  //  Canvas sizing (internal low-res buffer, CSS upscales it)
  // ============================================================
  function resize() {
    // Keep a fixed low internal resolution; CSS stretches to viewport.
    // We pick internal dims matching the screen aspect to avoid distortion.
    const ar = window.innerWidth / window.innerHeight;
    let w = VW, h = Math.round(VW / ar);
    if (h < 180) { h = 180; w = Math.round(h * ar); }
    if (h > 360) { h = 360; w = Math.round(h * ar); }
    canvas.width = w; canvas.height = h;
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener("resize", resize);
  resize();

  // ============================================================
  //  Networking: geocode + roads
  // ============================================================
  async function geocodeZip(zip) {
    const res = await fetch("https://api.zippopotam.us/us/" + encodeURIComponent(zip));
    if (!res.ok) throw new Error("zip-not-found");
    const data = await res.json();
    const p = data.places && data.places[0];
    if (!p) throw new Error("zip-not-found");
    return {
      lat: parseFloat(p.latitude),
      lon: parseFloat(p.longitude),
      city: p["place name"],
      state: p["state abbreviation"],
    };
  }

  function overpassQuery(lat, lon, radius) {
    return `[out:json][timeout:25];
way["highway"~"motorway|trunk|primary|secondary|tertiary|residential|unclassified|living_street|service"](around:${radius},${lat},${lon});
out geom;`;
  }

  async function fetchRoads(lat, lon, radius) {
    const body = "data=" + encodeURIComponent(overpassQuery(lat, lon, radius));
    const endpoints = [
      "https://overpass-api.de/api/interpreter",
      "https://overpass.kumi.systems/api/interpreter",
    ];
    let lastErr;
    for (const url of endpoints) {
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
        });
        if (!res.ok) throw new Error("overpass-http-" + res.status);
        const data = await res.json();
        return data.elements || [];
      } catch (e) {
        lastErr = e;
        loadingSub.textContent = "Primary server busy, trying a mirror…";
      }
    }
    throw lastErr || new Error("overpass-failed");
  }

  // ============================================================
  //  Projection: lat/lon -> local meters (equirectangular)
  // ============================================================
  function buildWorld(elements, lat0, lon0) {
    const cosLat = Math.cos(lat0 * Math.PI / 180);
    const project = (lat, lon) => ({
      x: (lon - lon0) * cosLat * 111320,
      y: -(lat - lat0) * 110540,   // negate so north is up
    });

    const out = [];
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

    for (const el of elements) {
      if (el.type !== "way" || !el.geometry || el.geometry.length < 2) continue;
      const cls = el.tags && el.tags.highway;
      const style = ROAD_STYLE[cls] || ROAD_STYLE._default;
      const pts = el.geometry.map((g) => {
        const p = project(g.lat, g.lon);
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
        return p;
      });
      out.push({ pts, style });
    }
    roads = out;
    bounds = { minX, minY, maxX, maxY };
    return out.length;
  }

  // Snap spawn to nearest road vertex to centroid (0,0), face along that road.
  function spawnCar() {
    let best = null, bestD = Infinity, bestRoad = null, bestIdx = 0;
    for (const r of roads) {
      for (let i = 0; i < r.pts.length; i++) {
        const p = r.pts[i];
        const d = p.x * p.x + p.y * p.y;
        if (d < bestD) { bestD = d; best = p; bestRoad = r; bestIdx = i; }
      }
    }
    if (!best) { car = { x: 0, y: 0, heading: 0, speed: 0 }; return; }
    // heading: toward the next point along the road (or previous if at the end)
    const pts = bestRoad.pts;
    const a = pts[bestIdx];
    const b = pts[bestIdx + 1] || pts[bestIdx - 1] || a;
    let heading = Math.atan2(b.y - a.y, b.x - a.x);
    if (b === pts[bestIdx - 1]) heading += Math.PI; // flip if we used the previous point
    car = { x: best.x, y: best.y, heading, speed: 0 };
  }

  // ============================================================
  //  Main "drive here" flow
  // ============================================================
  async function startDrive(zip, radius) {
    if (busy) return;
    zip = (zip || "").trim();
    if (!/^\d{5}$/.test(zip)) {
      zipError.textContent = "Please enter a valid 5-digit US zip code.";
      return;
    }
    busy = true; zipError.textContent = "";
    show("loading");
    $("loadingText").textContent = "Finding " + zip + "…";
    loadingSub.textContent = "";

    let place;
    try {
      place = await geocodeZip(zip);
    } catch (e) {
      busy = false; show("start");
      zipError.textContent = "Hmm, couldn't find zip " + zip + ". Try another.";
      return;
    }

    $("loadingText").textContent = "Loading streets…";
    loadingSub.textContent = place.city + ", " + place.state;

    let elements;
    try {
      elements = await fetchRoads(place.lat, place.lon, radius || RENDER_RADIUS);
    } catch (e) {
      busy = false; show("start");
      zipError.textContent = "The map server is busy right now. Please try again in a moment.";
      return;
    }

    const n = buildWorld(elements, place.lat, place.lon);
    if (n === 0) {
      busy = false; show("start");
      const bigger = (radius || RENDER_RADIUS) < 2000;
      zipError.textContent = "No roads found near " + place.city + "." +
        (bigger ? " That area is pretty rural." : "");
      if (bigger) {
        // offer a one-tap retry with a larger radius
        zipError.textContent += " Tap Drive again to search a wider area.";
        pendingWideZip = zip;
      }
      return;
    }
    pendingWideZip = null;

    spawnCar();
    locLabel.textContent = "Driving in " + place.city + ", " + place.state;
    busy = false;
    show("game");
    lastT = performance.now();
  }
  let pendingWideZip = null;

  // ============================================================
  //  Physics
  // ============================================================
  const MAX_SPEED = 95;       // world units (~m) per second forward
  const MAX_REV = 28;
  const ACCEL = 70;
  const BRAKE = 120;
  const FRICTION = 26;
  const TURN_RATE = 2.6;      // radians/sec at full effectiveness

  function updatePhysics(dt) {
    if (!car) return;

    // throttle / brake
    if (input.gas) {
      car.speed += ACCEL * dt;
    } else if (input.brake) {
      car.speed -= BRAKE * dt;
    } else {
      // friction decays toward zero
      const f = FRICTION * dt;
      if (car.speed > 0) car.speed = Math.max(0, car.speed - f);
      else if (car.speed < 0) car.speed = Math.min(0, car.speed + f);
    }
    car.speed = Math.max(-MAX_REV, Math.min(MAX_SPEED, car.speed));

    // steering: turn rate scales with speed (no turn at standstill)
    const speedFrac = Math.min(1, Math.abs(car.speed) / 35);
    const dir = car.speed >= 0 ? 1 : -1; // reverse inverts steering
    let steer = 0;
    if (input.left) steer -= 1;
    if (input.right) steer += 1;
    car.heading += steer * TURN_RATE * speedFrac * dir * dt;

    // move
    let vx = Math.cos(car.heading) * car.speed;
    let vy = Math.sin(car.heading) * car.speed;
    let nx = car.x + vx * dt;
    let ny = car.y + vy * dt;

    // off-road slowdown (slight): if far from any road, sap speed
    if (Math.abs(car.speed) > 4 && isOffRoad(nx, ny)) {
      const drag = 55 * dt;
      if (car.speed > 0) car.speed = Math.max(0, car.speed - drag);
      else car.speed = Math.min(0, car.speed + drag);
    }
    car.x = nx; car.y = ny;
  }

  // Coarse off-road test: distance to nearest road segment (sampled, cheap).
  // Only checks roads whose bounding interest is near the car for speed.
  function isOffRoad(x, y) {
    let minDist2 = Infinity;
    const R = 30; // only consider points within ~30m for the check window
    for (const r of roads) {
      const pts = r.pts;
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b = pts[i + 1];
        // quick reject
        if (Math.abs(a.x - x) > R && Math.abs(b.x - x) > R) continue;
        if (Math.abs(a.y - y) > R && Math.abs(b.y - y) > R) continue;
        const d2 = distToSeg2(x, y, a.x, a.y, b.x, b.y);
        if (d2 < minDist2) minDist2 = d2;
        if (minDist2 < 64) return false; // within ~8m of road centerline
      }
    }
    return minDist2 > 100; // >10m from any road = off-road
  }

  function distToSeg2(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) { const ex = px - ax, ey = py - ay; return ex*ex + ey*ey; }
    let t = ((px - ax) * dx + (py - ay) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t * dx, cy = ay + t * dy;
    const ex = px - cx, ey = py - cy;
    return ex * ex + ey * ey;
  }

  // ============================================================
  //  Rendering (north-up, camera centered on car)
  // ============================================================
  function render() {
    const W = canvas.width, H = canvas.height;
    // ground
    ctx.fillStyle = PAL.grass;
    ctx.fillRect(0, 0, W, H);
    // subtle grass texture (cheap dithered darker patches via static pattern)
    drawGrassTexture(W, H);

    if (!car) return;
    const camX = car.x, camY = car.y;
    const ox = W / 2 - camX, oy = H / 2 - camY; // world -> screen offset

    // Cull: only draw roads near the viewport.
    const margin = 40;
    const viewMinX = camX - W/2 - margin, viewMaxX = camX + W/2 + margin;
    const viewMinY = camY - H/2 - margin, viewMaxY = camY + H/2 + margin;

    const visible = [];
    for (const r of roads) {
      // bounding check
      let bx0=Infinity,by0=Infinity,bx1=-Infinity,by1=-Infinity;
      for (const p of r.pts) {
        if(p.x<bx0)bx0=p.x; if(p.x>bx1)bx1=p.x;
        if(p.y<by0)by0=p.y; if(p.y>by1)by1=p.y;
      }
      if (bx1 < viewMinX || bx0 > viewMaxX || by1 < viewMinY || by0 > viewMaxY) continue;
      visible.push(r);
    }

    ctx.lineJoin = "round";
    ctx.lineCap = "round";

    // 1) road casing (outline) — draw all roads slightly wider & darker
    for (const r of visible) {
      strokeRoad(r, ox, oy, r.style.w + 2.5, PAL.casing);
    }
    // 2) asphalt fill
    for (const r of visible) {
      strokeRoad(r, ox, oy, r.style.w, PAL.asphalt);
    }
    // 3) dashed center lines on larger roads
    ctx.save();
    ctx.setLineDash([6, 7]);
    ctx.strokeStyle = PAL.marking;
    ctx.lineWidth = 1;
    for (const r of visible) {
      if (!r.style.dash) continue;
      ctx.beginPath();
      const pts = r.pts;
      ctx.moveTo(pts[0].x + ox, pts[0].y + oy);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x + ox, pts[i].y + oy);
      ctx.stroke();
    }
    ctx.restore();

    // 4) car
    drawCar(W / 2, H / 2, car.heading);
  }

  function strokeRoad(r, ox, oy, width, color) {
    const pts = r.pts;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(pts[0].x + ox, pts[0].y + oy);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x + ox, pts[i].y + oy);
    ctx.stroke();
  }

  // Sparse darker grass tufts on a fixed world grid, scrolling with the camera
  // so the ground reads as moving while you drive.
  function drawGrassTexture(W, H) {
    ctx.fillStyle = PAL.grassDk;
    const cam = car || { x: 0, y: 0 };
    const G = 18;
    // world-space index of the tuft nearest the top-left of the screen
    const startGX = Math.floor((cam.x - W / 2) / G);
    const startGY = Math.floor((cam.y - H / 2) / G);
    const offX = W / 2 - cam.x;
    const offY = H / 2 - cam.y;
    for (let gx = startGX - 1; gx <= startGX + Math.ceil(W / G) + 1; gx++) {
      for (let gy = startGY - 1; gy <= startGY + Math.ceil(H / G) + 1; gy++) {
        // deterministic pseudo-random selection per world cell
        if ((((gx * 7) ^ (gy * 13)) & 7) === 0) {
          ctx.fillRect(Math.round(gx * G + offX), Math.round(gy * G + offY), 3, 3);
        }
      }
    }
  }

  function drawCar(cx, cy, heading) {
    ctx.save();
    ctx.translate(cx, cy);
    // sprite drawn pointing +x (east); rotate by heading so it faces travel dir
    ctx.rotate(heading);
    // shadow
    ctx.fillStyle = PAL.shadow;
    ctx.fillRect(-7, -4, 16, 9);
    // body (length along x, width along y)
    ctx.fillStyle = PAL.carBody;
    ctx.fillRect(-8, -5, 16, 10);
    // nose highlight
    ctx.fillStyle = "#ff6b6b";
    ctx.fillRect(5, -5, 3, 10);
    // roof
    ctx.fillStyle = PAL.carRoof;
    ctx.fillRect(-4, -4, 8, 8);
    // windshield (front)
    ctx.fillStyle = PAL.carWind;
    ctx.fillRect(2, -3, 2, 6);
    // rear window
    ctx.fillStyle = "#7fb8d8";
    ctx.fillRect(-4, -3, 2, 6);
    ctx.restore();
  }

  // ============================================================
  //  Game loop
  // ============================================================
  function loop(t) {
    rafId = requestAnimationFrame(loop);
    let dt = (t - lastT) / 1000;
    lastT = t;
    if (dt > 0.05) dt = 0.05; // clamp big frame gaps
    if (state === "game") {
      updatePhysics(dt);
      render();
      // HUD speed: convert world m/s to mph (1 m/s = 2.23694 mph), scaled for arcade feel
      const mph = Math.round(Math.abs(car.speed) * 2.0);
      speedLabel.textContent = (car.speed < -1 ? "R " : "") + mph + " mph";
    }
  }
  requestAnimationFrame(loop);

  // ============================================================
  //  Input: keyboard
  // ============================================================
  const KEYMAP = {
    ArrowLeft:"left", a:"left", A:"left",
    ArrowRight:"right", d:"right", D:"right",
    ArrowUp:"gas", w:"gas", W:"gas",
    ArrowDown:"brake", s:"brake", S:"brake",
  };
  window.addEventListener("keydown", (e) => {
    if (state !== "game") return;
    const k = KEYMAP[e.key];
    if (k) { input[k] = true; e.preventDefault(); }
  });
  window.addEventListener("keyup", (e) => {
    const k = KEYMAP[e.key];
    if (k) { input[k] = false; e.preventDefault(); }
  });

  // ============================================================
  //  Input: touch / pointer (multitouch hold-to-press)
  // ============================================================
  document.querySelectorAll(".ctrl").forEach((el) => {
    const key = el.dataset.key;
    const press = (e) => {
      e.preventDefault();
      input[key] = true; el.classList.add("pressed");
    };
    const release = (e) => {
      e.preventDefault();
      input[key] = false; el.classList.remove("pressed");
    };
    el.addEventListener("pointerdown", press);
    el.addEventListener("pointerup", release);
    el.addEventListener("pointercancel", release);
    el.addEventListener("pointerleave", release);
    // if a pointer is captured then dragged off, also release on lostpointercapture
    el.addEventListener("lostpointercapture", release);
    el.addEventListener("pointerdown", (e) => {
      try { el.setPointerCapture(e.pointerId); } catch (_) {}
    });
  });

  // ============================================================
  //  Start-screen wiring
  // ============================================================
  function handleDrive() {
    const zip = zipInput.value.trim();
    if (pendingWideZip && zip === pendingWideZip) {
      startDrive(zip, 2000); // wider radius retry
    } else {
      startDrive(zip, RENDER_RADIUS);
    }
  }
  $("driveBtn").addEventListener("click", handleDrive);
  zipInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleDrive(); });
  zipInput.addEventListener("input", () => {
    zipInput.value = zipInput.value.replace(/\D/g, "").slice(0, 5);
    zipError.textContent = "";
    pendingWideZip = null;
  });
  $("randomBtn").addEventListener("click", () => {
    const z = RANDOM_ZIPS[Math.floor(Math.random() * RANDOM_ZIPS.length)];
    zipInput.value = z;
    handleDrive();
  });
  $("newZipBtn").addEventListener("click", () => {
    // reset inputs and return to start
    for (const k in input) input[k] = false;
    document.querySelectorAll(".ctrl").forEach(el => el.classList.remove("pressed"));
    show("start");
    zipInput.focus();
  });

  // boot
  show("start");
})();
</script>
</body>
</html>
