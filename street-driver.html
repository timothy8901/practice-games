<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Retro top-down driving game on real streets. Type a US zip code and cruise the real road network rendered as chunky pixel art.">
<title>Street Cruiser — Drive Real Streets</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #10120f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #f0f0e8;
    overscroll-behavior: none; touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #app { position: fixed; inset: 0; }

  /* ---- pixel canvas ---- */
  #game {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #3a7d3a;
  }

  /* ---- screens ---- */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 24px;
    z-index: 20;
  }
  .hidden { display: none !important; }

  #start { background: linear-gradient(160deg, #1b2a3a 0%, #0e1622 100%); overflow-y: auto; }
  .title {
    font-size: clamp(2rem, 9vw, 3.6rem);
    font-weight: 900; letter-spacing: -0.02em; margin: 0 0 6px;
    color: #ffe14d;
    text-shadow: 3px 3px 0 #b8480f, 6px 6px 0 rgba(0,0,0,.35);
  }
  .subtitle { color: #9fb4c8; margin: 0 0 24px; font-size: clamp(.85rem,3.6vw,1.05rem); max-width: 30ch; }
  .ziprow { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; justify-content: center; }
  #zipInput {
    font-size: 1.6rem; font-weight: 800; letter-spacing: .35em;
    width: 6.5em; text-align: center; padding: 12px 10px;
    border: 3px solid #3d5870; border-radius: 12px;
    background: #0a1018; color: #ffe14d; outline: none;
    text-indent: .35em;
  }
  #zipInput:focus { border-color: #ffe14d; }
  .btn {
    font-size: 1.15rem; font-weight: 800; cursor: pointer;
    padding: 12px 26px; border: none; border-radius: 12px;
    background: #ffb524; color: #20140a;
    box-shadow: 0 4px 0 #b8480f; transition: transform .06s, box-shadow .06s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b8480f; }
  #randomBtn { margin-top: 14px; font-size: .9rem; background:none; border:none; color:#7fa8d0; text-decoration:underline; cursor:pointer; }
  #zipError { color: #ff8a7a; min-height: 1.4em; margin: 12px 0 0; font-size: .95rem; font-weight: 600; max-width: 32ch; }
  .hint { color: #6f8499; font-size: .78rem; margin-top: 18px; max-width: 34ch; line-height: 1.5; }

  /* ---- car picker (start screen) ---- */
  .picker-label { color:#7fa8d0; font-size:.74rem; text-transform:uppercase; letter-spacing:.14em; margin: 22px 0 8px; }
  .carpick { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .swatch {
    width:54px; height:36px; border-radius:7px; cursor:pointer;
    border:3px solid rgba(255,255,255,.15); position:relative; overflow:hidden;
    transition: transform .08s, border-color .08s;
  }
  .swatch:active { transform: scale(.93); }
  .swatch.sel { border-color:#ffe14d; }
  .swatch .roof { position:absolute; left:30%; top:22%; width:40%; height:56%; border-radius:3px; }
  .swatch .glass { position:absolute; left:34%; top:30%; width:14%; height:40%; background:#bfe8ff; border-radius:1px; }

  /* ---- loading ---- */
  #loading { background: #0e1622; gap: 18px; }
  .spinner {
    width: 54px; height: 54px; border-radius: 50%;
    border: 6px solid #2a3b4d; border-top-color: #ffe14d;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingText { color: #cfe0f0; font-weight: 700; font-size: 1.05rem; }
  #loadingSub { color: #6f8499; font-size: .82rem; margin-top: -8px; }

  /* ---- HUD ---- */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: max(10px, env(safe-area-inset-top)) 14px 0 max(14px, env(safe-area-inset-left));
    z-index: 15; pointer-events: none;
  }
  .hud-pill {
    background: rgba(8,14,22,.62); backdrop-filter: blur(3px);
    border: 2px solid rgba(255,255,255,.12); border-radius: 10px;
    padding: 7px 12px; font-weight: 700; font-size: .92rem;
    pointer-events: auto;
  }
  #locLabel { color: #ffe14d; max-width: 52vw; line-height: 1.25; }
  #speedLabel { color: #8fe08f; font-variant-numeric: tabular-nums; }
  .hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .btn-row { display:flex; gap:8px; }
  .icon-btn {
    pointer-events: auto; cursor: pointer;
    font-size: 1.25rem; line-height: 1; font-weight: 900;
    width: 44px; height: 44px; border-radius: 10px;
    background: rgba(8,14,22,.62); color: #fff; border: 2px solid rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center;
  }
  #miniMap {
    pointer-events:auto;
    width: 92px; height: 92px;
    image-rendering: pixelated; image-rendering: crisp-edges;
    border: 2px solid rgba(255,255,255,.18); border-radius: 8px;
    background: rgba(8,14,22,.55);
  }

  /* ---- touch controls ---- */
  #controls { position: absolute; inset: 0; z-index: 14; pointer-events: none; }
  .pad {
    position: absolute; bottom: max(22px, env(safe-area-inset-bottom));
    display: flex; gap: 14px; pointer-events: none;
  }
  .pad.left  { left: max(18px, env(safe-area-inset-left)); }
  .pad.right { right: max(18px, env(safe-area-inset-right)); }
  .ctrl {
    pointer-events: auto; cursor: pointer;
    width: 78px; height: 78px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 900; color: #fff;
    background: rgba(20,28,38,.42);
    border: 3px solid rgba(255,255,255,.28);
    user-select: none; touch-action: none;
    transition: background .08s, transform .08s;
  }
  .ctrl.pressed { background: rgba(255,181,36,.72); color:#20140a; transform: scale(.93); }
  .ctrl.gas { background: rgba(60,200,90,.30); }
  .ctrl.gas.pressed { background: rgba(60,220,90,.8); }
  .ctrl.brake { background: rgba(220,70,60,.28); }
  .ctrl.brake.pressed { background: rgba(240,70,60,.8); }

  @media (max-height: 380px) { .ctrl { width: 66px; height: 66px; font-size: 1.6rem; } #miniMap { width:78px; height:78px; } }

  .credit { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); color:#46586a; font-size:.68rem; pointer-events:none; z-index:13; }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <!-- HUD (game) -->
  <div id="hud" class="hidden">
    <div id="locLabel" class="hud-pill">Driving…</div>
    <div class="hud-right">
      <div class="btn-row">
        <button id="dayNightBtn" class="icon-btn" title="Toggle day / night" aria-label="Toggle day or night">🌙</button>
        <button id="muteBtn" class="icon-btn" title="Mute / unmute" aria-label="Mute or unmute sound">🔊</button>
        <button id="newZipBtn" class="icon-btn" title="New zip code" aria-label="Enter a new zip code">↻</button>
      </div>
      <div id="speedLabel" class="hud-pill">0 mph</div>
      <canvas id="miniMap" width="92" height="92" aria-label="Minimap"></canvas>
    </div>
  </div>

  <!-- Touch controls (game) -->
  <div id="controls" class="hidden">
    <div class="pad left">
      <div class="ctrl steer" data-key="left" aria-label="Steer left">◀</div>
      <div class="ctrl steer" data-key="right" aria-label="Steer right">▶</div>
    </div>
    <div class="pad right">
      <div class="ctrl brake" data-key="brake" aria-label="Brake / reverse">▼</div>
      <div class="ctrl gas" data-key="gas" aria-label="Gas">▲</div>
    </div>
  </div>

  <!-- Start screen -->
  <div id="start" class="screen">
    <h1 class="title">STREET CRUISER</h1>
    <p class="subtitle">Type a US zip code and cruise its real streets in chunky pixel art.</p>
    <div class="ziprow">
      <input id="zipInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="5"
             placeholder="90210" autocomplete="off" aria-label="US zip code">
      <button id="driveBtn" class="btn">Drive</button>
    </div>
    <p id="zipError" role="alert"></p>
    <button id="randomBtn">🎲 Surprise me with a random spot</button>

    <p class="picker-label">Pick your ride</p>
    <div class="carpick" id="carPick"></div>

    <p class="hint">Tip: turn your phone landscape. Use the on-screen buttons, or Arrow keys / WASD on a keyboard.</p>
  </div>

  <!-- Loading screen -->
  <div id="loading" class="screen hidden">
    <div class="spinner"></div>
    <div id="loadingText">Loading streets…</div>
    <div id="loadingSub"></div>
  </div>

  <div class="credit">Map data © OpenStreetMap contributors</div>
</div>

<script>
"use strict";
(function () {
  // ============================================================
  //  Constants & palettes
  // ============================================================
  const RENDER_RADIUS = 800;      // meters fetched from Overpass
  const VW = 480;                 // base internal pixel width (height derives from aspect)

  // Day / night palettes. `PAL` points at the active one.
  const PALS = {
    day: {
      grass:"#3f8a3a", grassDk:"#367731",
      asphalt:"#52555c", casing:"#34363b", marking:"#e8e4cf",
      building:"#b9a98c", buildingCasing:"#6d6253", buildingRoof:"#a89578",
      miniBg:"#24402a", miniRoad:"#9aa0a8", miniBldg:"#7a6e58", miniCar:"#ffe14d",
      vignette:0,
    },
    night: {
      grass:"#1f3a24", grassDk:"#1a3020",
      asphalt:"#2c2f36", casing:"#16181d", marking:"#c9b66b",
      building:"#2a2740", buildingCasing:"#14121f", buildingRoof:"#34315010",
      miniBg:"#0e1a12", miniRoad:"#566", miniBldg:"#3a3654", miniCar:"#ffe14d",
      vignette:0.8,
    },
  };
  let mode = "day";
  let PAL = PALS.day;

  // Car designs (procedural, no assets). body/trim/roof colors.
  const CAR_DESIGNS = [
    { name:"Crimson", body:"#e23b3b", trim:"#ff7a7a", roof:"#201013" },
    { name:"Azure",   body:"#2f6fe0", trim:"#6aa6ff", roof:"#0f1320" },
    { name:"Lime",    body:"#54c23a", trim:"#9bee78", roof:"#142312" },
    { name:"Gold",    body:"#f0b429", trim:"#ffd861", roof:"#241a05" },
  ];
  let carDesign = CAR_DESIGNS[0];

  // Road width (in meters) + whether it gets a dashed center line, per highway class.
  const ROAD_STYLE = {
    motorway:      { w: 16, dash: true },
    trunk:         { w: 14, dash: true },
    primary:       { w: 12, dash: true },
    secondary:     { w: 10, dash: true },
    tertiary:      { w: 9,  dash: false },
    residential:   { w: 7,  dash: false },
    unclassified:  { w: 7,  dash: false },
    living_street: { w: 6,  dash: false },
    service:       { w: 5,  dash: false },
    _default:      { w: 7,  dash: false },
  };

  const RANDOM_ZIPS = [
    "90210","10001","94103","60601","02108","98101","33139","78701",
    "80202","30303","19103","37203","70130","85004","97201","20001",
    "48226","53703","04101","89101","87501","59801","83702","57104",
  ];

  // ============================================================
  //  DOM refs
  // ============================================================
  const $ = (id) => document.getElementById(id);
  const canvas = $("game");
  const ctx = canvas.getContext("2d");
  const screens = { start: $("start"), loading: $("loading") };
  const hud = $("hud"), controls = $("controls");
  const zipInput = $("zipInput"), zipError = $("zipError");
  const locLabel = $("locLabel"), speedLabel = $("speedLabel");
  const loadingSub = $("loadingSub");
  const miniMap = $("miniMap"), miniCtx = miniMap.getContext("2d");

  // ============================================================
  //  Game state
  // ============================================================
  let state = "start";       // start | loading | game
  let roads = [];            // [{ pts, style, bbox }]
  let buildings = [];        // [{ pts, bbox }]
  let bounds = null;
  let car = null;            // { x, y, heading, speed }
  let lastT = 0;
  let busy = false;          // request debounce
  let pendingWideZip = null;

  const input = { left:false, right:false, gas:false, brake:false };

  // ============================================================
  //  Screen / state machine
  // ============================================================
  function show(s) {
    state = s;
    screens.start.classList.toggle("hidden", s !== "start");
    screens.loading.classList.toggle("hidden", s !== "loading");
    hud.classList.toggle("hidden", s !== "game");
    controls.classList.toggle("hidden", s !== "game");
    if (s === "game") canvas.style.background = PAL.grass;
  }

  // ============================================================
  //  Canvas sizing (internal low-res buffer, CSS upscales it)
  // ============================================================
  function resize() {
    const ar = window.innerWidth / window.innerHeight;
    let w = VW, h = Math.round(VW / ar);
    if (h < 180) { h = 180; w = Math.round(h * ar); }
    if (h > 360) { h = 360; w = Math.round(h * ar); }
    canvas.width = w; canvas.height = h;
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener("resize", resize);
  resize();

  // ============================================================
  //  Networking: geocode + map data
  // ============================================================
  async function geocodeZip(zip) {
    const res = await fetch("https://api.zippopotam.us/us/" + encodeURIComponent(zip));
    if (!res.ok) throw new Error("zip-not-found");
    const data = await res.json();
    const p = data.places && data.places[0];
    if (!p) throw new Error("zip-not-found");
    return {
      lat: parseFloat(p.latitude),
      lon: parseFloat(p.longitude),
      city: p["place name"],
      state: p["state abbreviation"],
    };
  }

  function overpassQuery(lat, lon, radius) {
    // Roads + building footprints in one request.
    return `[out:json][timeout:25];
(
  way["highway"~"motorway|trunk|primary|secondary|tertiary|residential|unclassified|living_street|service"](around:${radius},${lat},${lon});
  way["building"](around:${radius},${lat},${lon});
);
out geom;`;
  }

  async function fetchMapData(lat, lon, radius) {
    const body = "data=" + encodeURIComponent(overpassQuery(lat, lon, radius));
    const endpoints = [
      "https://overpass-api.de/api/interpreter",
      "https://overpass.kumi.systems/api/interpreter",
    ];
    let lastErr;
    for (const url of endpoints) {
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
        });
        if (!res.ok) throw new Error("overpass-http-" + res.status);
        const data = await res.json();
        return data.elements || [];
      } catch (e) {
        lastErr = e;
        loadingSub.textContent = "Primary server busy, trying a mirror…";
      }
    }
    throw lastErr || new Error("overpass-failed");
  }

  // ============================================================
  //  Projection: lat/lon -> local meters (equirectangular)
  // ============================================================
  function bboxOf(pts) {
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    for (const p of pts) {
      if(p.x<x0)x0=p.x; if(p.x>x1)x1=p.x;
      if(p.y<y0)y0=p.y; if(p.y>y1)y1=p.y;
    }
    return { x0, y0, x1, y1 };
  }

  function buildWorld(elements, lat0, lon0) {
    const cosLat = Math.cos(lat0 * Math.PI / 180);
    const project = (lat, lon) => ({
      x: (lon - lon0) * cosLat * 111320,
      y: -(lat - lat0) * 110540,   // negate so north is up
    });

    roads = []; buildings = [];
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    const swallow = (b) => {
      if (b.x0 < minX) minX = b.x0; if (b.x1 > maxX) maxX = b.x1;
      if (b.y0 < minY) minY = b.y0; if (b.y1 > maxY) maxY = b.y1;
    };

    for (const el of elements) {
      if (el.type !== "way" || !el.geometry || el.geometry.length < 2) continue;
      const tags = el.tags || {};
      const pts = el.geometry.map((g) => project(g.lat, g.lon));
      const bbox = bboxOf(pts);
      if (tags.highway) {
        const style = ROAD_STYLE[tags.highway] || ROAD_STYLE._default;
        roads.push({ pts, style, bbox });
        swallow(bbox);
      } else if (tags.building) {
        // need at least a triangle to be a footprint
        if (pts.length >= 3) { buildings.push({ pts, bbox }); swallow(bbox); }
      }
    }
    bounds = { minX, minY, maxX, maxY };
    buildMinimap();
    return roads.length;
  }

  // Snap spawn to nearest road vertex to centroid (0,0), face along that road.
  function spawnCar() {
    let best = null, bestD = Infinity, bestRoad = null, bestIdx = 0;
    for (const r of roads) {
      for (let i = 0; i < r.pts.length; i++) {
        const p = r.pts[i];
        const d = p.x * p.x + p.y * p.y;
        if (d < bestD) { bestD = d; best = p; bestRoad = r; bestIdx = i; }
      }
    }
    if (!best) { car = { x: 0, y: 0, heading: 0, speed: 0 }; return; }
    const pts = bestRoad.pts;
    const a = pts[bestIdx];
    const b = pts[bestIdx + 1] || pts[bestIdx - 1] || a;
    let heading = Math.atan2(b.y - a.y, b.x - a.x);
    if (b === pts[bestIdx - 1]) heading += Math.PI;
    car = { x: best.x, y: best.y, heading, speed: 0 };
  }

  // ============================================================
  //  Main "drive here" flow
  // ============================================================
  async function startDrive(zip, radius) {
    if (busy) return;
    zip = (zip || "").trim();
    if (!/^\d{5}$/.test(zip)) {
      zipError.textContent = "Please enter a valid 5-digit US zip code.";
      return;
    }
    busy = true; zipError.textContent = "";
    show("loading");
    $("loadingText").textContent = "Finding " + zip + "…";
    loadingSub.textContent = "";

    let place;
    try {
      place = await geocodeZip(zip);
    } catch (e) {
      busy = false; show("start");
      zipError.textContent = "Hmm, couldn't find zip " + zip + ". Try another.";
      return;
    }

    $("loadingText").textContent = "Loading streets…";
    loadingSub.textContent = place.city + ", " + place.state;

    let elements;
    try {
      elements = await fetchMapData(place.lat, place.lon, radius || RENDER_RADIUS);
    } catch (e) {
      busy = false; show("start");
      zipError.textContent = "The map server is busy right now. Please try again in a moment.";
      return;
    }

    const n = buildWorld(elements, place.lat, place.lon);
    if (n === 0) {
      busy = false; show("start");
      const canGoBigger = (radius || RENDER_RADIUS) < 2000;
      zipError.textContent = "No roads found near " + place.city + ".";
      if (canGoBigger) {
        zipError.textContent += " That area is pretty rural — tap Drive again to search a wider area.";
        pendingWideZip = zip;
      }
      return;
    }
    pendingWideZip = null;

    spawnCar();
    locLabel.textContent = "Driving in " + place.city + ", " + place.state;
    busy = false;
    initAudio();      // user already gestured (Drive/random/Enter)
    show("game");
    lastT = performance.now();
  }

  // ============================================================
  //  Physics + collisions
  // ============================================================
  const MAX_SPEED = 95, MAX_REV = 28;
  const ACCEL = 70, BRAKE = 120, FRICTION = 26;
  const TURN_RATE = 2.6;

  function updatePhysics(dt) {
    if (!car) return;

    if (input.gas)        car.speed += ACCEL * dt;
    else if (input.brake) car.speed -= BRAKE * dt;
    else {
      const f = FRICTION * dt;
      if (car.speed > 0) car.speed = Math.max(0, car.speed - f);
      else if (car.speed < 0) car.speed = Math.min(0, car.speed + f);
    }
    car.speed = Math.max(-MAX_REV, Math.min(MAX_SPEED, car.speed));

    const speedFrac = Math.min(1, Math.abs(car.speed) / 35);
    const dir = car.speed >= 0 ? 1 : -1;
    let steer = 0;
    if (input.left) steer -= 1;
    if (input.right) steer += 1;
    car.heading += steer * TURN_RATE * speedFrac * dir * dt;

    const vx = Math.cos(car.heading) * car.speed;
    const vy = Math.sin(car.heading) * car.speed;
    let nx = car.x + vx * dt;
    let ny = car.y + vy * dt;

    // Building collision: if the new spot is inside a footprint, stop & bounce.
    if (insideBuilding(nx, ny)) {
      // try sliding along one axis so we don't fully stick on glancing hits
      if (!insideBuilding(nx, car.y)) { ny = car.y; }
      else if (!insideBuilding(car.x, ny)) { nx = car.x; }
      else { nx = car.x; ny = car.y; car.speed = -car.speed * 0.3; }
    }

    // Off-road grass drag
    if (Math.abs(car.speed) > 4 && isOffRoad(nx, ny)) {
      const drag = 55 * dt;
      if (car.speed > 0) car.speed = Math.max(0, car.speed - drag);
      else car.speed = Math.min(0, car.speed + drag);
    }
    car.x = nx; car.y = ny;
  }

  function insideBuilding(x, y) {
    for (const b of buildings) {
      const bb = b.bbox;
      if (x < bb.x0 || x > bb.x1 || y < bb.y0 || y > bb.y1) continue;
      if (pointInPoly(x, y, b.pts)) return true;
    }
    return false;
  }

  function pointInPoly(x, y, pts) {
    let inside = false;
    for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
      const xi = pts[i].x, yi = pts[i].y, xj = pts[j].x, yj = pts[j].y;
      const hit = ((yi > y) !== (yj > y)) &&
                  (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
      if (hit) inside = !inside;
    }
    return inside;
  }

  function isOffRoad(x, y) {
    let minDist2 = Infinity;
    const R = 30;
    for (const r of roads) {
      const pts = r.pts;
      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b = pts[i + 1];
        if (Math.abs(a.x - x) > R && Math.abs(b.x - x) > R) continue;
        if (Math.abs(a.y - y) > R && Math.abs(b.y - y) > R) continue;
        const d2 = distToSeg2(x, y, a.x, a.y, b.x, b.y);
        if (d2 < minDist2) minDist2 = d2;
        if (minDist2 < 64) return false;
      }
    }
    return minDist2 > 100;
  }

  function distToSeg2(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) { const ex = px - ax, ey = py - ay; return ex*ex + ey*ey; }
    let t = ((px - ax) * dx + (py - ay) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t * dx, cy = ay + t * dy;
    const ex = px - cx, ey = py - cy;
    return ex * ex + ey * ey;
  }

  // ============================================================
  //  Rendering (north-up, camera centered on car)
  // ============================================================
  function render() {
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = PAL.grass;
    ctx.fillRect(0, 0, W, H);
    drawGrassTexture(W, H);

    if (!car) return;
    const camX = car.x, camY = car.y;
    const ox = W / 2 - camX, oy = H / 2 - camY;

    const margin = 40;
    const vMinX = camX - W/2 - margin, vMaxX = camX + W/2 + margin;
    const vMinY = camY - H/2 - margin, vMaxY = camY + H/2 + margin;
    const inView = (bb) => !(bb.x1 < vMinX || bb.x0 > vMaxX || bb.y1 < vMinY || bb.y0 > vMaxY);

    // roads: casing then asphalt
    ctx.lineJoin = "round"; ctx.lineCap = "round";
    const visRoads = roads.filter(r => inView(r.bbox));
    for (const r of visRoads) strokeRoad(r, ox, oy, r.style.w + 2.5, PAL.casing);
    for (const r of visRoads) strokeRoad(r, ox, oy, r.style.w, PAL.asphalt);

    // dashed center lines
    ctx.save();
    ctx.setLineDash([6, 7]); ctx.strokeStyle = PAL.marking; ctx.lineWidth = 1;
    for (const r of visRoads) {
      if (!r.style.dash) continue;
      const pts = r.pts;
      ctx.beginPath();
      ctx.moveTo(pts[0].x + ox, pts[0].y + oy);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x + ox, pts[i].y + oy);
      ctx.stroke();
    }
    ctx.restore();

    // buildings (footprint fill + casing)
    for (const b of buildings) {
      if (!inView(b.bbox)) continue;
      const pts = b.pts;
      ctx.beginPath();
      ctx.moveTo(pts[0].x + ox, pts[0].y + oy);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x + ox, pts[i].y + oy);
      ctx.closePath();
      ctx.fillStyle = PAL.building; ctx.fill();
      ctx.lineWidth = 1; ctx.strokeStyle = PAL.buildingCasing; ctx.stroke();
    }

    // night lighting (vignette + headlights) under the car
    if (PAL.vignette > 0) drawNight(W, H);

    drawCar(W / 2, H / 2, car.heading);

    drawMinimap();
  }

  function strokeRoad(r, ox, oy, width, color) {
    const pts = r.pts;
    ctx.strokeStyle = color; ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(pts[0].x + ox, pts[0].y + oy);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x + ox, pts[i].y + oy);
    ctx.stroke();
  }

  function drawGrassTexture(W, H) {
    ctx.fillStyle = PAL.grassDk;
    const cam = car || { x: 0, y: 0 };
    const G = 18;
    const startGX = Math.floor((cam.x - W / 2) / G);
    const startGY = Math.floor((cam.y - H / 2) / G);
    const offX = W / 2 - cam.x;
    const offY = H / 2 - cam.y;
    for (let gx = startGX - 1; gx <= startGX + Math.ceil(W / G) + 1; gx++) {
      for (let gy = startGY - 1; gy <= startGY + Math.ceil(H / G) + 1; gy++) {
        if ((((gx * 7) ^ (gy * 13)) & 7) === 0) {
          ctx.fillRect(Math.round(gx * G + offX), Math.round(gy * G + offY), 3, 3);
        }
      }
    }
  }

  function drawNight(W, H) {
    // darkening vignette over the whole world
    ctx.save();
    const cx = W/2, cy = H/2;
    const g = ctx.createRadialGradient(cx, cy, 20, cx, cy, Math.max(W, H) * 0.7);
    g.addColorStop(0, "rgba(6,8,24,0.25)");
    g.addColorStop(1, "rgba(4,6,18," + PAL.vignette + ")");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // headlight beams: two warm cones cast forward from the car
    ctx.translate(cx, cy);
    ctx.rotate(car.heading);
    ctx.globalCompositeOperation = "lighter";
    for (const sgn of [-1, 1]) {
      const beam = ctx.createLinearGradient(6, 0, 70, 0);
      beam.addColorStop(0, "rgba(255,240,200,0.30)");
      beam.addColorStop(1, "rgba(255,240,200,0)");
      ctx.fillStyle = beam;
      ctx.beginPath();
      ctx.moveTo(6, sgn * 3);
      ctx.lineTo(72, sgn * 26);
      ctx.lineTo(72, -sgn * 6);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawCar(cx, cy, heading) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(heading);
    ctx.fillStyle = "rgba(0,0,0,0.28)"; ctx.fillRect(-7, -4, 16, 9);   // shadow
    ctx.fillStyle = carDesign.body;     ctx.fillRect(-8, -5, 16, 10);  // body
    ctx.fillStyle = carDesign.trim;     ctx.fillRect(5, -5, 3, 10);    // nose
    ctx.fillStyle = carDesign.roof;     ctx.fillRect(-4, -4, 8, 8);    // roof
    ctx.fillStyle = "#bfe8ff";          ctx.fillRect(2, -3, 2, 6);     // windshield
    ctx.fillStyle = "#7fb8d8";          ctx.fillRect(-4, -3, 2, 6);    // rear window
    if (PAL.vignette > 0) {                                            // headlamp dots at night
      ctx.fillStyle = "#fff6d0"; ctx.fillRect(7, -4, 1, 2); ctx.fillRect(7, 2, 1, 2);
    }
    ctx.restore();
  }

  // ============================================================
  //  Minimap
  // ============================================================
  let mini = null; // { bg, scale, offX, offY, size }
  function buildMinimap() {
    if (!bounds || !isFinite(bounds.minX)) { mini = null; return; }
    const size = 92, pad = 5;
    const wW = (bounds.maxX - bounds.minX) || 1;
    const wH = (bounds.maxY - bounds.minY) || 1;
    const scale = Math.min((size - 2*pad) / wW, (size - 2*pad) / wH);
    const offX = (size - wW * scale) / 2 - bounds.minX * scale;
    const offY = (size - wH * scale) / 2 - bounds.minY * scale;
    const bg = document.createElement("canvas");
    bg.width = size; bg.height = size;
    const g = bg.getContext("2d");
    g.fillStyle = PAL.miniBg; g.fillRect(0, 0, size, size);
    // buildings
    g.fillStyle = PAL.miniBldg;
    for (const b of buildings) {
      const pts = b.pts;
      g.beginPath();
      g.moveTo(pts[0].x*scale+offX, pts[0].y*scale+offY);
      for (let i=1;i<pts.length;i++) g.lineTo(pts[i].x*scale+offX, pts[i].y*scale+offY);
      g.closePath(); g.fill();
    }
    // roads
    g.strokeStyle = PAL.miniRoad; g.lineWidth = 0.7; g.lineCap = "round";
    for (const r of roads) {
      const pts = r.pts;
      g.beginPath();
      g.moveTo(pts[0].x*scale+offX, pts[0].y*scale+offY);
      for (let i=1;i<pts.length;i++) g.lineTo(pts[i].x*scale+offX, pts[i].y*scale+offY);
      g.stroke();
    }
    mini = { bg, scale, offX, offY, size };
  }

  function drawMinimap() {
    if (!mini || !car) { miniCtx.clearRect(0,0,miniMap.width,miniMap.height); return; }
    miniCtx.clearRect(0, 0, mini.size, mini.size);
    miniCtx.drawImage(mini.bg, 0, 0);
    // car marker (heading triangle)
    const mx = car.x * mini.scale + mini.offX;
    const my = car.y * mini.scale + mini.offY;
    miniCtx.save();
    miniCtx.translate(mx, my);
    miniCtx.rotate(car.heading);
    miniCtx.fillStyle = PAL.miniCar;
    miniCtx.beginPath();
    miniCtx.moveTo(5, 0); miniCtx.lineTo(-3, -3.5); miniCtx.lineTo(-3, 3.5);
    miniCtx.closePath(); miniCtx.fill();
    miniCtx.restore();
  }

  // ============================================================
  //  Audio (WebAudio engine hum + tire screech)
  // ============================================================
  const audio = { ctx:null, started:false, muted:false, osc:null, og:null, filt:null, tg:null, master:null };
  function initAudio() {
    if (audio.started) { if (audio.ctx.state === "suspended") audio.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try {
      const ac = new AC();
      const master = ac.createGain();
      master.gain.value = audio.muted ? 0 : 0.9;
      master.connect(ac.destination);

      // engine: sawtooth through a lowpass, pitch follows speed
      const osc = ac.createOscillator(); osc.type = "sawtooth"; osc.frequency.value = 55;
      const filt = ac.createBiquadFilter(); filt.type = "lowpass"; filt.frequency.value = 500;
      const og = ac.createGain(); og.gain.value = 0.0;
      osc.connect(filt); filt.connect(og); og.connect(master); osc.start();

      // tires: looped white noise through a bandpass, gated by hard cornering
      const len = ac.sampleRate * 1;
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const noise = ac.createBufferSource(); noise.buffer = buf; noise.loop = true;
      const bp = ac.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 1900; bp.Q = 0.7;
      const tg = ac.createGain(); tg.gain.value = 0;
      noise.connect(bp); bp.connect(tg); tg.connect(master); noise.start();

      Object.assign(audio, { ctx:ac, started:true, osc, og, filt, tg, master });
    } catch (e) { /* audio optional */ }
  }

  function updateAudio() {
    if (!audio.started || audio.muted || !car) return;
    const t = audio.ctx.currentTime;
    const sp = Math.abs(car.speed);
    audio.osc.frequency.setTargetAtTime(50 + sp * 2.6, t, 0.05);
    audio.og.gain.setTargetAtTime(0.05 + Math.min(0.13, sp * 0.0032), t, 0.08);
    audio.filt.frequency.setTargetAtTime(450 + sp * 22, t, 0.08);
    const turning = (input.left || input.right) ? 1 : 0;
    const screech = (turning && sp > 42) ? Math.min(0.2, (sp - 42) * 0.006) : 0;
    audio.tg.gain.setTargetAtTime(screech, t, 0.05);
  }

  function setMuted(m) {
    audio.muted = m;
    $("muteBtn").textContent = m ? "🔇" : "🔊";
    if (audio.started) audio.master.gain.setTargetAtTime(m ? 0 : 0.9, audio.ctx.currentTime, 0.05);
  }

  // ============================================================
  //  Game loop
  // ============================================================
  function loop(t) {
    requestAnimationFrame(loop);
    let dt = (t - lastT) / 1000;
    lastT = t;
    if (dt > 0.05) dt = 0.05;
    if (state === "game") {
      updatePhysics(dt);
      updateAudio();
      render();
      const mph = Math.round(Math.abs(car.speed) * 2.0);
      speedLabel.textContent = (car.speed < -1 ? "R " : "") + mph + " mph";
    }
  }
  requestAnimationFrame(loop);

  // ============================================================
  //  Input: keyboard
  // ============================================================
  const KEYMAP = {
    ArrowLeft:"left", a:"left", A:"left",
    ArrowRight:"right", d:"right", D:"right",
    ArrowUp:"gas", w:"gas", W:"gas",
    ArrowDown:"brake", s:"brake", S:"brake",
  };
  window.addEventListener("keydown", (e) => {
    if (state !== "game") return;
    const k = KEYMAP[e.key];
    if (k) { input[k] = true; e.preventDefault(); }
  });
  window.addEventListener("keyup", (e) => {
    const k = KEYMAP[e.key];
    if (k) { input[k] = false; e.preventDefault(); }
  });

  // ============================================================
  //  Input: touch / pointer (multitouch hold-to-press)
  // ============================================================
  document.querySelectorAll(".ctrl").forEach((el) => {
    const key = el.dataset.key;
    const press = (e) => { e.preventDefault(); input[key] = true; el.classList.add("pressed"); };
    const release = (e) => { e.preventDefault(); input[key] = false; el.classList.remove("pressed"); };
    el.addEventListener("pointerdown", (e) => { press(e); try { el.setPointerCapture(e.pointerId); } catch (_) {} });
    el.addEventListener("pointerup", release);
    el.addEventListener("pointercancel", release);
    el.addEventListener("lostpointercapture", release);
  });

  // ============================================================
  //  Car picker (start screen)
  // ============================================================
  function buildCarPicker() {
    const wrap = $("carPick");
    CAR_DESIGNS.forEach((d, i) => {
      const sw = document.createElement("button");
      sw.className = "swatch" + (d === carDesign ? " sel" : "");
      sw.style.background = d.body;
      sw.title = d.name;
      sw.setAttribute("aria-label", "Choose " + d.name + " car");
      const roof = document.createElement("div"); roof.className = "roof"; roof.style.background = d.roof;
      const glass = document.createElement("div"); glass.className = "glass";
      sw.appendChild(roof); sw.appendChild(glass);
      sw.addEventListener("click", () => {
        carDesign = d;
        wrap.querySelectorAll(".swatch").forEach(s => s.classList.remove("sel"));
        sw.classList.add("sel");
      });
      wrap.appendChild(sw);
    });
  }

  // ============================================================
  //  Day / night
  // ============================================================
  function setMode(m) {
    mode = m;
    PAL = PALS[m];
    $("dayNightBtn").textContent = m === "day" ? "🌙" : "☀️";
    if (state === "game") canvas.style.background = PAL.grass;
    buildMinimap(); // recolor minimap for the new palette
  }

  // ============================================================
  //  Start-screen / HUD wiring
  // ============================================================
  function handleDrive() {
    const zip = zipInput.value.trim();
    initAudio(); // capture the gesture so audio can start
    if (pendingWideZip && zip === pendingWideZip) startDrive(zip, 2000);
    else startDrive(zip, RENDER_RADIUS);
  }
  $("driveBtn").addEventListener("click", handleDrive);
  zipInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleDrive(); });
  zipInput.addEventListener("input", () => {
    zipInput.value = zipInput.value.replace(/\D/g, "").slice(0, 5);
    zipError.textContent = ""; pendingWideZip = null;
  });
  $("randomBtn").addEventListener("click", () => {
    zipInput.value = RANDOM_ZIPS[Math.floor(Math.random() * RANDOM_ZIPS.length)];
    handleDrive();
  });
  $("newZipBtn").addEventListener("click", () => {
    for (const k in input) input[k] = false;
    document.querySelectorAll(".ctrl").forEach(el => el.classList.remove("pressed"));
    show("start"); zipInput.focus();
  });
  $("muteBtn").addEventListener("click", () => setMuted(!audio.muted));
  $("dayNightBtn").addEventListener("click", () => setMode(mode === "day" ? "night" : "day"));

  // boot
  buildCarPicker();
  setMode("day");
  show("start");
})();
</script>
</body>
</html>
