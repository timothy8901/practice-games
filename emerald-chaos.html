<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pokémon Emerald Chaos V2 — Play in Browser</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #0e1116; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    body { display: flex; flex-direction: column; height: 100%; }
    header {
      text-align: center; padding: 14px 16px 8px;
      border-bottom: 1px solid #20262e;
    }
    header h1 { margin: 0; font-size: 1.15rem; letter-spacing: .2px; }
    header p { margin: 4px 0 0; font-size: .8rem; color: #8b949e; }
    header a { color: #58a6ff; text-decoration: none; }
    /* The emulator gets a definite box (full remaining height); EmulatorJS
       letterboxes the 3:2 GBA screen inside it, centered, on any viewport. */
    #game-wrap {
      flex: 1 1 auto; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 8px; box-sizing: border-box;
    }
    /* A 3:2 box sized from BOTH available width and height (no reliance on
       aspect-ratio, which a flex item's cross-stretch overrides). EmulatorJS
       stretches its canvas to fill #game, so the box itself must stay 3:2. */
    #game {
      position: relative;
      background: #000;
      --availW: calc(100vw - 16px);
      --availH: calc(100vh - 120px);
      width:  min(var(--availW), calc(var(--availH) * 1.5), 980px);
      height: min(var(--availH), calc(var(--availW) / 1.5), calc(980px / 1.5));
    }
    /* Pin the canvas layer to the box so it can't force #game to grow. */
    #game .ejs_canvas_parent { position: absolute; inset: 0; }
    footer { text-align: center; font-size: .72rem; color: #6e7681; padding: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Pokémon Emerald — Chaos V2</h1>
    <p>Randomizer &amp; achievements built in · saves stay in your browser · <a href="index.html">← all games</a></p>
  </header>

  <div id="game-wrap">
    <div id="game"></div>
  </div>

  <footer>Plays via EmulatorJS (mGBA / WebAssembly). First load fetches the core, then it's cached.</footer>

  <script>
    // --- EmulatorJS configuration ---
    EJS_player = "#game";
    EJS_core = "gba";                       // mGBA core
    EJS_gameUrl = "emerald-chaos-v2.zip";   // zip is decompressed in-browser
    EJS_gameName = "Pokémon Emerald Chaos V2";
    EJS_pathtodata = "emulatorjs/";         // self-hosted assets (slim: GBA core only)
    EJS_color = "#2ea043";                  // accent
    EJS_startOnLoaded = false;              // show start screen (also satisfies audio-autoplay policy)
    EJS_alignStartButton = "center";
    // Saves: EmulatorJS auto-persists the battery save (.sav) to IndexedDB per browser,
    // and supports save-states from its in-emulator menu. Each visitor gets their own save.
  </script>
  <script src="emulatorjs/loader.js"></script>
</body>
</html>
