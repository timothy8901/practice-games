}
function statKV(k,v){ return `<div class="kv"><span class="k">${k}</span><span class="v">${v}</span></div>`; }

let achFilter='all';
function panelAch(){
  const total=ACH.length, un=unlockedCount(); const pct=Math.round(un/total*100);
  let html=`<div id="achProgTop"><div id="achPct">${pct}%</div><div style="flex:1"><div class="kv" style="padding:0"><span class="k">${un} / ${total} unlocked</span><span class="v">${punUnlocked()} pun awards · ${Math.round(S.rep)} rep</span></div><div id="achProgBar"><div id="achProgFill" style="width:${pct}%"></div></div></div></div>`;
  const cats=['Milestones','Inventory','Pricing','Freshness','Marketing','Supply','Staff','Events','Challenges','Green Thumb','Secret'];
  html+=`<div class="achFilter"><button class="${achFilter==='all'?'on':''}" data-af="all">All</button><button class="${achFilter==='un'?'on':''}" data-af="un">Unlocked</button><button class="${achFilter==='lock'?'on':''}" data-af="lock">Locked</button></div>`;
  cats.forEach(cat=>{
    const list=ACH.filter(a=>a.cat===cat);
    const visible=list.filter(a=>{ const u=S.ach[a.id]&&S.ach[a.id].un; return achFilter==='all'||(achFilter==='un'&&u)||(achFilter==='lock'&&!u); });
    if(!visible.length) return;
    const unc=list.filter(a=>S.ach[a.id]&&S.ach[a.id].un).length;
    html+=`<div class="achCat"><div class="ch"><span>${cat}</span><span>${unc}/${list.length}</span></div>`;
    visible.forEach(a=>{
      const u=S.ach[a.id]&&S.ach[a.id].un;
      const hidden=a.secret&&!u;
      let prog=''; if(a.progress&&!u){ try{ const p=a.progress(); const pc=clamp(p.c/p.g,0,1); prog=`<div class="apb"><div class="apf" style="width:${Math.round(pc*100)}%"></div></div><div class="apt">${fmtNum(Math.min(p.c,p.g))} / ${fmtNum(p.g)}</div>`; }catch(e){} }
      html+=`<div class="achItem ${u?'un':''} ${a.secret?'secret':''}"><div class="aic2">${u?achIcon(a):(hidden?'❓':'🔒')}</div><div class="ab"><div class="an">${hidden?'???':a.n}</div><div class="ad">${hidden?'Secret achievement — keep playing to reveal.':a.d}</div>${prog}</div><div class="when">${u?'Day '+S.ach[a.id].day:''}</div></div>`;
    });
    html+=`</div>`;
  });
  return html;
}
function fmtNum(n){ n=Math.floor(n); return n>=1000?n.toLocaleString():n; }

/* ----- panel event binding ----- */
function bindPanel(){
  const b=document.getElementById('panelBody');
  b.querySelectorAll('[data-rp]').forEach(el=>el.onclick=()=>{ restockState.pid=el.dataset.rp; renderPanel(); });
  b.querySelectorAll('[data-rsup]').forEach(el=>el.onclick=()=>{ restockState.sup=el.dataset.rsup; const s=C.SUPPLIERS[restockState.sup]; if(restockState.qty<s.min) restockState.qty=s.min; renderPanel(); });
  b.querySelectorAll('[data-rq]').forEach(el=>el.onclick=()=>{
    const v=el.dataset.rq; const sup=C.SUPPLIERS[restockState.sup];
    if(v==='max'){ const unit=effWholesale(restockState.pid,restockState.sup); restockState.qty=Math.max(sup.min,Math.min(sup.max||99999, Math.floor(S.cash/unit), capRemaining())); }
    else if(v.startsWith('set:')) restockState.qty=parseInt(v.slice(4));
    else restockState.qty=Math.max(1, restockState.qty+parseInt(v));
    renderPanel();
  });
  const ob=b.querySelector('#orderBtn'); if(ob) ob.onclick=()=>{ if(restockState.sup==='quick') quickRestock(restockState.pid,restockState.qty); else supplierOrder(restockState.pid,restockState.qty,restockState.sup); };
  const tu=b.querySelector('#tierUp'); if(tu) tu.onclick=upgradeTier;
  const ru=b.querySelector('#refrigUp'); if(ru) ru.onclick=buyRefrig;
  const sc=b.querySelector('#signCoop'); if(sc) sc.onclick=signCoop;
  b.querySelectorAll('[data-supup]').forEach(el=>el.onclick=()=>buySupplyUp(el.dataset.supup));
  b.querySelectorAll('[data-mkt]').forEach(el=>el.onclick=()=>runCampaign(el.dataset.mkt));
  const lt=b.querySelector('#loyaltyToggle'); if(lt) lt.onclick=toggleLoyalty;
  const hc=b.querySelector('#hireCashier'); if(hc) hc.onclick=()=>hire('cashier');
  const hs=b.querySelector('#hireStocker'); if(hs) hs.onclick=()=>hire('stocker');
  b.querySelectorAll('[data-fire]').forEach(el=>el.onclick=()=>fire(parseInt(el.dataset.fire)));
  const lb=b.querySelector('#loanBtn'); if(lb) lb.onclick=takeLoan;
  const rb=b.querySelector('#repayBtn'); if(rb) rb.onclick=repayLoan;
  const rs=b.querySelector('#resetBtn'); if(rs) rs.onclick=()=>confirmModal('Reset everything?','This wipes your save and starts a brand-new fruit stand. This cannot be undone.', 'Reset', resetGame);
  const hb=b.querySelector('#helpBtn'); if(hb) hb.onclick=showHelp;
  b.querySelectorAll('[data-af]').forEach(el=>el.onclick=()=>{ achFilter=el.dataset.af; renderPanel(); });
}

/* ---- per-tile actions (storefront) ---- */
document.getElementById('shelf').addEventListener('click', e=>{
  const btn=e.target.closest('button[data-act]'); if(!btn) return;
  const tile=e.target.closest('.tile'); const pid=tile.dataset.pid; const act=btn.dataset.act;
  if(act==='buy'){ openTab('restock'); restockState.pid=pid; renderPanel(); }
  else if(act==='mkdn'){ markdown(pid); }
  else if(act==='price'){ priceModal(pid); }
  else if(act==='toss'){ tossSpoiled(pid); }
});

/* ============================================================================
   ============================  MODALS  ======================================
   ============================================================================ */
function openModal(html){ const m=document.getElementById('modal'); m.innerHTML=html; document.getElementById('modalWrap').classList.add('open'); }
function closeModal(){ document.getElementById('modalWrap').classList.remove('open'); }
document.getElementById('modalWrap').addEventListener('click',e=>{ if(e.target.id==='modalWrap') closeModal(); });

function confirmModal(title,msg,okLabel,onOk){
  openModal(`<h3>${title}</h3><p>${msg}</p><div class="modalBtns"><button class="btn alt" id="mCancel">Cancel</button><button class="btn danger" id="mOk">${okLabel}</button></div>`);
  document.getElementById('mCancel').onclick=closeModal;
  document.getElementById('mOk').onclick=()=>{ closeModal(); onOk(); };
}

function priceModal(pid){
  const p=CAT[pid]; const pr=S.products[pid];
  const opt=optimalPrice(p), mkt=marketPrice(p);
  openModal(`<h3>${p.emoji} ${p.name} — set price</h3>
    <p>Wholesale ${money(p.wholesale)} · Market ${money(mkt)} · Optimal ≈ <b class="gold-t">${money(opt)}</b></p>
    <p>Higher price = more margin but fewer sales. ${S.rival&&S.rival.prices[pid]?'Rival sells at '+money(S.rival.prices[pid])+'.':''}</p>
    <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin:14px 0;">
      <div class="stepper"><button id="pm10">−10¢</button><div class="qv" id="pmv">$${pr.price.toFixed(2)}</div><button id="pp10">+10¢</button></div>
    </div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
      <button class="pill" data-pset="${(p.wholesale).toFixed(2)}">cost</button>
      <button class="pill" data-pset="${mkt.toFixed(2)}">market</button>
      <button class="pill" data-pset="${opt.toFixed(2)}">optimal</button>
      <button class="pill" data-pset="${(p.wholesale*3).toFixed(2)}">3× cost</button>
      <button class="pill" data-pset="${(p.wholesale*5).toFixed(2)}">5× cost</button>
    </div>
    <div class="modalBtns"><button class="btn" id="pmDone" style="width:100%;">Done</button></div>`);
  let v=pr.price;
  const upd=()=>{ document.getElementById('pmv').textContent='$'+v.toFixed(2); };
  document.getElementById('pm10').onclick=()=>{ v=Math.max(0.01,+(v-0.10).toFixed(2)); setPrice(pid,v); upd(); };
  document.getElementById('pp10').onclick=()=>{ v=+(v+0.10).toFixed(2); setPrice(pid,v); upd(); };
  document.querySelectorAll('[data-pset]').forEach(el=>el.onclick=()=>{ v=+(+el.dataset.pset).toFixed(2); if(v<0.01)v=0.01; setPrice(pid,v); upd(); });
  document.getElementById('pmDone').onclick=closeModal;
}

  openModal(`<h3>🛒 How to Play</h3>
  <p><b>Goal:</b> grow a humble fruit stand into a hypermarket empire by maximizing daily profit — while fighting spoilage.</p>
  <p><b>The day plays out in real time.</b> Use the speed controls (❚❚ / 1× / 2× / 4×) up top. Customers arrive based on your reputation, marketing & store size, and buy what's in stock.</p>

  <p><b>$ on a tile</b> sets the price. The little dot shows price vs. its sweet spot — <span style="color:var(--green)">●</span> near-optimal, <span style="color:var(--red)">●</span> too pricey, <span style="color:var(--blue)">●</span> too cheap. <b>🏷️ Sale</b> clears aging stock fast at low margin.</p>
  <p>Watch for tile cues: a pulsing <b>🔥 HOT</b> badge marks event-boosted demand, and the freshness bar blinks when stock is about to spoil.</p>
  <p><b>🏪 Store</b> upgrades your tier (more slots & traffic), refrigeration (longer shelf life), and supply chain. <b>📣 Marketing</b> draws customers. <b>👥 Staff</b> adds cashiers (capacity) & stockers (less spoilage), plus loans & stats.</p>
  <p>The <b>💡 tip bar</b> at the top of the store suggests your best next move. 🏆 <b>110 achievements</b> to chase. The game autosaves. Have fun!</p>
  <div class="modalBtns"><button class="btn" id="helpOk" style="width:100%;">Let's go!</button></div>`);

/* ============================================================================
   ============================  TOASTS / FX  =================================
   ============================================================================ */
function toast(icon,msg,kind){
  const t=document.createElement('div'); t.className='toast '+(kind||'');
  t.innerHTML=`<span class="tic">${icon}</span><span>${msg}</span>`;
  const wrap=document.getElementById('toasts'); wrap.appendChild(t);
  setTimeout(()=>t.remove(),3600);
  while(wrap.children.length>4) wrap.removeChild(wrap.firstChild);
}
const CONF_COLORS=['#ffd54d','#5fd273','#ff6b6b','#5db4ff','#c08bff','#ff9f43'];
function fireConfetti(){
  const wrap=document.getElementById('confetti');
  for(let i=0;i<40;i++){
    const c=document.createElement('div'); c.className='confo';
    c.style.background=CONF_COLORS[i%CONF_COLORS.length];
    c.style.left=(40+rnd()*20)+'%'; c.style.top='30%';
    const dx=(rnd()*2-1)*220, dy=120+rnd()*260, rot=rnd()*720;
    c.animate([{transform:'translate(0,0) rotate(0)',opacity:1},{transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`,opacity:0}],{duration:1100+rnd()*700,easing:'cubic-bezier(.2,.6,.4,1)'});
    wrap.appendChild(c); setTimeout(()=>c.remove(),1900);
  }
}
let actx=null;
function beep(){
  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type='triangle'; o.frequency.setValueAtTime(660,actx.currentTime); o.frequency.exponentialRampToValueAtTime(990,actx.currentTime+0.12);
    g.gain.setValueAtTime(0.0001,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.12,actx.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+0.25);
    o.start(); o.stop(actx.currentTime+0.26);
  }catch(e){}
}

/* ============================================================================
   ============================  MAIN LOOP  ===================================
   ============================================================================ */
function setSpeed(s){
  S.speed=s;
  document.querySelectorAll('#speedCtl button').forEach(b=>b.classList.toggle('on', +b.dataset.spd===s));
  if(s>0){ RT.pauseStart=0; } else { RT.pauseStart=performance.now(); }
  queueSave();
}
document.getElementById('speedCtl').addEventListener('click',e=>{ const b=e.target.closest('button'); if(b) setSpeed(+b.dataset.spd); });

function frame(now){
  const dt=Math.min(120, now-(RT.lastFrame||now)); RT.lastFrame=now;
  if(S.speed>0){
    const dayMs=C.DAY_MS_1X/S.speed;
    RT.dayClock+=dt;
    const frac=clamp(RT.dayClock/dayMs,0,1);
    // schedule customers proportional to elapsed fraction
    const target=Math.floor(S.today.customers*frac);
    let toProcess=target - S.today.processed;
    if(toProcess>0){ processCustomers(Math.min(toProcess, C.CUSTOMER_BATCH_CAP)); }
    document.getElementById('dayProg').style.width=(frac*100)+'%';
    // pulse tiles that recorded a sale this frame (throttled so big crowds don't strobe)
    RT.pulseTick=(RT.pulseTick||0)+dt;
    if(RT.pulseTick>=420){ RT.pulseTick=0; for(const pid in RT.dirtyTiles){ if(RT.dirtyTiles[pid]) pulseTile(pid); } RT.dirtyTiles={}; }
    syncTiles(); syncTop();
    // periodic mid-day achievement check (cheap)
    RT.achTick=(RT.achTick||0)+dt; if(RT.achTick>500){ RT.achTick=0; checkAch(); }
    if(RT.dayClock>=dayMs){ endDay(); }
  } else {
    // paused: idle hands achievement
    if(RT.pauseStart && !RT.idleHands && (now-RT.pauseStart)>=300000){ RT.idleHands=true; checkAch(); }
  }
  requestAnimationFrame(frame);
}

/* ============================================================================
   ============================  WIRE-UP / INIT  ==============================
   ============================================================================ */
document.querySelectorAll('#tabbar button').forEach(b=>{
  b.addEventListener('click',()=>{ if(curTab===b.dataset.tab) closePanel(); else openTab(b.dataset.tab); });
});
document.getElementById('panelClose').onclick=closePanel;
document.getElementById('panelScrim').onclick=closePanel;
const _coachClose=document.getElementById('coachClose');
if(_coachClose) _coachClose.onclick=()=>{ const k=document.getElementById('coach').dataset.key; if(k) coachDismissed[k]=true; document.getElementById('coach').classList.add('hidden'); };

function fullRender(){ renderShelfStatic(); syncTop(); if(curTab) renderPanel(); }

function init(){
  RT={dirtyTiles:{}, sessionDays:0, dayClock:0, lastFrame:performance.now(),
      everProfitDay:false, pauseStart:0};
  const had=load();
  if(!had){ S=freshState(); S.today=freshDay(); }
  // restore speed UI
  if(S.speed===undefined) S.speed=1;
  document.querySelectorAll('#speedCtl button').forEach(bn=>bn.classList.toggle('on', +bn.dataset.spd===S.speed));
  if(S.speed===0) RT.pauseStart=performance.now();   // arm Idle Hands timer if loaded paused
  // re-evaluate any already-satisfied achievements silently-ish (avoid spamming on first load of existing save)
  if(had){ for(const a of ACH){ if(!(S.ach[a.id]&&S.ach[a.id].un)){ try{ if(a.chk()){ S.ach[a.id]={un:true,day:S.day}; } }catch(e){} } } }
  if(had) resumeDay(); else startDay(true);
  fullRender();
  // autosave heartbeat
  setInterval(()=>{ save(); }, 3000);
  // first-run help
  if(!had) setTimeout(showHelp, 400);
  requestAnimationFrame(frame);
}
init();
