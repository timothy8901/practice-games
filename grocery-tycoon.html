<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Grocery Tycoon — run a produce store, fight spoilage, grow from a fruit stand to a hypermarket empire. 110 achievements.">
<title>Grocery Tycoon</title>
<style>
/* ============================================================================
   GROCERY TYCOON — single-file browser game
   All theming via CSS variables; balancing constants live in the <script>.
   ============================================================================ */
:root{
  --bg:#14241c; --bg2:#1b3327; --panel:#1f3b2d; --panel2:#27493700;
  --card:#244836; --card-hi:#2e5a43; --line:#356b4f;
  --text:#eaf6ee; --muted:#9dc4ad; --dim:#6f9a82;
  --green:#5fd273; --green-d:#2f8c46; --accent:#ffd54d; --accent-d:#c9a020;
  --red:#ff6b6b; --red-d:#b83a3a; --orange:#ff9f43; --blue:#5db4ff; --purple:#c08bff;
  --fresh:#5fd273; --aging:#ffd54d; --stale:#ff9f43; --rotten:#9b6b3a;
  --shadow:0 8px 30px rgba(0,0,0,.45);
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --shadow-card:0 4px 14px rgba(0,0,0,.28);
  --glow-accent:0 0 0 1px rgba(255,213,77,.35), 0 0 16px rgba(255,213,77,.18);
  --ease:cubic-bezier(.2,.8,.2,1);
  --season-tint:#5fd273;  /* recolored per-season in JS */
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:
    radial-gradient(900px 520px at 50% -12%, color-mix(in srgb, var(--season-tint) 16%, #1f3b2d) 0%, var(--bg) 62%),
    radial-gradient(700px 500px at 100% 110%, rgba(95,210,115,.06), transparent 60%) fixed;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  overflow:hidden; line-height:1.4; user-select:none; -webkit-user-select:none;
  transition:background .8s ease;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;}
.hidden{display:none !important;}

/* ---------- App shell ---------- */
#app{display:flex;flex-direction:column;height:100dvh;max-width:1180px;margin:0 auto;position:relative;}

/* ---------- Top bar ---------- */
#topbar{
  display:flex;align-items:center;gap:8px 10px;flex-wrap:wrap;
  padding:9px 13px;background:linear-gradient(180deg,rgba(30,57,43,.96),rgba(20,33,26,.96));
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);z-index:30;box-shadow:0 2px 14px rgba(0,0,0,.3);
}
.stat{display:flex;flex-direction:column;line-height:1.05;min-width:0;}
.stat .lbl{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.stat .val{font-size:1.02rem;font-weight:800;white-space:nowrap;transition:color .25s, transform .18s var(--ease);}
.stat .val small{font-size:.7rem;font-weight:600;color:var(--muted);}
#cashStat .val{color:var(--accent);}
/* cash/net-worth change flash */
.stat .val.flash-up{color:var(--green) !important;animation:statPop .5s var(--ease);}
.stat .val.flash-down{color:var(--red) !important;animation:statPop .5s var(--ease);}
@keyframes statPop{0%{transform:scale(1);}35%{transform:scale(1.16);}100%{transform:scale(1);}}
#seasonVal{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:6px;background:rgba(255,255,255,.06);}
#repWrap{flex:1;min-width:120px;max-width:240px;}
#repBar{height:9px;border-radius:6px;background:#16271d;overflow:hidden;margin-top:3px;border:1px solid var(--line);box-shadow:inset 0 1px 2px rgba(0,0,0,.4);}
#repFill{height:100%;width:50%;background:linear-gradient(90deg,#ff6b6b,#ffd54d,#5fd273);transition:width .4s var(--ease);position:relative;}
#repFill::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent 60%);}
.spacer{flex:1;}
#speedCtl{display:flex;gap:4px;background:#16271d;padding:4px;border-radius:11px;border:1px solid var(--line);box-shadow:inset 0 1px 3px rgba(0,0,0,.35);}
#speedCtl button{
  min-width:42px;height:36px;border-radius:8px;background:transparent;color:var(--muted);
  font-weight:800;font-size:.85rem;display:flex;align-items:center;justify-content:center;
  transition:background .18s, color .18s, transform .1s;
}
#speedCtl button:active{transform:scale(.92);}
#speedCtl button.on{background:linear-gradient(180deg,#6fe084,var(--green));color:#0f2016;box-shadow:0 2px 10px rgba(95,210,115,.45);}
#dayProgWrap{position:absolute;left:0;bottom:-1px;height:3px;width:100%;background:rgba(0,0,0,.25);}
#dayProg{height:100%;width:0%;background:linear-gradient(90deg,var(--accent-d),var(--accent));box-shadow:0 0 8px rgba(255,213,77,.6);transition:width .12s linear;}

/* ---------- Layout below topbar ---------- */
#body{flex:1;display:flex;min-height:0;position:relative;overflow:hidden;}
#store{flex:1;overflow-y:auto;padding:12px 12px 90px;-webkit-overflow-scrolling:touch;}
#store h2.section{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:4px 2px 10px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#store h2.section .stChip{font-size:.66rem;font-weight:800;color:var(--dim);background:#16271d;border:1px solid var(--line);border-radius:7px;padding:2px 7px;letter-spacing:.04em;text-transform:none;}
#store h2.section .stChip.warn{color:#ffd9a8;border-color:#a8821c;background:#3a2c0e;}

/* ---------- Coach hint ---------- */
#coach{
  display:flex;align-items:center;gap:9px;margin:0 2px 12px;padding:9px 12px;
  background:linear-gradient(180deg,rgba(46,90,67,.55),rgba(31,59,45,.55));
  border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:11px;
  font-size:.78rem;color:var(--text);box-shadow:var(--shadow-sm);animation:coachIn .35s var(--ease);
}
#coach.hidden{display:none;}
#coach .ci{font-size:1.15rem;flex-shrink:0;}
#coach .ctxt{flex:1;min-width:0;line-height:1.3;}
#coach .ctxt b{color:var(--accent);}
#coach .cx{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:#16271d;border:1px solid var(--line);color:var(--muted);font-size:.85rem;display:flex;align-items:center;justify-content:center;}
@keyframes coachIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Storefront tiles ---------- */
#shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:10px;}
.tile{
  background:linear-gradient(180deg,var(--card-hi),#1f3b2d 92%);border:1px solid var(--line);
  border-radius:15px;padding:10px 10px 9px;position:relative;display:flex;flex-direction:column;gap:5px;
  transition:transform .12s var(--ease), box-shadow .16s, border-color .16s;overflow:hidden;
  box-shadow:var(--shadow-card);animation:tileIn .3s var(--ease) both;
}
@keyframes tileIn{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:none;}}
.tile::before{content:"";position:absolute;inset:0 0 auto 0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);pointer-events:none;}
@media(hover:hover){.tile:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.4);border-color:var(--card-hi);}}
.tile.empty{opacity:.6;border-style:dashed;box-shadow:none;}
.tile.empty::before{display:none;}
.tile.low{border-color:#a8821c;}
.tile.spoiling{border-color:var(--stale);animation:spoilPulse 1.6s ease-in-out infinite;}
@keyframes spoilPulse{0%,100%{box-shadow:var(--shadow-card);}50%{box-shadow:0 0 0 1px var(--stale),0 4px 14px rgba(255,159,67,.3);}}
.tile.sale-pulse{animation:salePulse .45s;}
@keyframes salePulse{0%{transform:scale(1);}38%{transform:scale(1.055);box-shadow:0 0 0 2px var(--green),0 8px 20px rgba(95,210,115,.35);}100%{transform:scale(1);}}
.tile .emoji{font-size:2.2rem;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.45));transition:transform .2s var(--ease);align-self:flex-start;}
.tile.sale-pulse .emoji{animation:emojiBounce .45s var(--ease);}
@keyframes emojiBounce{0%{transform:scale(1) rotate(0);}40%{transform:scale(1.25) rotate(-8deg);}100%{transform:scale(1) rotate(0);}}
.tile .seas{position:absolute;top:8px;right:9px;font-size:.85rem;opacity:.85;}
.tile .hotbadge{position:absolute;top:7px;left:8px;font-size:.56rem;font-weight:800;letter-spacing:.04em;background:linear-gradient(180deg,#ff8a4d,#ff6b3a);color:#3a1500;padding:2px 6px;border-radius:7px;box-shadow:0 2px 6px rgba(255,107,58,.4);animation:hotPulse 1.4s ease-in-out infinite;}
@keyframes hotPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.tile .nm{font-weight:800;font-size:.86rem;display:flex;align-items:center;gap:4px;}
.tile .vegtag{font-size:.6rem;background:#2f8c46;color:#eafff0;padding:1px 4px;border-radius:5px;letter-spacing:.04em;}
.tile .nonveg{background:#b83a3a;}
.tile .row{display:flex;justify-content:space-between;align-items:center;gap:6px 8px;font-size:.78rem;color:var(--muted);flex-wrap:wrap;}
.tile .stock{font-weight:800;color:var(--text);font-size:.9rem;}
.tile .price{font-weight:800;color:var(--accent);font-size:.84rem;background:#1a3326;border:1px solid var(--line);border-radius:8px;padding:4px 9px;min-height:30px;display:inline-flex;align-items:center;gap:3px;flex-shrink:0;transition:transform .1s,box-shadow .15s,border-color .15s;}
.tile .price:active{transform:translateY(1px) scale(.96);}
@media(hover:hover){.tile .price:hover{border-color:var(--accent-d);box-shadow:0 0 0 1px rgba(255,213,77,.25);}}
.tile .price.optimal{border-color:var(--green-d);box-shadow:inset 0 0 0 1px rgba(95,210,115,.4);}
.tile .price .pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tile .price .pdot.hi{background:var(--red);} .tile .price .pdot.lo{background:var(--blue);} .tile .price .pdot.ok{background:var(--green);}
.tile .freshWrap{height:7px;border-radius:5px;background:#16271d;overflow:hidden;border:1px solid #1d3829;position:relative;}
.tile .freshFill{height:100%;width:100%;background:var(--fresh);transition:width .3s,background .3s;}
.tile .freshFill.danger{animation:freshBlink 1.1s ease-in-out infinite;}
@keyframes freshBlink{0%,100%{opacity:1;}50%{opacity:.45;}}
.tile .spoiled{font-size:.66rem;color:var(--orange);font-weight:700;}
.tile .tossBtn{min-height:30px;border-radius:8px;font-weight:800;font-size:.68rem;background:linear-gradient(180deg,#6e3838,#5a2f2f);border:1px solid #8a4a4a;color:#ffd8d8;width:100%;transition:transform .1s,filter .15s;}
.tile .tossBtn:active{transform:translateY(1px) scale(.98);}
@media(hover:hover){.tile .tossBtn:hover{filter:brightness(1.12);}}
.tile .btns{display:flex;gap:5px;margin-top:1px;}
.tile .btns button{
  flex:1;min-width:0;min-height:32px;border-radius:9px;font-weight:800;font-size:.74rem;white-space:nowrap;
  background:#1a3326;border:1px solid var(--line);color:var(--text);display:flex;align-items:center;justify-content:center;
  transition:transform .1s,filter .15s,box-shadow .15s;
}
.tile .btns button.buy{background:linear-gradient(180deg,#39a85a,var(--green-d));border-color:#3aa85a;color:#eafff0;}
.tile .btns button.mkdn{background:linear-gradient(180deg,#8c6a22,#7a5a1e);border-color:#a8821c;color:#fff6e0;}
.tile .btns button.price{background:#244836;}
.tile .btns button:active{transform:translateY(1px) scale(.97);}
@media(hover:hover){.tile .btns button:hover{filter:brightness(1.1);}}
.tile.front::after{content:"⭐ FRONT";position:absolute;bottom:0;left:0;font-size:.52rem;background:var(--accent);color:#1f3b2d;padding:1px 5px;border-top-right-radius:6px;font-weight:800;letter-spacing:.05em;}
.addTile{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;color:var(--dim);font-weight:800;cursor:pointer;min-height:150px;}
.addTile .plus{font-size:1.8rem;}

/* ---------- Bottom tab bar ---------- */
#tabbar{
  position:absolute;left:0;right:0;bottom:0;display:flex;background:linear-gradient(0deg,#16271d,#1b3327);
  border-top:1px solid var(--line);z-index:40;padding-bottom:env(safe-area-inset-bottom);
}
#tabbar button{
  flex:1;min-height:56px;background:transparent;color:var(--muted);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;font-size:.62rem;font-weight:700;letter-spacing:.03em;position:relative;
  transition:color .18s;
}
#tabbar button .ic{font-size:1.2rem;transition:transform .18s var(--ease);}
#tabbar button:active .ic{transform:scale(.85);}
#tabbar button.on{color:var(--accent);}
#tabbar button.on .ic{transform:translateY(-1px) scale(1.08);}
#tabbar button.on::before{content:"";position:absolute;top:0;left:18%;right:18%;height:3px;border-radius:0 0 4px 4px;background:var(--accent);box-shadow:0 0 10px rgba(255,213,77,.6);}
#tabbar button .badge{position:absolute;top:6px;right:calc(50% - 22px);background:var(--red);color:#fff;font-size:.58rem;min-width:16px;height:16px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:800;}

/* ---------- Slide-up panel ---------- */
#panelWrap{position:absolute;left:0;right:0;bottom:0;top:0;z-index:50;display:flex;flex-direction:column;justify-content:flex-end;pointer-events:none;}
#panelScrim{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity .2s;pointer-events:none;}
#panelWrap.open #panelScrim{opacity:1;pointer-events:auto;}
#panel{
  position:relative;background:linear-gradient(180deg,#274b3a,#19301f);border-top:1px solid var(--card-hi);
  border-radius:20px 20px 0 0;max-height:82%;display:flex;flex-direction:column;
  transform:translateY(110%);transition:transform .3s cubic-bezier(.2,.9,.25,1);pointer-events:auto;box-shadow:0 -10px 40px rgba(0,0,0,.5);
}
#panelWrap.open #panel{transform:translateY(0);}
#panel::before{content:"";position:absolute;top:7px;left:50%;transform:translateX(-50%);width:40px;height:4px;border-radius:3px;background:var(--line);}
#panelHead{display:flex;align-items:center;gap:10px;padding:18px 16px 8px;}
#panelHead h3{margin:0;font-size:1.12rem;font-weight:800;flex:1;}
#panelClose{width:36px;height:36px;border-radius:50%;background:#16271d;border:1px solid var(--line);font-size:1.1rem;color:var(--muted);transition:transform .12s,background .15s;}
#panelClose:active{transform:scale(.9);}
@media(hover:hover){#panelClose:hover{background:#244836;color:var(--text);}}
#panelBody{overflow-y:auto;padding:4px 16px 24px;-webkit-overflow-scrolling:touch;}

/* ---------- Generic panel UI ---------- */
.itemRow{display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,var(--card),#1f3b2d);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:9px;box-shadow:var(--shadow-sm);transition:border-color .15s,transform .1s;}
@media(hover:hover){.itemRow:hover{border-color:var(--card-hi);}}
.itemRow .ic{font-size:1.6rem;width:32px;text-align:center;flex-shrink:0;}
.itemRow .info{flex:1;min-width:0;}
.itemRow .info .t{font-weight:800;font-size:.92rem;}
.itemRow .info .d{font-size:.74rem;color:var(--muted);margin-top:1px;}
.itemRow .act{flex-shrink:0;display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
.btn{min-height:38px;padding:0 14px;border-radius:10px;font-weight:800;font-size:.82rem;background:linear-gradient(180deg,#39a85a,var(--green-d));color:#eafff0;border:1px solid #3aa85a;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:transform .1s,filter .15s,box-shadow .15s;box-shadow:var(--shadow-sm);}
.btn.alt{background:linear-gradient(180deg,#2a543f,#244836);border-color:var(--line);color:var(--text);}
.btn.gold{background:linear-gradient(180deg,var(--accent),var(--accent-d));border-color:var(--accent);color:#1f1300;}
.btn.danger{background:linear-gradient(180deg,#cf4747,var(--red-d));border-color:#d05050;color:#fff;}
.btn:disabled{opacity:.4;filter:grayscale(.5);box-shadow:none;}
@media(hover:hover){.btn:hover:not(:disabled){filter:brightness(1.08);box-shadow:0 4px 12px rgba(0,0,0,.3);}}
.btn:active:not(:disabled){transform:translateY(1px) scale(.98);}
.pill{display:inline-block;font-size:.66rem;font-weight:800;padding:2px 7px;border-radius:6px;background:#16271d;color:var(--muted);border:1px solid var(--line);transition:transform .08s,filter .12s;}
button.pill:active{transform:scale(.93);}
@media(hover:hover){button.pill:hover{filter:brightness(1.2);}}
.pill.on{background:var(--green-d);color:#eafff0;border-color:#3aa85a;}
.pill.warn{background:#7a5a1e;color:#fff6e0;border-color:#a8821c;}
.note{font-size:.76rem;color:var(--muted);margin:2px 0 12px;}
.tagline{font-size:.7rem;color:var(--dim);}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0;}
.subhd{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-weight:800;margin:14px 0 8px;}

/* qty stepper */
.stepper{display:flex;align-items:center;gap:0;background:#16271d;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.stepper button{width:44px;height:44px;font-size:1.2rem;font-weight:800;background:#244836;color:var(--text);transition:background .12s,transform .08s;}
.stepper button:active{background:var(--card-hi);transform:scale(.94);}
@media(hover:hover){.stepper button:hover{background:var(--card-hi);}}
.stepper .qv{min-width:54px;text-align:center;font-weight:800;font-size:.95rem;padding:0 6px;}

/* ---------- Modal ---------- */
#modalWrap{position:absolute;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .2s;}
#modalWrap.open{opacity:1;pointer-events:auto;}
#modal{background:linear-gradient(180deg,#2a523e,#1a3024);border:1px solid var(--card-hi);border-radius:18px;max-width:440px;width:100%;max-height:88%;overflow-y:auto;box-shadow:var(--shadow);padding:20px;transform:scale(.92) translateY(10px);opacity:0;transition:transform .26s var(--ease),opacity .2s;}
#modalWrap.open #modal{transform:scale(1) translateY(0);opacity:1;}
#modal h3{margin:0 0 8px;font-size:1.3rem;}
#modal p{color:var(--muted);font-size:.9rem;margin:6px 0;}
#modal .modalBtns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
#modal .modalBtns .btn{flex:1;}

/* ---------- Toasts ---------- */
#toasts{position:absolute;top:62px;left:0;right:0;z-index:70;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none;padding:0 12px;}
.toast{background:rgba(20,40,30,.97);border:1px solid var(--line);border-left-width:3px;border-radius:12px;padding:9px 14px;font-size:.84rem;font-weight:700;max-width:380px;box-shadow:var(--shadow);animation:toastIn .34s cubic-bezier(.2,1.3,.4,1), toastOut .4s 3.1s forwards;display:flex;align-items:center;gap:9px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.toast .tic{font-size:1.2rem;animation:ticPop .4s var(--ease);}
@keyframes ticPop{0%{transform:scale(0) rotate(-20deg);}60%{transform:scale(1.25);}100%{transform:scale(1) rotate(0);}}
.toast.event{border-color:var(--blue);border-left-color:var(--blue);} .toast.good{border-color:var(--green);border-left-color:var(--green);} .toast.bad{border-color:var(--red);border-left-color:var(--red);}
@keyframes toastIn{from{transform:translateY(-20px) scale(.95);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
@keyframes toastOut{to{transform:translateY(-10px);opacity:0;}}

/* ---------- Achievement banner ---------- */
#achBanner{position:absolute;top:70px;left:50%;transform:translateX(-50%) translateY(-160px);z-index:90;
  background:linear-gradient(135deg,#3a2f00,#5a4a00);border:2px solid var(--accent);border-radius:16px;
  padding:12px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 10px 40px rgba(255,213,77,.35);transition:transform .5s cubic-bezier(.2,1.3,.4,1);min-width:280px;max-width:92%;}
#achBanner.show{transform:translateX(-50%) translateY(0);}
#achBanner .aic{font-size:2.2rem;animation:achSpin .8s;}
@keyframes achSpin{0%{transform:scale(0) rotate(-40deg);}60%{transform:scale(1.25) rotate(8deg);}100%{transform:scale(1) rotate(0);}}
#achBanner .atxt .k{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:800;}
#achBanner .atxt .n{font-size:1.05rem;font-weight:800;}
#achBanner .atxt .d{font-size:.74rem;color:#e9dca8;}
#confetti{position:absolute;inset:0;pointer-events:none;z-index:88;overflow:hidden;}
.confo{position:absolute;width:9px;height:14px;border-radius:2px;will-change:transform;}
/* milestone screen flash (tier-ups, big wins) */
#flashFx{position:absolute;inset:0;pointer-events:none;z-index:85;opacity:0;
  background:radial-gradient(circle at 50% 45%, rgba(255,213,77,.35), transparent 60%);}
#flashFx.go{animation:flashGo .9s ease-out;}
@keyframes flashGo{0%{opacity:0;}25%{opacity:1;}100%{opacity:0;}}

/* ---------- Floating +$ ---------- */
.floatp{position:absolute;z-index:60;font-weight:800;font-size:.84rem;color:var(--green);pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.8);animation:floatUp 1s var(--ease) forwards;}
.floatp.neg{color:var(--orange);}
@keyframes floatUp{0%{transform:translateY(0) scale(.7);opacity:0;}18%{opacity:1;transform:translateY(-6px) scale(1.08);}40%{transform:translateY(-16px) scale(1);}100%{transform:translateY(-42px) scale(1);opacity:0;}}

/* ---------- Achievements panel ---------- */
#achProgTop{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
#achPct{font-size:1.7rem;font-weight:800;color:var(--accent);}
#achProgBar{flex:1;height:12px;border-radius:8px;background:#16271d;overflow:hidden;border:1px solid var(--line);}
#achProgFill{height:100%;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .5s;}
.achCat{margin-top:16px;}
.achCat .ch{font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);font-weight:800;margin-bottom:7px;display:flex;justify-content:space-between;}
.achItem{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:8px 11px;margin-bottom:7px;opacity:.62;transition:transform .12s,opacity .2s;}
.achItem.un{opacity:1;border-color:var(--green-d);background:linear-gradient(90deg,#244836,#2a5a3e);box-shadow:0 2px 8px rgba(47,140,70,.18);}
@media(hover:hover){.achItem:hover{transform:translateX(2px);}}
.achItem .aic2{font-size:1.4rem;width:30px;text-align:center;flex-shrink:0;filter:grayscale(1);transition:filter .2s;}
.achItem.un .aic2{filter:none;}
.achItem .ab{flex:1;min-width:0;}
.achItem .ab .an{font-weight:800;font-size:.86rem;}
.achItem .ab .ad{font-size:.72rem;color:var(--muted);}
.achItem .ab .apb{height:6px;border-radius:4px;background:#16271d;overflow:hidden;margin-top:4px;border:1px solid #1d3829;}
.achItem .ab .apf{height:100%;background:var(--green);}
.achItem .ab .apt{font-size:.62rem;color:var(--dim);margin-top:2px;}
.achItem .when{font-size:.62rem;color:var(--dim);flex-shrink:0;text-align:right;}
.achItem.secret .an{font-style:italic;color:var(--muted);}
.achFilter{display:flex;gap:6px;margin:10px 0 4px;flex-wrap:wrap;}
.achFilter button{padding:5px 11px;border-radius:8px;background:#16271d;border:1px solid var(--line);color:var(--muted);font-size:.72rem;font-weight:700;}
.achFilter button.on{background:var(--green-d);color:#eafff0;border-color:#3aa85a;}

/* ---------- helpers ---------- */
.kv{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0;}
.kv .k{color:var(--muted);} .kv .v{font-weight:700;}
.good-t{color:var(--green);} .bad-t{color:var(--red);} .gold-t{color:var(--accent);}
.center{text-align:center;}
@media(max-width:480px){
  #shelf{grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px;}
  .tile .emoji{font-size:1.8rem;}
  .stat .val{font-size:.92rem;}
}

<body>

<script>
"use strict";
/* ============================================================================
   ============================  BALANCING CONSTANTS  =========================
   Everything tunable lives here, grouped & commented for easy iteration.
   ============================================================================ */
const C = {
  VERSION: 4,                       // save schema version
  SAVE_KEY: 'grocery_tycoon_save_v4',

  START_CASH: 200,                  // starting bankroll (a few hundred bucks)
  START_REP: 50,                    // reputation 0..100

  // --- Day clock --- (real seconds per in-game day at 1x; faster speeds divide)
  DAY_MS_1X: 14000,                 // one day takes 14s at 1×
  CUSTOMER_BATCH_CAP: 120,          // max customers simulated per animation frame
  MAX_FLOATERS: 14,                 // cap simultaneous floating +$ texts

  // --- Demand / pricing model ---
  MARKET_MARKUP: 2.5,               // marketPrice = wholesale * markup
  ELASTICITY: 0.85,                 // price elasticity (higher = pickier shoppers)
  BASKET_BASE: 1.6,                 // avg units a buying customer takes
  BASKET_PER_TIER: 0.7,             // basket grows with store tier
  BASKET_LOYALTY: 0.6,              // extra basket when loyalty program active

  // --- Reputation dynamics ---
  REP_LERP: 0.2,                    // how fast rep moves toward its daily target
  REP_W_AVAIL: 34, REP_W_FRESH: 26, REP_W_PRICE: 20, REP_W_VARIETY: 12, REP_W_SPOIL: 8,

  // --- Store tiers --- index 0..4 (cost = upgrade price; value = cumulative, feeds net worth)
  TIERS: [
    {name:'Fruit Stand',     emoji:'🍎', slots:4,  cap:140,    traffic:85,   rent:0,    maxEmp:0,  cost:0,      value:0},
    {name:'Corner Store',    emoji:'🏬', slots:7,  cap:650,    traffic:300,  rent:45,   maxEmp:3,  cost:500,    value:500},
    {name:'Neighborhood Market',emoji:'🏪',slots:12,cap:2600,  traffic:950,  rent:220,  maxEmp:5,  cost:3000,   value:3500},
    {name:'Supermarket',     emoji:'🛒', slots:18, cap:8500,   traffic:3000, rent:950,  maxEmp:8,  cost:16000,  value:19500},
    {name:'Hypermarket',     emoji:'🏙️', slots:26, cap:130000, traffic:8500, rent:3000, maxEmp:12, cost:130000, value:149500},
  ],

  // --- Refrigeration upgrade --- effShelf *= (1 + level*step)
  REFRIG_MAX:5, REFRIG_STEP:0.22,
  REFRIG_COST:[0, 800, 2600, 7000, 18000, 45000],   // cost to reach each level

  // --- Supply chain ---
  SUPPLIERS:{
    quick:       {name:'Quick Restock (counter)', costMult:1.55, fresh:0,  days:0, min:1,   max:200,  tier:0, emoji:'⚡', desc:'Instant but pricey. Counts as an emergency order.'},
    coop:        {name:'Local Farm Co-op',        costMult:1.10, fresh:2,  days:1, min:5,   max:60,   tier:0, emoji:'🚜', desc:'Fresh & local. Small batches, next-day. Needs a contract.'},
    distributor: {name:'Regional Distributor',    costMult:0.82, fresh:0,  days:2, min:20,  max:600,  tier:1, emoji:'🚚', desc:'Cheaper in bulk, 2-day delivery.'},
    depot:       {name:'Wholesale Depot',         costMult:0.64, fresh:-1, days:3, min:100, max:6000, tier:2, emoji:'🏭', desc:'Rock-bottom prices, huge minimums, 3 days, less fresh.'},
  },
  SUPPLY_UP:{
    reefer:   {name:'Refrigerated Trucks', max:3, cost:[0,3000,9000,22000], desc:'+1 freshness per level on every delivery.'},
    bulk:     {name:'Bulk Discount Deals',  max:3, cost:[0,2500,7500,20000], desc:'-6% supplier cost per level.'},
    jit:      {name:'Just-in-Time Logistics',max:1,cost:[0,16000],          desc:'All supplier deliveries arrive same day.'},
  },

  // --- Marketing channels --- diminishing returns applied across active channels
  MKT:{
    flyers:{name:'Flyer Drop',   emoji:'📄', cost:120,  days:3, boost:0.45, repBoost:1, desc:'Cheap local reach.'},
    radio: {name:'Radio Spot',   emoji:'📻', cost:480,  days:4, boost:0.85, repBoost:2, desc:'Wider reach, jingle included.'},
    social:{name:'Social Blitz', emoji:'📱', cost:900,  days:4, boost:1.25, repBoost:3, desc:'Can go viral for a huge spike.'},
  },
  LOYALTY_COST:35,                  // daily cost while loyalty program active
  LOYALTY_JOIN_RATE:0.04,           // fraction of daily customers who join as members
  LOYALTY_BOOST_PER_100:0.18,       // customer multiplier per 100 members
  LOYALTY_BOOST_MAX:1.5,            // cap on the loyalty traffic multiplier (+150%)
  SOCIAL_VIRAL_CHANCE:0.28,         // chance a social blitz goes viral (spike day)
  MKT_DIMINISH:0.78,                // each additional active channel counts less

  // --- Staff ---
  WAGE_CASHIER:42, WAGE_STOCKER:46,
  CUST_PER_CASHIER:2600,            // checkout capacity per cashier (a maxed hypermarket can serve huge crowds)
  CUST_BASE_CAPACITY:150,           // owner alone can serve this many/day
  STOCKER_SPOIL_CUT:0.16,           // each stocker cuts spoilage by this (multiplicative, capped)
  STOCKER_TOSS:0.5,                 // each stocker auto-tosses this fraction of sitting spoilage/day

  // --- Events ---
  EVENT_CHANCE:0.26,
  EVENTS:['heatwave','craze','festival','disruption','badpress','inspection','coldsnap'],
  EVENT_WEIGHTS:{heatwave:1,craze:1.1,festival:0.8,disruption:0.9,badpress:0.7,inspection:0.8,coldsnap:0.8},
  HEATWAVE_HOT:['watermelon','strawberry','orange','grapes','lemon','mango','pineapple'],
  COLDSNAP_HARDY:['potato','carrot','apple','broccoli'],
  INSPECT_FAIL_SPOIL:25,            // sitting spoiled units above this risks failing inspection
  FESTIVAL_MULT:3.0, HEATWAVE_MULT:1.25, BADPRESS_MULT:0.65, BADPRESS_REP:-9,

  // --- Seasons --- 0 Spring 1 Summer 2 Fall 3 Winter ; new season every N days
  SEASON_LEN:14,
  SEASON_NAMES:['Spring','Summer','Fall','Winter'],
  SEASON_EMOJI:['🌷','☀️','🍂','❄️'],
  IN_SEASON_DEMAND:1.35, OFF_SEASON_DEMAND:0.6,
  IN_SEASON_COST:0.82,  OFF_SEASON_COST:1.4,
  IN_SEASON_FRESH:1.15, OFF_SEASON_FRESH:0.85,

  // --- Loans ---
  LOAN_INCREMENT:500, LOAN_INTEREST:0.012,   // 1.2%/day on outstanding balance

  // --- Rival store ---
  RIVAL_OPEN_DAY:38,                // rival opens around here (or at tier>=2)
  RIVAL_CLOSE_DAYS:30,              // dominate this many days to drive rival out
  PRICE_TOL:0.04,                   // "optimal price" tolerance (4%)
};

/* ----------------------------------------------------------------------------
   PRODUCT CATALOG
   wholesale = base buy price; demand = relative pull; shelf = days good;
   seasons = in-season indices; tier = store tier needed to stock; vegan flag.
   ---------------------------------------------------------------------------- */
const CATALOG = [
  {id:'banana',     name:'Bananas',     emoji:'🍌', wholesale:0.30, demand:10, shelf:6,  seasons:[0,1,2,3], tier:0, vegan:true},
  {id:'apple',      name:'Apples',      emoji:'🍎', wholesale:0.40, demand:9,  shelf:14, seasons:[2,3],     tier:0, vegan:true},
  {id:'lettuce',    name:'Lettuce',     emoji:'🥬', wholesale:0.50, demand:6,  shelf:4,  seasons:[0,2],     tier:0, vegan:true},
  {id:'tomato',     name:'Tomatoes',    emoji:'🍅', wholesale:0.45, demand:8,  shelf:6,  seasons:[1,2],     tier:0, vegan:true},
  {id:'strawberry', name:'Strawberries',emoji:'🍓', wholesale:0.80, demand:7,  shelf:3,  seasons:[0,1],     tier:0, vegan:true},
  {id:'orange',     name:'Oranges',     emoji:'🍊', wholesale:0.45, demand:7,  shelf:12, seasons:[3,0],     tier:1, vegan:true},
  {id:'grapes',     name:'Grapes',      emoji:'🍇', wholesale:0.90, demand:6,  shelf:7,  seasons:[1,2],     tier:1, vegan:true},
  {id:'carrot',     name:'Carrots',     emoji:'🥕', wholesale:0.30, demand:6,  shelf:21, seasons:[0,3],     tier:1, vegan:true},
  {id:'potato',     name:'Potatoes',    emoji:'🥔', wholesale:0.25, demand:7,  shelf:40, seasons:[2,3],     tier:1, vegan:true},
  {id:'eggs',       name:'Eggs',        emoji:'🥚', wholesale:1.20, demand:8,  shelf:21, seasons:[0,1,2,3], tier:1, vegan:false},
  {id:'corn',       name:'Corn',        emoji:'🌽', wholesale:0.35, demand:6,  shelf:8,  seasons:[1,2],     tier:2, vegan:true},
  {id:'watermelon', name:'Watermelon',  emoji:'🍉', wholesale:1.50, demand:5,  shelf:10, seasons:[1],       tier:2, vegan:true},
  {id:'avocado',    name:'Avocados',    emoji:'🥑', wholesale:1.00, demand:6,  shelf:5,  seasons:[0,1],     tier:2, vegan:true},
  {id:'broccoli',   name:'Broccoli',    emoji:'🥦', wholesale:0.55, demand:5,  shelf:9,  seasons:[0,3],     tier:2, vegan:true},
  {id:'milk',       name:'Milk',        emoji:'🥛', wholesale:1.40, demand:8,  shelf:10, seasons:[0,1,2,3], tier:2, vegan:false},
  {id:'cheese',     name:'Cheese',      emoji:'🧀', wholesale:2.50, demand:6,  shelf:30, seasons:[0,1,2,3], tier:2, vegan:false},
  {id:'mango',      name:'Mangoes',     emoji:'🥭', wholesale:1.20, demand:5,  shelf:6,  seasons:[1],       tier:3, vegan:true},
  {id:'pineapple',  name:'Pineapple',   emoji:'🍍', wholesale:1.80, demand:4,  shelf:12, seasons:[1],       tier:3, vegan:true},
  {id:'lemon',      name:'Lemons',      emoji:'🍋', wholesale:0.40, demand:5,  shelf:18, seasons:[0,3],     tier:3, vegan:true},
  {id:'honey',      name:'Honey',       emoji:'🍯', wholesale:3.00, demand:4,  shelf:365,seasons:[0,1,2,3], tier:3, vegan:false},
  {id:'truffle',    name:'Truffles',    emoji:'🍄', wholesale:40.0, demand:5,  shelf:5,  seasons:[2,3],     tier:4, vegan:true},
];
const CAT = {}; CATALOG.forEach(p=>CAT[p.id]=p);
function marketPrice(p){ return p.wholesale * C.MARKET_MARKUP; }
// profit-maximising price under the linear-elastic demand model (see math in design)
function optimalPrice(p){ const m=marketPrice(p),E=C.ELASTICITY; return (1+E)*m/(2*E) + p.wholesale/2; }

/* ============================================================================
   ==============================  GAME STATE  ================================
   ============================================================================ */
let S = null;           // the entire save object
let RT = {};            // runtime-only (not saved): timers, flags-this-frame

function freshState(){
  const products = {};
  CATALOG.forEach(p=>{
    products[p.id] = {
      price: +(marketPrice(p)).toFixed(2),  // start at market price
      batches: [],        // [{qty, age}] ; age can be negative (extra-fresh)
      spoiled: 0,         // spoiled units sitting on the shelf, awaiting toss
      front: false,       // premium front-of-store slot
      soldToday: 0,
      noSaleDays: 0,      // consecutive days stocked w/ no sale (Hoarder)
      soldOutToday: false,
    };
  });
  return {
    v: C.VERSION,
    cash: C.START_CASH,
    day: 1,
    season: 0,
    rep: C.START_REP,
    tier: 0,
    products,
    refrig: 0,
    supply: { coopSigned:false, reefer:0, bulk:0, jit:0 },
    marketing: { flyers:{active:false,days:0}, radio:{active:false,days:0}, social:{active:false,days:0}, loyalty:false },
    loyaltyMembers: 0,
    staff: [],              // [{type:'cashier'|'stocker', hireDay}]
    deliveries: [],         // [{pid, qty, arriveDay, startAge}]
    loan: 0,
    everTookLoan:false,
    event: null,            // {type, daysLeft, data}
    seasonsSeen:[true,false,false,false],
    regulars: [],           // visit counts
    rival: null,            // {open, prices:{}, undercutStreak, dominateDays, closed}
    speed: 1,
    // ---- lifetime + per-period stats (persisted) ----
    stats: {
      itemsSold:0, soldBy:{}, itemsSpoiled:0, spoiledBy:{}, customersTotal:0,
      revenue:0, profit:0, marketingSpend:0, campaigns:0,
      flyerRuns:0, radioRuns:0, socialRuns:0,
      bananaRevenue:0, bananasStocked:0, unitsStockedEver:0,
      veganSold:0, nonVeganSold:0,
      bestDayRev:0, bestDayProfit:0, profitStreak:0, flawlessStreak:0,
      noSpoilStreak:0, noEmptyStreak:0,
      markdownsLife:0, maxRegular:0, stockerMaxTenure:0, empHiredEver:0,
      eventsProfited:{}, lostLineEver:false, viral:false, loanPaidOff:false,
    },
    // ---- sticky one-shot flags (persisted) ----
    flags: { soldAt3x:false, soldAt5x:false, soldBelowCost:false, soldPeakFresh:false,
             soldLastLeg:false, mkdnDayBefore:false, offSeasonProfit:false,
             optimalHit:false, bottleneckHire:false, rivalClosed:false,
             veganLocked:false, bulkMaxOrder:false, jitSameDay:false,
             bigSpender:false, lastDollar:false, wetFloor:false },
    // ---- achievements: id -> {un:true, day} ----
    ach: {},
    // ---- per-day scratch (persisted so reload mid-day is consistent) ----
    today: null,
    createdAtDay:1,
  };
}

function freshDay(){
  return {
    customers:0, served:0, lostLine:0, revenue:0, cogs:0, spoiled:0,
    markdowns:0, emergencies:0, emptyShelf:false, wages:0, rent:0, mktSpend:0,
    interest:0, spoilLoss:0, eventType:(S.event?S.event.type:null),
    priceChanges:{}, soldOut:{}, stockedSet:{}, scheduled:0, processed:0,
    inspectResult:null,
  };
}

/* ============================================================================
   ==============================  PERSISTENCE  ===============================
   ============================================================================ */
let saveTimer=0;
function save(){ try{ localStorage.setItem(C.SAVE_KEY, JSON.stringify(S)); }catch(e){} }
function queueSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(save,400); }
function load(){
  try{
    const raw = localStorage.getItem(C.SAVE_KEY);
    if(!raw) return false;
    const o = JSON.parse(raw);
    if(!o || o.v!==C.VERSION) return false;
    S = o;
    // make sure newer catalog products exist on older saves of same version
    CATALOG.forEach(p=>{ if(!S.products[p.id]) S.products[p.id]={price:+marketPrice(p).toFixed(2),batches:[],spoiled:0,front:false,soldToday:0,noSaleDays:0,soldOutToday:false}; });
    // prune any products / deliveries no longer in the catalog (defensive — avoids CAT[id] crashes)
    for(const id in S.products){ if(!CAT[id]) delete S.products[id]; }
    S.deliveries = (S.deliveries||[]).filter(d=>CAT[d.pid]);
    if(!S.flags) S.flags = freshState().flags;
    if(S.flags.wetFloor===undefined) S.flags.wetFloor=false;
    if(!S.today) S.today = freshDay();
    return true;
  }catch(e){ return false; }
}
function resetGame(){
  localStorage.removeItem(C.SAVE_KEY);
  S = freshState(); S.today = freshDay();
  RT.sessionDays=0;
  closePanel(); closeModal();
  startDay(true);
  fullRender();
  save();
}

/* ============================================================================
   ============================  HELPERS / MATH  ==============================
   ============================================================================ */
const rnd = Math.random;
function rint(a,b){ return Math.floor(rnd()*(b-a+1))+a; }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function money(n){
  const neg=n<0; n=Math.abs(n);
  let s;
  if(n>=1e9) s='$'+(n/1e9).toFixed(2)+'B';
  else if(n>=1e6) s='$'+(n/1e6).toFixed(2)+'M';
  else if(n>=10000) s='$'+Math.round(n).toLocaleString();
  else s='$'+ (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:(n%1?2:0),maximumFractionDigits:2});
  return (neg?'-':'')+s;
}
function money0(n){ return '$'+Math.round(n).toLocaleString(); }
function fmtStock(n){ return n>=10000 ? (n/1000).toFixed(n>=100000?0:1)+'k' : n.toLocaleString(); }
function tier(){ return C.TIERS[S.tier]; }
function isVegan(p){ return CAT[p].vegan; }
function inSeason(pid){ return CAT[pid].seasons.includes(S.season); }

function units(pid){ const pr=S.products[pid]; let n=0; for(const b of pr.batches) n+=b.qty; return n; }
function totalUnits(){ let n=0; for(const id in S.products) n+=units(id); return n; }
function totalSpoiledSitting(){ let n=0; for(const id in S.products) n+=S.products[id].spoiled; return n; }
function distinctStocked(){ let n=0; for(const id in S.products) if(units(id)>0) n++; return n; }
// slots a player can actually fill = min(store slots, products unlocked at this tier)
function slotsFillable(){ return Math.min(tier().slots, CATALOG.filter(p=>p.tier<=S.tier).length); }

function effShelf(pid){
  const p=CAT[pid];
  let s = p.shelf * (1 + S.refrig*C.REFRIG_STEP);
  s *= inSeason(pid)?C.IN_SEASON_FRESH:C.OFF_SEASON_FRESH;
  if(S.event && S.event.type==='heatwave') s *= 0.82;
  return Math.max(1, Math.round(s));
}
// remaining freshness fraction (0..1), qty-weighted across batches
function freshFrac(pid){
  const pr=S.products[pid]; const sh=effShelf(pid); let tot=0,acc=0;
  for(const b of pr.batches){ const rem=clamp((sh-b.age)/sh,0,1); acc+=rem*b.qty; tot+=b.qty; }
  return tot? acc/tot : 1;
}
function freshColor(f){ return f>0.6?'var(--fresh)':(f>0.32?'var(--aging)':(f>0.12?'var(--stale)':'var(--rotten)')); }

function effWholesale(pid, supKey){
  const p=CAT[pid]; let c=p.wholesale;
  c *= inSeason(pid)?C.IN_SEASON_COST:C.OFF_SEASON_COST;
  if(supKey){ c *= C.SUPPLIERS[supKey].costMult; c *= (1 - 0.06*S.supply.bulk); }
  return c;
}
function netWorth(){
  let inv=0;
  for(const id in S.products){ inv += units(id)*CAT[id].wholesale; }
  return S.cash + inv + tier().value - S.loan;
}

/* ============================================================================
   ==============================  DAY ENGINE  ================================
   ============================================================================ */
function startDay(initial){
  // season rollover
  const newSeason = Math.floor((S.day-1)/C.SEASON_LEN) % 4;
  if(newSeason !== S.season || initial){ S.season=newSeason; S.seasonsSeen[newSeason]=true; }
  // event roll (skip on the very first day)
  if(!initial){
    if(S.event && S.event.daysLeft>1){ S.event.daysLeft--; }
    else { S.event = rollEvent(); }
  } else if(!S.event){ S.event=null; }
  // reset per-product daily markers
  for(const id in S.products){ S.products[id].soldToday=0; S.products[id].soldOutToday=false; }
  // expire marketing campaigns (count down the days they stay active)
  if(!initial){ ['flyers','radio','social'].forEach(k=>{ if(S.marketing[k].active){ S.marketing[k].days--; if(S.marketing[k].days<=0){ S.marketing[k].active=false; S.marketing[k].days=0; } } }); }
  S.today = freshDay();
  updateRivalDaily();   // refresh rival before computeCustomers reads its prices
  // schedule today's customers
  S.today.customers = computeCustomers();
  // record products that begin the day stocked (for "Cleaned Out")
  for(const id in S.products){ if(units(id)>0) S.today.stockedSet[id]=true; }
  RT.dayClock=0; RT.lastFrame=performance.now();
  syncTop(); renderShelfStatic(); refreshPanelIfOpen();
  if(S.event && !initial) announceEvent(S.event);
  checkAch();
}

// Resume a loaded, in-progress day without recreating S.today. This preserves
// already-banked revenue and the day's processed-customer count so reloading
// mid-day cannot re-run (re-farm) the day, and same-day achievement progress
// (markdowns, price changes, emergency restocks, served) survives a reload.
function resumeDay(){
  if(!S.today) S.today = freshDay();
  if(S.today.customers===undefined || S.today.customers===null) S.today.customers = computeCustomers();
  RT.dayClock = 0; RT.lastFrame = performance.now();
  syncTop(); renderShelfStatic(); refreshPanelIfOpen();
  checkAch();
}

function rollEvent(){
  if(rnd()>C.EVENT_CHANCE) return null;
  // weighted pick
  let total=0; const W=C.EVENT_WEIGHTS;
  C.EVENTS.forEach(e=>total+=W[e]);
  let r=rnd()*total, pick=C.EVENTS[0];
  for(const e of C.EVENTS){ r-=W[e]; if(r<=0){ pick=e; break; } }
  const ev={type:pick, daysLeft:1, data:{}};
  if(pick==='craze'){
    const avail=CATALOG.filter(p=>p.tier<=S.tier);
    ev.data.pid = avail[rint(0,avail.length-1)].id;
  } else if(pick==='disruption'){
    ev.daysLeft=rint(2,3);
    const opts=['distributor','depot','coop'].filter(k=>C.SUPPLIERS[k].tier<=S.tier);
    ev.data.supplier = opts.length?opts[rint(0,opts.length-1)]:'distributor';
  } else if(pick==='heatwave'){ ev.daysLeft=rint(1,2); }
  return ev;
}

function computeCustomers(){
  let base = tier().traffic;
  // reputation multiplier 0.4..1.8
  const repMult = 0.4 + (S.rep/100)*1.4;
  base *= repMult;
  // marketing — diminishing across active channels
  let mboost=0, idx=0;
  ['social','radio','flyers'].forEach(k=>{ if(S.marketing[k].active){ mboost += C.MKT[k].boost*Math.pow(C.MKT_DIMINISH,idx); idx++; } });
  base *= (1+mboost);
  // loyalty members (capped so it can't run away)
  if(S.marketing.loyalty) base *= (1 + clamp((S.loyaltyMembers/100)*C.LOYALTY_BOOST_PER_100, 0, C.LOYALTY_BOOST_MAX));
  // event modifiers
  const ev=S.event;
  if(ev){
    if(ev.type==='festival') base*=C.FESTIVAL_MULT;
    else if(ev.type==='heatwave') base*=C.HEATWAVE_MULT;
    else if(ev.type==='badpress') base*=C.BADPRESS_MULT;
  }
  // rival steals a share
  if(S.rival && S.rival.open && !S.rival.closed){
    base *= clamp(1 - rivalShare(), 0.35, 1);
  }
  // seasonal foot traffic wobble + noise
  base *= (0.9 + rnd()*0.2);
  return Math.max(0, Math.round(base));
}

// fraction of customers the rival pulls away (0..~0.5)
function rivalShare(){
  if(!S.rival||!S.rival.open||S.rival.closed) return 0;
  // compare average price ratio across shared products + rep
  let myAvg=0,rvAvg=0,n=0;
  for(const id in S.rival.prices){ if(units(id)>0){ myAvg+=S.products[id].price; rvAvg+=S.rival.prices[id]; n++; } }
  let priceEdge=0;
  if(n){ myAvg/=n; rvAvg/=n; priceEdge=(myAvg-rvAvg)/rvAvg; } // >0 means you're pricier
  const repEdge=(70 - S.rep)/100; // higher your rep, less share lost
  return clamp(0.28 + priceEdge*0.25 + repEdge*0.2, 0.05, 0.55);
}

/* ---- in-frame customer processing ---- */
function processCustomers(n){
  const T=S.today;
  const avail = CATALOG.filter(p=>p.tier<=S.tier);
  // build desire weights (independent of stock, so OOS => empty-shelf signal)
  const weights=[]; let wsum=0;
  for(const p of avail){
    let w=p.demand;
    if(inSeason(p.id)) w*=C.IN_SEASON_DEMAND; else w*=C.OFF_SEASON_DEMAND;
    const ev=S.event;
    if(ev){
      if(ev.type==='craze' && ev.data.pid===p.id) w*=4.0;
      else if(ev.type==='heatwave' && C.HEATWAVE_HOT.includes(p.id)) w*=2.1;
      else if(ev.type==='heatwave') w*=0.9;
      else if(ev.type==='coldsnap' && C.COLDSNAP_HARDY.includes(p.id)) w*=1.8;
      else if(ev.type==='coldsnap') w*=0.85;
    }
    weights.push(w); wsum+=w;
  }
  const capacity = C.CUST_BASE_CAPACITY + countStaff('cashier')*C.CUST_PER_CASHIER;
  const basket = C.BASKET_BASE + S.tier*C.BASKET_PER_TIER + (S.marketing.loyalty?C.BASKET_LOYALTY:0);

  for(let i=0;i<n;i++){
    T.processed++;
    // line / checkout capacity: beyond capacity, rising chance to abandon
    if(T.served >= capacity){
      const over=(T.served-capacity)/Math.max(20,capacity);
      if(rnd() < clamp(0.35+over*0.5,0,0.95)){ T.lostLine++; S.stats.lostLineEver=true; continue; }
    }
    // pick desired product
    let r=rnd()*wsum, di=0; for(;di<avail.length;di++){ r-=weights[di]; if(r<=0) break; }
    if(di>=avail.length) di=avail.length-1;
    const p=avail[di]; const pr=S.products[p.id];
    // price-based purchase probability
    const rel = pr.price / marketPrice(p);
    let buyProb = clamp(1 - C.ELASTICITY*(rel-1), 0.02, 1.6);
    buyProb *= (0.6 + freshFrac(p.id)*0.4);     // fresher sells better
    if(units(p.id)<=0){
      // wanted it, none in stock -> empty shelf
      T.emptyShelf=true;
      continue;
    }
    if(rnd()>clamp(buyProb,0,0.98)) { T.served++; continue; } // browsed, didn't buy
    // BUY: basket quantity, capped by stock
    let want = Math.max(1, Math.round(basket*(0.6+rnd()*0.9)));
    want = Math.min(want, units(p.id));
    const got = sellUnits(p.id, want, false);
    T.served++; S.stats.customersTotal++;
  }
}

// sell `qty` of pid from oldest batches first; returns units actually sold
function sellUnits(pid, qty, isMarkdown){
  const p=CAT[pid], pr=S.products[pid], T=S.today;
  let sold=0, revenue=0, cogs=0;
  const sh=effShelf(pid);
  // sort oldest-first
  pr.batches.sort((a,b)=>b.age-a.age);
  const price = isMarkdown ? Math.max(p.wholesale*0.7, pr.price*0.5) : pr.price;
  while(qty>0 && pr.batches.length){
    const b=pr.batches[0];
    const take=Math.min(qty,b.qty);
    // freshness-driven achievement flags
    if(!isMarkdown){
      if(b.age<=0) S.flags.soldPeakFresh=true;
      if(b.age>=sh-1) S.flags.soldLastLeg=true;
    }
    b.qty-=take; qty-=take; sold+=take;
    revenue += take*price; cogs += take*p.wholesale;
    if(b.qty<=0) pr.batches.shift();
  }
  if(sold>0){
    S.cash += revenue;
    T.revenue += revenue; T.cogs += cogs;
    S.stats.revenue += revenue;
    S.stats.itemsSold += sold;
    S.stats.soldBy[pid]=(S.stats.soldBy[pid]||0)+sold;
    pr.soldToday += sold; pr.noSaleDays=0;
    T.stockedSet[pid]=true;
    // vegan tracking
    if(isVegan(pid)) S.stats.veganSold+=sold;
    else { S.stats.nonVeganSold+=sold; S.flags.veganLocked=true; }
    if(pid==='banana') S.stats.bananaRevenue += revenue;
    // pricing flags
    const mult = pr.price/p.wholesale;
    if(!isMarkdown){
      if(mult>=3) S.flags.soldAt3x=true;
      if(mult>=5) S.flags.soldAt5x=true;
      if(pr.price < p.wholesale) S.flags.soldBelowCost=true;
      if(!inSeason(pid) && pr.price>effWholesale(pid)) S.flags.offSeasonProfit=true;
    }
    // sold out?
    if(units(pid)<=0){ pr.soldOutToday=true; T.soldOut[pid]=true; }
    // floating feedback at tile
    floatSale(pid, revenue, isMarkdown);
    RT.dirtyTiles[pid]=true;
  }
  return sold;
}

function countStaff(type){ return S.staff.filter(e=>e.type===type).length; }

function endDay(){
  const T=S.today;
  // --- age inventory & spoil ---
  let spoiledToday=0, spoilLoss=0;
  const spoilCut = Math.min(0.7, countStaff('stocker')*C.STOCKER_SPOIL_CUT);
  for(const id in S.products){
    const pr=S.products[id]; const sh=effShelf(id);
    const keep=[];
    for(const b of pr.batches){
      b.age++;
      if(b.age>=sh){
        // Stockers can "save" a fraction of an expiring batch; the rest spoils.
        // floor() on the SAVED side guarantees a 1-unit batch always fully resolves
        // (saved=0, lost=1) so no immortal never-spoiling ghost unit can form, and
        // spoilage stats / no-spoil streaks stay honest.
        const saved = spoilCut>0 ? Math.floor(b.qty*spoilCut) : 0;
        const lost = b.qty - saved;
        if(lost>0){
          pr.spoiled += lost;
          spoiledToday += lost; spoilLoss += lost*CAT[id].wholesale;
          S.stats.itemsSpoiled += lost;
          S.stats.spoiledBy[id]=(S.stats.spoiledBy[id]||0)+lost;
          if(id==='banana' && lost===1 && !S.flags.wetFloor) S.flags.wetFloor=true; // #100 one-shot
        }
        if(saved>0) keep.push({qty:saved, age:sh-1}); // saved units get one more day
      } else keep.push(b);
    }
    pr.batches=keep;
    // Hoarder streak: increment only when stocked with no sale today, else reset
    if(units(id)>0 && pr.soldToday===0) pr.noSaleDays++; else pr.noSaleDays=0;
  }
  T.spoiled=spoiledToday; T.spoilLoss=spoilLoss;

  // stockers auto-toss sitting spoilage
  const tossRate=Math.min(0.95, countStaff('stocker')*C.STOCKER_TOSS);
  if(tossRate>0){ for(const id in S.products){ S.products[id].spoiled=Math.floor(S.products[id].spoiled*(1-tossRate)); } }

  // --- expenses: rent, wages, marketing, interest ---
  // (campaign costs were already charged at purchase time in runCampaign — only the
  //  recurring loyalty fee is swept here, so marketing is never double-charged.)
  T.rent = tier().rent;
  T.wages = countStaff('cashier')*C.WAGE_CASHIER + countStaff('stocker')*C.WAGE_STOCKER;
  let loyaltyCost = 0;
  if(S.marketing.loyalty){ loyaltyCost = C.LOYALTY_COST; T.mktSpend += loyaltyCost; S.stats.marketingSpend += loyaltyCost; }
  T.interest = S.loan*C.LOAN_INTEREST;
  S.loan += T.interest;
  const expenses = T.rent + T.wages + loyaltyCost + T.interest;
  S.cash -= expenses;

  // --- day profit (economic) ---
  const dayProfit = T.revenue - T.cogs - T.spoilLoss - T.rent - T.wages - T.mktSpend - T.interest;
  S.stats.profit += dayProfit;
  if(T.revenue>S.stats.bestDayRev) S.stats.bestDayRev=T.revenue;
  if(dayProfit>S.stats.bestDayProfit) S.stats.bestDayProfit=dayProfit;
  S.stats.profitStreak = dayProfit>0 ? S.stats.profitStreak+1 : 0;

  // --- streaks ---
  const hadStock = Object.keys(T.stockedSet).length>0;
  if(hadStock && spoiledToday===0) S.stats.noSpoilStreak++; else S.stats.noSpoilStreak=0;
  if(!T.emptyShelf) S.stats.noEmptyStreak++; else S.stats.noEmptyStreak=0;
  if(hadStock && spoiledToday===0 && !T.emptyShelf) S.stats.flawlessStreak++; else S.stats.flawlessStreak=0;

  // --- health inspection resolution ---
  if(S.event && S.event.type==='inspection'){
    const sitting=totalSpoiledSitting();
    if(sitting>C.INSPECT_FAIL_SPOIL || S.rep<25){
      T.inspectResult='fail'; S.rep=clamp(S.rep-15,0,100); S.cash-=200;
      toast('🚫','Health inspection FAILED — fined $200 & rep hit.','bad');
    } else { T.inspectResult='pass'; S.rep=clamp(S.rep+5,0,100);
      toast('✅','Passed the health inspection! +reputation','good'); }
  }
  if(S.event && S.event.type==='badpress'){ S.rep=clamp(S.rep+C.BADPRESS_REP,0,100); }

  // --- reputation target & lerp ---
  updateReputation(T);

  // --- loyalty member growth ---
  if(S.marketing.loyalty){ S.loyaltyMembers += Math.floor(T.served*C.LOYALTY_JOIN_RATE)+ (T.served>0?1:0); }

  // --- regulars (Regulars achievement) ---
  if(S.rep>45 || S.marketing.loyalty){
    if(S.regulars.length<12 && rnd()<0.35) S.regulars.push(0);
    for(let i=0;i<S.regulars.length;i++){ if(rnd()<clamp(0.35+S.rep/250,0,0.9)) S.regulars[i]++; }
    S.stats.maxRegular=Math.max(S.stats.maxRegular, ...S.regulars, 0);
  }

  // --- stocker tenure ---
  S.staff.forEach(e=>{ if(e.type==='stocker'){ const t=S.day-e.hireDay; if(t>S.stats.stockerMaxTenure) S.stats.stockerMaxTenure=t; } });

  // --- event-profit tracking (Storm Chaser) ---
  if(dayProfit>0 && S.event){ S.stats.eventsProfited[S.event.type]=true; }

  // --- last-dollar survival ---
  if(S.cash>=0 && S.cash<10) S.flags.lastDollar=true;

  // --- emergency loan if bankrupt (no hard fail) ---
  if(S.cash<0){
    const need=Math.ceil((-S.cash)/C.LOAN_INCREMENT)*C.LOAN_INCREMENT;
    S.loan+=need; S.cash+=need; S.everTookLoan=true;
    toast('🏦','Emergency loan of '+money0(need)+' taken to stay afloat.','event');
  }

  T.daySnapshotProfit=dayProfit;
  // record this day's "today" before advancing for end-of-day achievement checks
  checkAchEndOfDay(T, dayProfit);

  // --- deliveries arriving ---
  S.day++;
  RT.sessionDays=(RT.sessionDays||0)+1;
  const arrived=[];
  S.deliveries = S.deliveries.filter(d=>{
    if(d.arriveDay<=S.day){ receiveDelivery(d); arrived.push(d); return false; }
    return true;
  });
  if(arrived.length) toast('📦','Delivery arrived: '+arrived.map(d=>units2(d.qty)+' '+CAT[d.pid].name).join(', '),'good');

  checkAch();
  save();
  startDay(false);
}
function units2(n){ return n; }

function updateReputation(T){
  // availability: 1 - emptyShelfPenalty
  const avail = T.emptyShelf ? 0.55 : 1.0;
  // freshness: avg fresh frac across stocked
  let fr=0,fn=0; for(const id in S.products){ if(units(id)>0){ fr+=freshFrac(id); fn++; } }
  const freshness = fn? fr/fn : 0.7;
  // price fairness: avg price vs market (cheaper => better, but with floor)
  let pr=0,pn=0; for(const id in S.products){ if(units(id)>0){ pr += S.products[id].price/marketPrice(CAT[id]); pn++; } }
  const relPrice = pn? pr/pn : 1;
  const priceFair = clamp(1.6 - relPrice*0.6, 0, 1); // 1.0 at/below market, ~0.83 at optimal, low when gouging
  // variety
  const variety = clamp(distinctStocked()/Math.max(1,tier().slots),0,1);
  // spoilage penalty (sitting + today)
  const spoilPen = clamp(1 - (totalSpoiledSitting()+T.spoiled)/60, 0, 1);
  let target = (C.REP_W_AVAIL*avail + C.REP_W_FRESH*freshness + C.REP_W_PRICE*priceFair +
                  C.REP_W_VARIETY*variety + C.REP_W_SPOIL*spoilPen);
  // weights sum to 100; the ×1.05 lets a near-flawless store crest 100 so max
  // reputation (Local Celebrity) is attainable through excellent — not perfect — play.
  target = Math.min(100, target*1.05);
  S.rep = clamp(S.rep + (target - S.rep)*C.REP_LERP, 0, 100);
}

function receiveDelivery(d){
  const pr=S.products[d.pid];
  pr.batches.push({qty:d.qty, age:d.startAge});
  S.stats.unitsStockedEver += d.qty;
  if(d.pid==='banana') S.stats.bananasStocked += d.qty;
  // if it had sold out today and arrives same day -> JIT
  if(pr.soldOutToday && d.arriveDay===S.day) S.flags.jitSameDay=true;
}

/* ---- rival store ---- */
function updateRivalDaily(){
  // open rival
  if(!S.rival && (S.day>=C.RIVAL_OPEN_DAY || S.tier>=2)){
    S.rival={open:true, prices:{}, undercutStreak:0, dominateDays:0, closed:false};
    toast('🏪','A rival grocer opened down the street! Compete on price & reputation.','event');
  }
  if(!S.rival||S.rival.closed) return;
  // rival prices shared (produce up to your tier) slightly under market with noise
  const shared=CATALOG.filter(p=>p.tier<=S.tier);
  shared.forEach(p=>{ S.rival.prices[p.id]=+(marketPrice(p)*(0.85+rnd()*0.2)).toFixed(2); });
  // undercut streak: are you beating rival on every shared product?
  let beatAll=true, any=false;
  for(const p of shared){ if(units(p.id)>0){ any=true; if(S.products[p.id].price>=S.rival.prices[p.id]) beatAll=false; } }
  if(any && beatAll) S.rival.undercutStreak++; else S.rival.undercutStreak=0;
  // dominance: better rep AND beating on price share
  if(S.rep>62 && rivalShare()<0.22){ S.rival.dominateDays++; } else { S.rival.dominateDays=Math.max(0,S.rival.dominateDays-1); }
  if(S.rival.dominateDays>=C.RIVAL_CLOSE_DAYS){ S.rival.closed=true; S.flags.rivalClosed=true; toast('🏆','The rival store CLOSED for good. You own this town!','good'); }
}

function announceEvent(ev){
  const m={
    heatwave:['🔥','Heatwave! Cold & juicy items are flying off the shelves.'],
    craze:['🤳','Food craze: '+(ev.data.pid?CAT[ev.data.pid].name:'an item')+' is suddenly everywhere!'],
    festival:['🎪','Street festival nearby — huge foot traffic today!'],
    disruption:['⛔','Supplier disruption: '+(ev.data.supplier?C.SUPPLIERS[ev.data.supplier].name:'a supplier')+' is down for '+ev.daysLeft+' day(s).'],
    badpress:['📰','Bad press! Fewer customers and a reputation ding today.'],
    inspection:['🧑‍⚕️','Health inspector is in today — keep spoilage low!'],
    coldsnap:['🥶','Cold snap — hearty staples are in demand.'],
  };
  const x=m[ev.type]; if(x) toast(x[0],x[1],'event');
}

/* ============================================================================
   ===========================  PLAYER ACTIONS  ===============================
   ============================================================================ */
function canStock(pid){
  // can we put this product on a shelf slot? (already stocked OR slots free)
  if(units(pid)>0 || S.products[pid].batches.length>0) return true;
  // count distinct slots in use (units or incoming-but-shelved). incoming deliveries don't take a slot until arrival
  return distinctStocked() < tier().slots;
}
function capRemaining(){ return tier().cap - totalUnits(); }

// QUICK restock at the counter (instant, premium price) -> emergency
function quickRestock(pid, qty){
  qty=Math.floor(qty); if(qty<=0) return;
  if(!canStock(pid)){ toast('🚫','No free shelf slot. Sell out or pick a stocked item.','bad'); return; }
  const room=capRemaining(); if(room<=0){ toast('🚫','Shelves are full!','bad'); return; }
  qty=Math.min(qty, room);
  const unit=effWholesale(pid,'quick');
  let cost=qty*unit;
  if(cost>S.cash){ qty=Math.floor(S.cash/unit); cost=qty*unit; }
  if(qty<=0){ toast('💸','Not enough cash.','bad'); return; }
  const before=S.cash;
  S.cash-=cost;
  S.products[pid].batches.push({qty, age:0});
  S.stats.unitsStockedEver+=qty; if(pid==='banana') S.stats.bananasStocked+=qty;
  S.today.emergencies++; S.today.scheduled++;
  // big spender check
  if(before>0 && S.cash<1 && cost>=before*0.95) S.flags.bigSpender=true;
  // JIT same-day if it had sold out
  if(S.products[pid].soldOutToday) S.flags.jitSameDay=true;
  toast('⚡','Quick-stocked '+qty+' '+CAT[pid].name+' for '+money(cost)+'.','good');
  RT.dirtyTiles[pid]=true; syncTop(); renderShelfStatic(); refreshPanelIfOpen(); checkAch(); queueSave();
}

// SUPPLIER order (delayed delivery, cheaper)
function supplierOrder(pid, qty, supKey){
  const sup=C.SUPPLIERS[supKey];
  qty=Math.floor(qty);
  if(supKey==='coop' && !S.supply.coopSigned){ toast('🚫','Sign the Co-op contract first (Store tab).','bad'); return; }
  if(S.event && S.event.type==='disruption' && S.event.data.supplier===supKey){ toast('⛔','That supplier is disrupted right now.','bad'); return; }
  if(qty<sup.min){ toast('🚫','Minimum order for this supplier is '+sup.min+'.','bad'); return; }
  if(qty>sup.max) qty=sup.max;
  if(!canStock(pid)){ toast('🚫','No free shelf slot for a new product.','bad'); return; }
  // capacity check against current + already-incoming for this product is loose; just cap by store cap on arrival
  const unit=effWholesale(pid,supKey);
  let cost=qty*unit;
  if(cost>S.cash){ toast('💸','Not enough cash for that order ('+money(cost)+').','bad'); return; }
  const before=S.cash;
  S.cash-=cost;
  let startAge = -(sup.fresh) - S.supply.reefer;       // more fresh = more negative age
  const days = S.supply.jit?0:sup.days;
  const arrive = S.day + days;
  if(days===0){ // arrives instantly
    S.products[pid].batches.push({qty,age:startAge});
    S.stats.unitsStockedEver+=qty; if(pid==='banana') S.stats.bananasStocked+=qty;
    if(S.products[pid].soldOutToday) S.flags.jitSameDay=true;
    toast(sup.emoji,'Received '+qty+' '+CAT[pid].name+' instantly (JIT).','good');
  } else {
    S.deliveries.push({pid,qty,arriveDay:arrive,startAge});
    toast(sup.emoji,'Ordered '+qty+' '+CAT[pid].name+' — arrives day '+arrive+'.','good');
  }
  if(qty===sup.max) S.flags.bulkMaxOrder=true;
  if(before>0 && S.cash<1 && cost>=before*0.95) S.flags.bigSpender=true;
  syncTop(); renderShelfStatic(); refreshPanelIfOpen(); checkAch(); queueSave();
}

function setPrice(pid, price){
  price=Math.max(0.01, +price);
  const pr=S.products[pid];
  if(Math.abs(price-pr.price)<0.001) return;
  pr.price=+price.toFixed(2);
  S.today.priceChanges[pid]=(S.today.priceChanges[pid]||0)+1;
  if(Math.abs(pr.price-optimalPrice(CAT[pid]))/optimalPrice(CAT[pid]) <= C.PRICE_TOL) S.flags.optimalHit=true;
  RT.dirtyTiles[pid]=true; checkAch(); queueSave();
}

function markdown(pid){
  const pr=S.products[pid]; if(units(pid)<=0){ toast('🚫','Nothing to mark down.','bad'); return; }
  // mark down the OLDEST batch — quick low-margin clearance of aging stock
  pr.batches.sort((a,b)=>b.age-a.age);
  const sh=effShelf(pid); const oldest=pr.batches[0];
  if(oldest && oldest.age>=sh-1) S.flags.mkdnDayBefore=true;   // day before spoilage
  const qty=Math.min(units(pid), Math.max(1, Math.ceil(units(pid)*0.5)));
  const sold=sellUnits(pid, qty, true);
  S.today.markdowns+=sold; S.stats.markdownsLife+=sold;
  toast('🏷️','Marked down '+sold+' '+CAT[pid].name+' for a quick sale.','good');
  RT.dirtyTiles[pid]=true; syncTop(); refreshPanelIfOpen(); checkAch(); queueSave();
}

function tossSpoiled(pid){
  const pr=S.products[pid]; if(pr.spoiled<=0) return;
  pr.spoiled=0; renderShelfStatic(); refreshPanelIfOpen(); queueSave();
}

function upgradeTier(){
  if(S.tier>=C.TIERS.length-1){ toast('🏙️','Already at the maximum tier — Empire!','good'); return; }
  const next=C.TIERS[S.tier+1];
  if(S.cash<next.cost){ toast('💸','Need '+money(next.cost)+' to upgrade.','bad'); return; }
  S.cash-=next.cost; S.tier++;
  toast('🎉','Upgraded to '+next.name+'! More slots, traffic & products.','good');
  try{ flashScreen(); fireConfetti(); beep(); }catch(e){}
  syncTop(); renderShelfStatic(); refreshPanelIfOpen(); checkAch(); queueSave();
}

function buyRefrig(){
  if(S.refrig>=C.REFRIG_MAX) return;
  const cost=C.REFRIG_COST[S.refrig+1];
  if(S.cash<cost){ toast('💸','Need '+money(cost)+'.','bad'); return; }
  S.cash-=cost; S.refrig++;
  toast('❄️','Refrigeration upgraded to level '+S.refrig+'.','good');
  refreshPanelIfOpen(); renderShelfStatic(); checkAch(); queueSave();
}

function signCoop(){
  if(S.supply.coopSigned) return;
  S.supply.coopSigned=true; toast('🚜','Signed the Local Farm Co-op contract!','good');
  refreshPanelIfOpen(); checkAch(); queueSave();
}
function buySupplyUp(key){
  const u=C.SUPPLY_UP[key]; const lvl=S.supply[key];
  if(lvl>=u.max) return;
  const cost=u.cost[lvl+1];
  if(S.cash<cost){ toast('💸','Need '+money(cost)+'.','bad'); return; }
  S.cash-=cost; S.supply[key]++;
  toast('🚚',u.name+' upgraded.','good');
  refreshPanelIfOpen(); checkAch(); queueSave();
}

function runCampaign(key){
  const m=C.MKT[key];
  if(S.cash<m.cost){ toast('💸','Need '+money(m.cost)+'.','bad'); return; }
  S.cash-=m.cost; S.today.mktSpend+=m.cost; S.stats.marketingSpend+=m.cost; S.stats.campaigns++;
  S.marketing[key].active=true; S.marketing[key].days=m.days;
  S.rep=clamp(S.rep+m.repBoost,0,100);
  if(key==='flyers') S.stats.flyerRuns++;
  if(key==='radio') S.stats.radioRuns++;
  if(key==='social'){ S.stats.socialRuns++;
    if(rnd()<C.SOCIAL_VIRAL_CHANCE){ S.stats.viral=true; S.today.customers=Math.round(S.today.customers*1.8); toast('🚀','Your post went VIRAL! Massive traffic spike today!','good'); }
  }
  toast(m.emoji,'Ran a '+m.name+' campaign ('+m.days+' days).','good');
  refreshPanelIfOpen(); syncTop(); checkAch(); queueSave();
}
function toggleLoyalty(){
  S.marketing.loyalty=!S.marketing.loyalty;
  toast('💳', S.marketing.loyalty?'Loyalty program launched!':'Loyalty program paused.', 'event');
  refreshPanelIfOpen(); checkAch(); queueSave();
}

function hire(type){
  if(S.staff.length>=tier().maxEmp){ toast('🚫','No room on payroll at this tier.','bad'); return; }
  S.staff.push({type, hireDay:S.day});
  S.stats.empHiredEver++;
  if(type==='cashier' && S.stats.lostLineEver) S.flags.bottleneckHire=true;
  toast(type==='cashier'?'🧑‍💼':'📦','Hired a '+type+'.','good');
  refreshPanelIfOpen(); checkAch(); queueSave();
}
function fire(idx){ S.staff.splice(idx,1); refreshPanelIfOpen(); checkAch(); queueSave(); }

function takeLoan(){
  S.loan+=C.LOAN_INCREMENT; S.cash+=C.LOAN_INCREMENT; S.everTookLoan=true;
  toast('🏦','Took a '+money0(C.LOAN_INCREMENT)+' loan.','event');
  syncTop(); refreshPanelIfOpen(); queueSave();
}
function repayLoan(){
  const pay=Math.min(S.loan, S.cash);
  if(pay<=0) return;
  const wasOwed=S.loan;
  S.cash-=pay; S.loan-=pay;
  if(S.loan<0.01){ S.loan=0; if(wasOwed>0) S.stats.loanPaidOff=true; toast('✅','Loan paid off in full!','good'); }
  else toast('🏦','Paid '+money(pay)+' toward loan.','good');
  syncTop(); refreshPanelIfOpen(); checkAch(); queueSave();
}

// end-of-day specific computed flags, then run checkAch
function checkAchEndOfDay(T, dayProfit){
  if(dayProfit>0) RT.everProfitDay=true;
  // waste not: completed day, had stock, zero spoilage
  RT.wasteNot = (Object.keys(T.stockedSet).length>0 && T.spoiled===0);
  // cleaned out: every product that was stocked today is now 0, and >=1 such product, and we actually sold today
  const stockedIds=Object.keys(T.stockedSet);
  RT.cleanedOut = stockedIds.length>0 && T.revenue>0 && stockedIds.every(id=>units(id)<=0);
  // people's grocer: profit & every stocked product priced below market
  RT.peoplesGrocer = dayProfit>0 && stockedIds.length>0 && stockedIds.every(id=> S.products[id].price < marketPrice(CAT[id]));
  // overstaffed
  RT.overstaffed = T.wages>0 && T.wages>T.revenue;
  // event-driven
  RT.trendsetter = (T.eventType==='craze' && T.revenue>0 && T.revenue>=S.stats.bestDayRev-0.001);
  RT.disasterRecovery = (T.eventType==='disruption' && !T.emptyShelf);
  RT.passedInspect = (T.inspectResult==='pass');
  RT.failedInspect = (T.inspectResult==='fail');
  // in-season sellout: a product in season sold out today (S.season is still this
  // day's season — checkAchEndOfDay runs before the day++/season rollover in endDay)
  RT.inSeasonSellout = Object.keys(T.soldOut).some(id=>CAT[id].seasons.includes(S.season));
  checkAch();
}

// Smoothly tween a money-stat element toward a target value, flashing green/red.
const counters={};
function animCounter(el, target, fmt){
  if(!el) return;
  const key=el.id;
  let c=counters[key];
  if(!c){ c=counters[key]={cur:target, raf:0, last:target}; el.textContent=fmt(target); return; }
  if(Math.abs(target-c.cur)<0.005){ return; }
  const from=c.cur, delta=target-from;
  // flash direction, auto-clearing so default color returns. Gated by an active-flash
  // flag so a continuous stream of sales doesn't strobe every frame.
  const flash=cls=>{ if(c.flashing) return; c.flashing=true;
    el.classList.remove('flash-up','flash-down'); void el.offsetWidth; el.classList.add(cls);
    clearTimeout(c.flashTO); c.flashTO=setTimeout(()=>{ el.classList.remove('flash-up','flash-down'); c.flashing=false; },520); };
  if(target>c.last+0.01) flash('flash-up');
  else if(target<c.last-0.01) flash('flash-down');
  c.last=target;
  cancelAnimationFrame(c.raf);
  const t0=performance.now(), dur=450;
  const step=now=>{
    const p=clamp((now-t0)/dur,0,1);
    const e=1-Math.pow(1-p,3);     // easeOutCubic
    c.cur=from+delta*e;
    el.textContent=fmt(c.cur);
    if(p<1) c.raf=requestAnimationFrame(step); else { c.cur=target; el.textContent=fmt(target); }
  };
  c.raf=requestAnimationFrame(step);
}

/* ---- "What to do next" coach hint (session-only, dismissable) ---- */
// returns {key, html} for the single most relevant nudge, or null
function coachHint(){
  if(!S) return null;
  // 1) any product about to spoil?
  let spoiler=null;
  for(const id in S.products){
    const pr=S.products[id]; if(units(id)<=0) continue;
    if(freshFrac(id)<0.2){ spoiler=id; break; }
  }
  if(spoiler) return {key:'spoil', html:`<b>${CAT[spoiler].name}</b> are about to spoil — hit <b>🏷️ Sale</b> on the tile to clear them.`};
  // 2) sitting spoilage to toss
  if(totalSpoiledSitting()>0) return {key:'toss', html:`You have spoiled stock sitting out. <b>Toss</b> it (red button) — it hurts your reputation.`};
  // 3) empty store — nothing stocked
  if(totalUnits()===0) return {key:'stock', html:`Your shelves are empty. Open <b>📦 Restock</b> to buy produce and start selling.`};
  // 4) cheap tier upgrade affordable
  if(S.tier<C.TIERS.length-1 && S.cash>=C.TIERS[S.tier+1].cost) return {key:'tier', html:`You can afford to upgrade to <b>${C.TIERS[S.tier+1].name}</b> in the <b>🏪 Store</b> tab — more slots & traffic.`};
  // 5) craze / heatwave opportunity
  if(S.event){
    if(S.event.type==='craze' && S.event.data.pid) return {key:'evcraze', html:`🤳 <b>${CAT[S.event.data.pid].name}</b> are trending — stock up and raise the price!`};
    if(S.event.type==='festival') return {key:'evfest', html:`🎪 Festival traffic today — make sure your shelves are full!`};
    if(S.event.type==='inspection') return {key:'evinsp', html:`🧑‍⚕️ Inspector is in — clear spoiled stock to pass.`};
  }
  // 6) low reputation -> marketing
  if(S.rep<45 && S.cash>=C.MKT.flyers.cost && S.stats.campaigns===0) return {key:'mkt', html:`Few customers? Try a <b>📣 Marketing</b> campaign to draw a crowd.`};
  // 7) free slots & spare cash -> add variety
  if(distinctStocked()<slotsFillable() && totalUnits()>0 && S.cash>=20) return {key:'variety', html:`You have empty shelf slots — add more <b>product variety</b> to attract more shoppers.`};
  // 8) lots of cash sitting idle late game
  if(S.cash>3000 && S.tier>=C.TIERS.length-1 && S.refrig<C.REFRIG_MAX) return {key:'refrig', html:`Spare cash? Upgrade <b>refrigeration</b> (Store tab) to fight spoilage.`};
  return null;
}
let coachDismissed={};   // session-only: key -> true
let _coachLast=0;
function updateCoach(force){
  const box=document.getElementById('coach'); if(!box) return;
  // throttle: syncTop runs every frame, but the hint rarely changes
  const now=performance.now();
  if(!force && now-_coachLast<700) return;
  _coachLast=now;
  const h=coachHint();
  if(!h || coachDismissed[h.key]){ box.classList.add('hidden'); return; }
  const txt=document.getElementById('coachTxt');
  if(box.dataset.key!==h.key){ box.dataset.key=h.key; txt.innerHTML=h.html;
    box.classList.remove('hidden'); void box.offsetWidth; }
  else box.classList.remove('hidden');
}

function isHotItem(pid){
  const ev=S.event; if(!ev) return false;
  if(ev.type==='craze' && ev.data.pid===pid) return true;
  if(ev.type==='heatwave' && C.HEATWAVE_HOT.includes(pid)) return true;
  if(ev.type==='coldsnap' && C.COLDSNAP_HARDY.includes(pid)) return true;
  return false;
}
// price position vs optimal: 'ok' near-optimal, 'hi' too pricey, 'lo' too cheap
function priceStatus(pid){
  const opt=optimalPrice(CAT[pid]); const p=S.products[pid].price;
  if(Math.abs(p-opt)/opt<=0.08) return 'ok';
  return p>opt ? 'hi' : 'lo';
}

  if(S.refrig<C.REFRIG_MAX) html+=`<button class="btn" id="refrigUp" ${S.cash<C.REFRIG_COST[S.refrig+1]?'disabled':''}>${money(C.REFRIG_COST[S.refrig+1])}</button>`;
  else html+=`<span class="pill on">MAX</span>`;
  html+=`</div></div>`;

  // supply chain
  html+=`<div class="subhd">Supply Chain</div>`;
  html+=`<div class="itemRow"><div class="ic">🚜</div><div class="info"><div class="t">Local Farm Co-op Contract</div><div class="d">Unlocks the fresh, local co-op supplier.</div></div><div class="act">${S.supply.coopSigned?'<span class="pill on">signed</span>':'<button class="btn" id="signCoop">Sign (free)</button>'}</div></div>`;
  Object.keys(C.SUPPLY_UP).forEach(k=>{
    const u=C.SUPPLY_UP[k]; const lvl=S.supply[k];
    html+=`<div class="itemRow"><div class="ic">${k==='reefer'?'🚚':k==='bulk'?'💰':'⏱️'}</div><div class="info"><div class="t">${u.name} ${lvl}/${u.max}</div><div class="d">${u.desc}</div></div><div class="act">`;
    if(lvl<u.max) html+=`<button class="btn" data-supup="${k}" ${S.cash<u.cost[lvl+1]?'disabled':''}>${money(u.cost[lvl+1])}</button>`;
    else html+=`<span class="pill on">MAX</span>`;
    html+=`</div></div>`;
  });
  return html;
}

function panelStaff(){
  const t=tier();
  let html=`<div class="note">Cashiers raise checkout capacity (fewer lost sales to long lines). Stockers cut spoilage and auto-toss rot. Wages are paid daily.</div>`;
  html+=`<div class="kv"><span class="k">Payroll</span><span class="v">${S.staff.length} / ${t.maxEmp} staff</span></div>`;
  html+=`<div class="kv"><span class="k">Checkout capacity</span><span class="v">${C.CUST_BASE_CAPACITY+countStaff('cashier')*C.CUST_PER_CASHIER} customers/day</span></div>`;
  html+=`<div class="kv"><span class="k">Daily wages</span><span class="v bad-t">${money0(countStaff('cashier')*C.WAGE_CASHIER+countStaff('stocker')*C.WAGE_STOCKER)}</span></div>`;
  html+=`<div style="display:flex;gap:8px;margin:10px 0;"><button class="btn" id="hireCashier" ${S.staff.length>=t.maxEmp?'disabled':''}>+ Cashier (${money0(C.WAGE_CASHIER)}/d)</button><button class="btn" id="hireStocker" ${S.staff.length>=t.maxEmp?'disabled':''}>+ Stocker (${money0(C.WAGE_STOCKER)}/d)</button></div>`;

    S.staff.forEach((e,i)=>{ html+=`<div class="itemRow"><div class="ic">${e.type==='cashier'?'🧑‍💼':'📦'}</div><div class="info"><div class="t">${e.type.charAt(0).toUpperCase()+e.type.slice(1)}</div><div class="d">Hired day ${e.hireDay} · ${S.day-e.hireDay} days tenure</div></div><div class="act"><button class="btn danger" data-fire="${i}">Fire</button></div></div>`; });

  html+=`<div class="kv"><span class="k">Loan balance</span><span class="v ${S.loan>0?'bad-t':''}">${money(S.loan)}</span></div>`;
  html+=`<div style="display:flex;gap:8px;margin-top:8px;"><button class="btn alt" id="loanBtn">Take ${money0(C.LOAN_INCREMENT)} loan</button><button class="btn" id="repayBtn" ${S.loan<=0||S.cash<=0?'disabled':''}>Repay loan</button></div>`;
  html+=`<div class="note" style="margin-top:6px;">Interest: ${(C.LOAN_INTEREST*100).toFixed(1)}%/day. Bankruptcy is auto-covered by an emergency loan — no game over.</div>`;

  html+=`<div class="subhd">Lifetime Stats</div>`;
  const s=S.stats;
  html+=statKV('Items sold',s.itemsSold.toLocaleString())+statKV('Items spoiled',s.itemsSpoiled.toLocaleString())+statKV('Customers served',s.customersTotal.toLocaleString())+statKV('Total revenue',money(s.revenue))+statKV('Total profit',money(s.profit))+statKV('Best day revenue',money(s.bestDayRev))+statKV('Best day profit',money(s.bestDayProfit))+statKV('Profit streak',s.profitStreak+' days')+statKV('Vegan items sold',s.veganSold.toLocaleString())+statKV('Banana revenue',money(s.bananaRevenue));
  html+=`<hr class="sep"><button class="btn danger" id="resetBtn" style="width:100%;">🗑️ Reset Game</button>`;
