<text x="221" y="231" font-family="Trebuchet MS, sans-serif" font-size="25" fill="#04181f" text-anchor="middle" font-weight="bold" letter-spacing="1">Hunt &amp; Connect</text>
<text x="220" y="230" font-family="Trebuchet MS, sans-serif" font-size="25" fill="#bdfff0" text-anchor="middle" font-weight="bold" letter-spacing="1">Hunt <tspan fill="#ffd64d">&amp;</tspan> Connect</text>

<text x="220" y="252" font-family="Courier New, monospace" font-size="11" fill="#6fe8c8" text-anchor="middle" letter-spacing="3">SCIENCE · MATH · VOCAB</text>
</svg>