<svg viewBox="0 0 440 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe27a"/>
      <stop offset="0.5" stop-color="#ffc736"/>
      <stop offset="1" stop-color="#f0a512"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4d6"/>
      <stop offset="1" stop-color="#ffd778"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9712f"/>
      <stop offset="1" stop-color="#7e4f1c"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fc24a"/>
      <stop offset="1" stop-color="#3f8b22"/>
    </linearGradient>
  </defs>

  <!-- ===== AWNING / STALL ROOF ===== -->
  <g>
    <!-- roof board -->
    <rect x="44" y="40" width="352" height="22" rx="5" fill="#2f6b2c" stroke="#14380f" stroke-width="3"/>
    <!-- scalloped striped valance -->
    <g stroke="#14380f" stroke-width="2.5">
      <path d="M48 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#e9f0dc"/>
      <path d="M80 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#2f9e3e"/>
      <path d="M112 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#e9f0dc"/>
      <path d="M144 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#2f9e3e"/>
      <path d="M176 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#e9f0dc"/>
      <path d="M208 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#2f9e3e"/>
      <path d="M240 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#e9f0dc"/>
      <path d="M272 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#2f9e3e"/>
      <path d="M304 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#e9f0dc"/>
      <path d="M336 60 h32 v14 a16 16 0 0 1 -32 0 z" fill="#2f9e3e"/>
      <path d="M368 60 h24 v14 a16 16 0 0 1 -24 0 z" fill="#e9f0dc"/>
    </g>
  </g>

  <!-- ===== HANGING PRICE TAG : TYCOON ===== -->
  <g>
    <line x1="318" y1="50" x2="318" y2="92" stroke="#14380f" stroke-width="3"/>
    <g transform="rotate(7 318 96)">
      <path d="M256 96 h118 a10 10 0 0 1 10 10 v34 a10 10 0 0 1 -10 10 h-118 l-20 -27 z"
            fill="url(#tag)" stroke="#b5651d" stroke-width="3.5"/>
      <circle cx="252" cy="123" r="6" fill="#7e4f1c" stroke="#b5651d" stroke-width="2.5"/>
      <text x="318" y="132" text-anchor="middle" font-family="Arial Black, sans-serif"
            font-size="27" font-weight="900" fill="#cc2222" letter-spacing="1">TYCOON</text>
    </g>
  </g>

  <!-- ===== MAIN WORDMARK : GROCERY ===== -->
  <g font-family="Arial Black, sans-serif" font-weight="900" letter-spacing="1.5">
    <text x="221" y="186" text-anchor="middle" font-size="74"
          fill="#14380f">GROCERY</text>
    <text x="218" y="183" text-anchor="middle" font-size="74"
          fill="url(#gold)" stroke="#14380f" stroke-width="3.5"
          paint-order="stroke" stroke-linejoin="round">GROCERY</text>
  </g>

  <!-- ===== STALL COUNTER WITH PRODUCE ===== -->
  <g>
    <!-- counter ledge -->
    <rect x="92" y="206" width="256" height="20" rx="5" fill="url(#wood)" stroke="#4d2f10" stroke-width="3"/>
    <rect x="92" y="224" width="256" height="10" rx="3" fill="#5f3a14" stroke="#4d2f10" stroke-width="3"/>

    <!-- produce sitting on counter -->
    <!-- leaf greens -->
    <path d="M120 206 q-16 -22 6 -30 q-2 18 14 20 q-6 12 -20 10 z" fill="url(#leaf)" stroke="#14380f" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- orange -->
    <circle cx="150" cy="194" r="14" fill="#ff9b2e" stroke="#14380f" stroke-width="3"/>
    <path d="M150 180 q4 -5 8 -3" fill="none" stroke="#3f8b22" stroke-width="3" stroke-linecap="round"/>
    <!-- red apple -->
    <path d="M178 196 a13 13 0 1 1 26 0 q0 12 -13 13 q-13 -1 -13 -13 z" fill="#e23b2e" stroke="#14380f" stroke-width="3" stroke-linejoin="round"/>
    <path d="M191 183 q1 -7 9 -8" fill="none" stroke="#7e4f1c" stroke-width="3" stroke-linecap="round"/>
    <path d="M199 178 q8 -3 9 4 q-8 2 -9 -4 z" fill="url(#leaf)" stroke="#14380f" stroke-width="2"/>

    <!-- coins stack on right -->
    <g stroke="#9a6a08" stroke-width="2.5">
      <ellipse cx="312" cy="202" rx="22" ry="8" fill="#f0a512"/>
      <ellipse cx="312" cy="196" rx="22" ry="8" fill="#ffc736"/>
      <ellipse cx="312" cy="190" rx="22" ry="8" fill="#ffe27a"/>
    </g>
    <text x="312" y="195" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#9a6a08">$</text>
  </g>

  <!-- ===== TAGLINE PLATE ===== -->
  <g>
    <rect x="138" y="244" width="164" height="26" rx="13" fill="#cc2222" stroke="#14380f" stroke-width="3"/>
    <text x="220" y="262" text-anchor="middle" font-family="Trebuchet MS, sans-serif"
          font-size="13" font-weight="bold" fill="#fff4d6" letter-spacing="2">BUILD YOUR EMPIRE</text>
  </g>
</svg>