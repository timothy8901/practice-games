<svg viewBox="0 0 440 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tic Tac Toe Jutsu — anime trivia">
  <defs>
    <linearGradient id="ttj-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc24a"/>
      <stop offset="0.5" stop-color="#ff8a1e"/>
      <stop offset="1" stop-color="#ef6a0c"/>
    </linearGradient>
    <linearGradient id="ttj-ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2a3138"/>
      <stop offset="0.5" stop-color="#454f58"/>
      <stop offset="1" stop-color="#2a3138"/>
    </linearGradient>
    <linearGradient id="ttj-steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3f7"/>
      <stop offset="1" stop-color="#9aa9b5"/>
    </linearGradient>
  </defs>

  <!-- kicker -->
  <text x="220" y="27" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="13" letter-spacing="5" fill="#f0c98a">&#9733;  ANIME TRIVIA  &#9733;</text>

  <!-- headband ribbon swooping behind the emblem -->
  <path d="M28 102 C70 76 130 76 160 90 L160 124 C120 110 70 110 30 136 Z" fill="url(#ttj-ribbon)" stroke="#10151a" stroke-width="3" stroke-linejoin="round"/>
  <path d="M412 102 C370 76 310 76 280 90 L280 124 C320 110 370 110 410 136 Z" fill="url(#ttj-ribbon)" stroke="#10151a" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="100" cy="119" r="5" fill="#cc2222" stroke="#10151a" stroke-width="2"/>
  <circle cx="340" cy="119" r="5" fill="#cc2222" stroke="#10151a" stroke-width="2"/>

  <!-- emblem: 3x3 grid plate with mixed-anime marks -->
  <g>
    <rect x="172" y="52" width="96" height="96" rx="10" fill="#1b2026" stroke="#10151a" stroke-width="4"/>
    <g stroke="#ff8a1e" stroke-width="4" stroke-linecap="round">
      <line x1="204" y1="60" x2="204" y2="140"/>
      <line x1="236" y1="60" x2="236" y2="140"/>
      <line x1="180" y1="84" x2="260" y2="84"/>
      <line x1="180" y1="116" x2="260" y2="116"/>
    </g>

    <!-- top-left: orange chakra swirl -->
    <path d="M188 68 a8 8 0 1 1 -1 11 a4.5 4.5 0 1 0 0.5 -6.5" fill="none" stroke="#ff8a1e" stroke-width="3.2" stroke-linecap="round"/>
    <!-- top-right: blue chakra swirl -->
    <path d="M252 68 a8 8 0 1 1 -1 11 a4.5 4.5 0 1 0 0.5 -6.5" fill="none" stroke="#3f9ae0" stroke-width="3.2" stroke-linecap="round"/>

    <!-- center: steel shuriken (X) -->
    <g transform="translate(220 100)">
      <path d="M0 -14 L4.5 -4.5 L14 0 L4.5 4.5 L0 14 L-4.5 4.5 L-14 0 L-4.5 -4.5 Z" fill="url(#ttj-steel)" stroke="#10151a" stroke-width="2"/>
      <circle r="3.2" fill="#1b2026" stroke="#10151a" stroke-width="1"/>
    </g>

    <!-- bottom-left: green shuriken (X) -->
    <g transform="translate(188 132)">
      <path d="M0 -11 L3.6 -3.6 L11 0 L3.6 3.6 L0 11 L-3.6 3.6 L-11 0 L-3.6 -3.6 Z" fill="#2f9e58" stroke="#10151a" stroke-width="1.8"/>
      <circle r="2.3" fill="#10151a"/>
    </g>
    <!-- bottom-right: red chakra swirl -->
    <path d="M252 132 a8 8 0 1 1 -1 11 a4.5 4.5 0 1 0 0.5 -6.5" fill="none" stroke="#cc2222" stroke-width="3.2" stroke-linecap="round"/>
  </g>

  <!-- JUTSU wordmark -->
  <text x="220" y="211" text-anchor="middle" font-family="Impact, 'Arial Narrow', sans-serif" font-size="66" letter-spacing="3" fill="#10151a" stroke="#10151a" stroke-width="8" stroke-linejoin="round" paint-order="stroke">JUTSU</text>
  <text x="220" y="211" text-anchor="middle" font-family="Impact, 'Arial Narrow', sans-serif" font-size="66" letter-spacing="3" fill="url(#ttj-orange)" stroke="#7a2e00" stroke-width="1.5" paint-order="stroke">JUTSU</text>

  <!-- TIC TAC TOE banner -->
  <rect x="92" y="230" width="256" height="40" rx="8" fill="#cc2222" stroke="#10151a" stroke-width="3.5"/>
  <rect x="92" y="230" width="256" height="13" rx="8" fill="#ffffff" opacity="0.16"/>
  <text x="220" y="259" text-anchor="middle" font-family="Impact, 'Arial Narrow', sans-serif" font-size="29" letter-spacing="6" fill="#fff3e6" stroke="#10151a" stroke-width="3" stroke-linejoin="round" paint-order="stroke">TIC TAC TOE</text>
</svg>
