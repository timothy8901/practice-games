<svg viewBox="0 0 440 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Robo Revolution game logo</title>
<desc>Neon cyan and magenta wordmark for the build-a-robot arena battler Robo Revolution, with a robot visor head emblem and gear bolt motif.</desc>
