server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Single-file game — no SPA routing, but fall back to index.html anyway
    location / {
        try_files $uri $uri/ /index.html;
        # Short cache so iterations show up immediately when the image is rebuilt
        add_header Cache-Control "no-cache, must-revalidate";
        # Helpful security defaults; relaxed enough for an inline-SVG game
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Referrer-Policy "no-referrer-when-downgrade";
    }

    # Mobile-friendly: gzip the (large) inline-SVG HTML payload
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Quiet the access log for the healthcheck
    location = / {
        access_log off;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
