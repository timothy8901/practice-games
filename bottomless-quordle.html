<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottomless Quordle</title>
    <style>
        /* ===================== THEME TOKENS ===================== */
        :root {
            --bg: #f7f8fb;
            --bg-grad-1: #eef1f7;
            --bg-grad-2: #f7f8fb;
            --panel: #ffffff;
            --panel-2: #f0f2f7;
            --border: #d3d6de;
            --tile-border: #c4c8d2;
            --tile-border-filled: #8d93a3;
            --text: #1a1c22;
            --text-dim: #6b7280;
            --text-on-color: #ffffff;
            --correct: #2fa35a;
            --present: #d9a31f;
            --absent: #8a8f9c;
            --key-bg: #e3e6ee;
            --key-text: #1a1c22;
            --accent: #5b6cff;
            --accent-soft: rgba(91,108,255,0.14);
            --shadow: 0 10px 30px rgba(20,25,45,0.10);
            --shadow-sm: 0 2px 6px rgba(20,25,45,0.08);
        }
        html.dark {
            --bg: #0f1115;
            --bg-grad-1: #161a22;
            --bg-grad-2: #0d0f14;
            --panel: #181b22;
            --panel-2: #1f232c;
            --border: #2c313c;
            --tile-border: #3a4150;
            --tile-border-filled: #5b6473;
            --text: #f3f4f6;
            --text-dim: #9aa1b1;
            --text-on-color: #ffffff;
            --correct: #2fae5e;
            --present: #d6a623;
            --absent: #4a5060;
            --key-bg: #343b48;
            --key-text: #f3f4f6;
            --accent: #7d8bff;
            --accent-soft: rgba(125,139,255,0.18);
            --shadow: 0 14px 40px rgba(0,0,0,0.45);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(1200px 700px at 50% -10%, var(--bg-grad-1), var(--bg-grad-2)) fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px 10px 24px;
            transition: background-color .3s ease, color .3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .wrap { width: 100%; max-width: 560px; }

        /* ===================== HEADER ===================== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 6px 4px 12px;
        }
        .title {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-weight: 800;
            letter-spacing: -0.02em;
            font-size: clamp(1.25rem, 5vw, 1.8rem);
            line-height: 1;
        }
        .title .dot { color: var(--accent); }
        .title .sub {
            font-size: .62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .15em;
            color: var(--text-dim);
        }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            width: 40px; height: 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            transition: transform .12s ease, background-color .2s ease, border-color .2s ease;
        }
        .icon-btn:hover { border-color: var(--accent); }
        .icon-btn:active { transform: scale(0.9); }

        /* ===================== STATS BAR ===================== */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px 6px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .stat .num {
            font-size: clamp(1.05rem, 4.5vw, 1.35rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.01em;
        }
        .stat .lbl {
            font-size: .58rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-dim);
            margin-top: 2px;
            font-weight: 600;
        }
        .stat.pulse .num { animation: numPulse .5s ease; }
        @keyframes numPulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.3); color: var(--correct); }
            100% { transform: scale(1); }
        }

        /* ===================== BOARDS ===================== */
        #boards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .quad {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow .3s ease, border-color .3s ease, transform .2s ease;
            overflow: hidden;
        }
        .quad-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            min-height: 16px;
        }
        .quad-num {
            font-size: .6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-dim);
        }
        .quad-word {
            font-size: .62rem;
            font-weight: 800;
            letter-spacing: .12em;
            color: var(--correct);
            opacity: 0;
            transform: translateY(-3px);
            transition: opacity .3s ease, transform .3s ease;
        }
        .quad.solved .quad-word { opacity: 1; transform: translateY(0); }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-auto-rows: 1fr;
            gap: 5px;
        }
        .quad.solved {
            border-color: var(--correct);
            box-shadow: 0 0 0 2px var(--correct), var(--shadow-sm);
        }
        .quad.dim { opacity: .55; }

        /* ===================== TILES ===================== */
        .tile {
            position: relative;
            aspect-ratio: 1 / 1;
            width: 100%;
            border-radius: 7px;
            perspective: 600px;
            background: transparent;
        }
        .tile-inner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.95rem, 4.6vw, 1.7rem);
            font-weight: 800;
            text-transform: uppercase;
            user-select: none;
            border: 2px solid var(--tile-border);
            border-radius: 7px;
            color: var(--text);
            background: transparent;
            transform-style: preserve-3d;
            transition: transform .2s ease, border-color .15s ease, background-color .15s ease;
        }
        .tile.filled .tile-inner {
            border-color: var(--tile-border-filled);
            animation: pop .12s ease;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        /* Flip reveal */
        .tile.flip .tile-inner { animation: flipReveal .55s ease forwards; }
        @keyframes flipReveal {
            0%   { transform: rotateX(0deg); }
            49%  { transform: rotateX(90deg); }
            50%  { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
        .tile-inner.correct { background: var(--correct); border-color: var(--correct); color: var(--text-on-color); }
        .tile-inner.present { background: var(--present); border-color: var(--present); color: var(--text-on-color); }
        .tile-inner.absent  { background: var(--absent);  border-color: var(--absent);  color: var(--text-on-color); }

        /* Solve dance */
        .tile.dance .tile-inner { animation: dance .55s ease; }
        @keyframes dance {
            0%   { transform: translateY(0) scale(1); }
            30%  { transform: translateY(-10px) scale(1.06); }
            60%  { transform: translateY(2px) scale(0.98); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Shake (invalid word) */
        .shake { animation: shake .45s cubic-bezier(.36,.07,.19,.97); }
        @keyframes shake {
            10%, 90% { transform: translateX(-1px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }

        /* ===================== KEYBOARD ===================== */
        #keyboard { margin-top: 4px; touch-action: manipulation; }
        .krow {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 7px;
        }
        .key {
            flex: 1 1 0;
            min-width: 0;
            height: 52px;
            border: none;
            border-radius: 9px;
            background: var(--key-bg);
            color: var(--key-text);
            font-weight: 700;
            font-size: clamp(.78rem, 3.6vw, 1rem);
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform .08s ease, background-color .25s ease, color .25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 2px;
        }
        .key.wide { flex: 1.6 1 0; font-size: clamp(.6rem,2.8vw,.8rem); }
        .key:active, .key.pressed { transform: scale(0.92) translateY(1px); }
        .key.correct { background: var(--correct); color: var(--text-on-color); }
        .key.present { background: var(--present); color: var(--text-on-color); }
        .key.absent  { background: var(--absent);  color: var(--text-on-color); }

        /* ===================== TOAST ===================== */
        #toast {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translate(-50%, -120%);
            background: #d23b46;
            color: #fff;
            padding: 11px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: .9rem;
            box-shadow: var(--shadow);
            opacity: 0;
            pointer-events: none;
            transition: transform .3s cubic-bezier(.2,.9,.3,1.2), opacity .3s ease;
            z-index: 50;
            text-align: center;
            max-width: 90vw;
        }
        #toast.show { transform: translate(-50%, 0); opacity: 1; }
        #toast.good { background: var(--correct); }

        /* ===================== CONFETTI ===================== */
        #confetti {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 60;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 9px;
            height: 14px;
            border-radius: 2px;
            will-change: transform, opacity;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0%   { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
        }

        .footer-note {
            text-align: center;
            color: var(--text-dim);
            font-size: .68rem;
            margin-top: 14px;
            letter-spacing: .02em;
        }

        @media (max-width: 380px) {
            .stat .lbl { font-size: .5rem; }
            .key { height: 46px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <!-- Header -->
        <header>
            <div class="title">
                <span>Bottomless<span class="dot">.</span></span>
                <span class="sub">Quordle</span>
            </div>
            <div class="header-actions">
                <button id="theme-btn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">🌙</button>
                <button id="reset-btn" class="icon-btn" title="Reset stats" aria-label="Reset stats">↺</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats">
            <div class="stat" id="stat-streak"><div class="num">0</div><div class="lbl">Streak</div></div>
            <div class="stat" id="stat-best"><div class="num">0</div><div class="lbl">Best</div></div>
            <div class="stat" id="stat-solved"><div class="num">0</div><div class="lbl">Solved</div></div>
            <div class="stat" id="stat-avg"><div class="num">—</div><div class="lbl">Avg Guess</div></div>
        </div>

        <!-- Boards -->
        <main id="boards">
            <div class="quad" id="quad-0">
                <div class="quad-head"><span class="quad-num">Board 1</span><span class="quad-word"></span></div>
                <div class="grid" data-grid="0"></div>
            </div>
            <div class="quad" id="quad-1">
                <div class="quad-head"><span class="quad-num">Board 2</span><span class="quad-word"></span></div>
                <div class="grid" data-grid="1"></div>
            </div>
            <div class="quad" id="quad-2">
                <div class="quad-head"><span class="quad-num">Board 3</span><span class="quad-word"></span></div>
                <div class="grid" data-grid="2"></div>
            </div>
            <div class="quad" id="quad-3">
                <div class="quad-head"><span class="quad-num">Board 4</span><span class="quad-word"></span></div>
                <div class="grid" data-grid="3"></div>
            </div>
        </main>

        <!-- Keyboard -->
        <div id="keyboard"></div>

        <div class="footer-note">Solve all 4 to start a fresh round. It never ends.</div>
    </div>

    <div id="toast"></div>
    <div id="confetti"></div>

    <script>
        // ===================== WORD LISTS =====================
        const SOLUTION_WORDS = [
            "APPLE", "BEACH", "BRAIN", "BREAD", "BRUSH", "CHAIR", "CHEST", "CHORD", "CLICK", "CLOCK",
            "CLOUD", "DANCE", "DIARY", "DREAM", "DRINK", "EARTH", "FLUTE", "GHOST", "GRAPE", "GREEN",
            "HAPPY", "HEART", "HOUSE", "JUICE", "LIGHT", "LUCKY", "MAGIC", "MONEY", "MUSIC", "NIGHT",
            "OCEAN", "PAPER", "PARTY", "PHONE", "PIZZA", "PLANT", "QUIET", "RAINY", "RIVER", "ROBOT",
            "ROCKY", "SHARK", "SHEEP", "SKATE", "SLEEP", "SMILE", "SOUND", "SPACE", "SPORT", "SCORE",
            "STARS", "STORM", "SUNNY", "SWEET", "TABLE", "TIGER", "TRAIN", "WATER", "WHALE", "WHITE",
            "WOMAN", "WORLD", "YACHT", "ZEBRA", "ALIVE", "BLEND", "CARRY", "DATES", "EAGLE", "FABLE",
            "GIANT", "HOTEL", "IMAGE", "JOKER", "KOALA", "LEMON", "MANGO", "NINJA", "OLIVE", "PILOT",
            "QUERY", "RADIO", "SUSHI", "TOAST", "ULTRA", "VIDEO", "WAGON", "XENON", "YUMMY", "ZONAL"
        ];

        // VALID_WORDS will be populated from embedded solutions and optionally an external/local wordlist.
        let VALID_WORDS = new Set(SOLUTION_WORDS.map(w => w.toUpperCase()));

        // Try to load an external wordlist (remote first, then local files) and merge 5-letter words.
        async function loadWordlist() {
            const candidates = [
                'https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt',
                'wordlist_dwyl.txt',
                'wordlist.txt'
            ];
            for (const url of candidates) {
                try {
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const txt = await resp.text();
                    const words = txt
                        .split(/\r?\n/)
                        .map(w => w.trim().toUpperCase())
                        .filter(Boolean)
                        .filter(w => w.length === 5 && /^[A-Z]+$/.test(w));
                    if (words.length > 0) {
                        for (const w of words) VALID_WORDS.add(w);
                        console.log('Loaded wordlist from', url, 'words:', VALID_WORDS.size);
                        return;
                    }
                } catch (err) {
                    console.warn('Could not load wordlist from', url, err);
                }
            }
            console.warn('No external wordlist loaded; using embedded SOLUTION_WORDS only.');
        }

        // ===================== CONSTANTS =====================
        const NUM_BOARDS = 4;
        const NUM_ROWS = 8;
        const WORD_LEN = 5;
        const STATS_KEY = 'bottomlessQuordleStats';
        const THEME_KEY = 'bottomlessQuordleTheme';

        // ===================== GAME STATE =====================
        let targetWords = [];
        let boardSolved = [false, false, false, false];
        let boardLetterStates = [{}, {}, {}, {}]; // per-board letter status
        let currentRow = 0;          // active row index (0..NUM_ROWS-1)
        let currentGuess = "";
        let isProcessing = false;
        let roundOver = false;       // true when all rows used without solving everything

        let stats = {
            streak: 0,
            bestStreak: 0,
            totalSolved: 0,
            totalGuessesOnSolved: 0  // sum of guesses-to-solve, for average
        };

        // ===================== DOM =====================
        const boardEls = [0,1,2,3].map(i => document.getElementById('quad-' + i));
        const gridEls = Array.from(document.querySelectorAll('.grid'));
        const keyboardDiv = document.getElementById('keyboard');
        const toastEl = document.getElementById('toast');
        const confettiEl = document.getElementById('confetti');
        const themeBtn = document.getElementById('theme-btn');
        const resetBtn = document.getElementById('reset-btn');

        const statEls = {
            streak: document.querySelector('#stat-streak .num'),
            best: document.querySelector('#stat-best .num'),
            solved: document.querySelector('#stat-solved .num'),
            avg: document.querySelector('#stat-avg .num')
        };

        // ===================== AUDIO (WebAudio, fail-safe) =====================
        let audioCtx = null;
        function ensureAudio() {
            try {
                if (!audioCtx) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (AC) audioCtx = new AC();
                }
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) { /* ignore */ }
        }
        function beep(freq, dur, type, vol) {
            try {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type || 'sine';
                osc.frequency.value = freq;
                gain.gain.value = 0.0001;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const t = audioCtx.currentTime;
                const v = vol == null ? 0.08 : vol;
                gain.gain.setValueAtTime(0.0001, t);
                gain.gain.exponentialRampToValueAtTime(v, t + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
                osc.start(t);
                osc.stop(t + dur + 0.02);
            } catch (e) { /* ignore */ }
        }
        const Sound = {
            tap()    { beep(330, 0.05, 'square', 0.04); },
            reveal() { beep(440, 0.06, 'sine', 0.05); },
            solve()  {
                try {
                    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.16, 'triangle', 0.07), i * 90));
                } catch (e) { /* ignore */ }
            },
            error()  { beep(160, 0.18, 'sawtooth', 0.05); }
        };

        // ===================== KEYBOARD LAYOUT =====================
        const keyboardLayout = [
            "Q W E R T Y U I O P",
            "A S D F G H J K L",
            "ENTER Z X C V B N M BACK"
        ];

        // ===================== INIT =====================
        async function init() {
            loadTheme();
            loadStats();
            renderStats();
            buildKeyboard();
            buildGrids();
            attachEvents();
            startRound();
            // Load dictionary in background; gameplay works with embedded words immediately.
            try { await loadWordlist(); } catch (e) { console.warn('loadWordlist failed:', e); }
        }

        function buildGrids() {
            gridEls.forEach(grid => {
                grid.innerHTML = '';
                for (let i = 0; i < NUM_ROWS * WORD_LEN; i++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    const inner = document.createElement('div');
                    inner.className = 'tile-inner';
                    tile.appendChild(inner);
                    grid.appendChild(tile);
                }
            });
        }

        function buildKeyboard() {
            keyboardDiv.innerHTML = '';
            keyboardLayout.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'krow';
                row.split(' ').forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    btn.type = 'button';
                    btn.dataset.key = key;
                    if (key === 'ENTER') { btn.classList.add('wide'); btn.textContent = 'Enter'; }
                    else if (key === 'BACK') { btn.classList.add('wide'); btn.textContent = '⌫'; }
                    else { btn.textContent = key; }
                    rowDiv.appendChild(btn);
                });
                keyboardDiv.appendChild(rowDiv);
            });
        }

        function attachEvents() {
            keyboardDiv.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) return;
                ensureAudio();
                handleKey(btn.dataset.key);
            });

            document.addEventListener('keydown', (e) => {
                if (e.metaKey || e.ctrlKey || e.altKey) return;
                ensureAudio();
                if (e.key === 'Enter') { e.preventDefault(); handleKey('ENTER'); }
                else if (e.key === 'Backspace') { e.preventDefault(); handleKey('BACK'); }
                else if (/^[a-zA-Z]$/.test(e.key)) { handleKey(e.key.toUpperCase()); }
            });

            themeBtn.addEventListener('click', toggleTheme);
            resetBtn.addEventListener('click', () => {
                if (confirm('Reset all stats?')) {
                    stats = { streak: 0, bestStreak: 0, totalSolved: 0, totalGuessesOnSolved: 0 };
                    saveStats();
                    renderStats();
                    startRound();
                }
            });
        }

        function handleKey(key) {
            if (isProcessing) return;
            if (roundOver) { startRound(); return; }
            if (key === 'ENTER') submitGuess();
            else if (key === 'BACK') deleteLetter();
            else if (/^[A-Z]$/.test(key)) addLetter(key);
            flashKey(key);
        }

        function flashKey(key) {
            const btn = keyboardDiv.querySelector('button[data-key="' + key + '"]');
            if (!btn) return;
            btn.classList.add('pressed');
            setTimeout(() => btn.classList.remove('pressed'), 110);
        }

        // ===================== ROUND CONTROL =====================
        function startRound() {
            targetWords = [getNewWord(), getNewWord(), getNewWord(), getNewWord()];
            boardSolved = [false, false, false, false];
            boardLetterStates = [{}, {}, {}, {}];
            currentRow = 0;
            currentGuess = "";
            isProcessing = false;
            roundOver = false;

            buildGrids();
            boardEls.forEach(el => {
                el.classList.remove('solved', 'dim');
                el.querySelector('.quad-word').textContent = '';
            });
            resetKeyboardUI();
        }

        function getNewWord() {
            return SOLUTION_WORDS[Math.floor(Math.random() * SOLUTION_WORDS.length)];
        }

        // ===================== INPUT =====================
        function addLetter(letter) {
            if (currentGuess.length < WORD_LEN) {
                currentGuess += letter;
                renderActiveRow(true);
                Sound.tap();
            }
        }

        function deleteLetter() {
            if (currentGuess.length > 0) {
                currentGuess = currentGuess.slice(0, -1);
                renderActiveRow(false);
                Sound.tap();
            }
        }

        function renderActiveRow(justAdded) {
            for (let b = 0; b < NUM_BOARDS; b++) {
                if (boardSolved[b]) continue;
                const grid = gridEls[b];
                for (let c = 0; c < WORD_LEN; c++) {
                    const tile = grid.children[currentRow * WORD_LEN + c];
                    if (!tile) continue;
                    const inner = tile.firstChild;
                    const ch = currentGuess[c] || '';
                    inner.textContent = ch;
                    if (ch) tile.classList.add('filled');
                    else tile.classList.remove('filled');
                }
            }
            // Pop animation only on the newly added tile (board 0 reference is fine; class is on all)
            if (justAdded) {
                const idx = currentGuess.length - 1;
                for (let b = 0; b < NUM_BOARDS; b++) {
                    if (boardSolved[b]) continue;
                    const tile = gridEls[b].children[currentRow * WORD_LEN + idx];
                    if (tile) {
                        tile.classList.remove('filled');
                        void tile.offsetWidth;
                        tile.classList.add('filled');
                    }
                }
            }
        }

        // ===================== SUBMIT =====================
        async function submitGuess() {
            if (isProcessing) return;
            if (currentGuess.length !== WORD_LEN) {
                shakeActiveRow();
                showToast('Not enough letters');
                Sound.error();
                return;
            }
            if (!VALID_WORDS.has(currentGuess)) {
                shakeActiveRow();
                showToast('Not in word list');
                Sound.error();
                return;
            }

            isProcessing = true;
            const guess = currentGuess;
            const rowIndex = currentRow;
            const newlySolved = [];

            // Compute feedback and animate each board (boards animate together; cols staggered)
            const tasks = [];
            for (let b = 0; b < NUM_BOARDS; b++) {
                if (boardSolved[b]) continue;
                const feedback = getGuessFeedback(guess, targetWords[b]);
                // Update per-board keyboard letter states
                feedback.forEach((status, i) => updateLetterState(b, guess[i], status));
                tasks.push(revealRow(b, rowIndex, guess, feedback));
                if (guess === targetWords[b]) newlySolved.push(b);
            }
            await Promise.all(tasks);

            updateKeyboardUI();

            // Handle newly solved boards
            for (const b of newlySolved) {
                boardSolved[b] = true;
                markBoardSolved(b, targetWords[b]);
                // stats: record a solve (guesses used = rowIndex + 1)
                stats.totalSolved += 1;
                stats.totalGuessesOnSolved += (rowIndex + 1);
            }

            if (newlySolved.length > 0) {
                Sound.solve();
                renderStats(true);
                saveStats();
            }

            currentRow += 1;
            currentGuess = "";

            const allSolved = boardSolved.every(Boolean);
            if (allSolved) {
                // Completed the whole round: streak up, celebrate, fresh boards.
                stats.streak += 1;
                if (stats.streak > stats.bestStreak) stats.bestStreak = stats.streak;
                saveStats();
                renderStats(true);
                celebrate();
                showToast('Round complete! +1 streak', true);
                isProcessing = false;
                setTimeout(() => startRound(), 1500);
                return;
            }

            if (currentRow >= NUM_ROWS) {
                // Ran out of rows with boards unsolved: streak breaks, but game continues.
                roundOver = true;
                stats.streak = 0;
                saveStats();
                renderStats();
                revealUnsolved();
                showToast('Out of guesses — tap any key for a new round');
                Sound.error();
            }

            isProcessing = false;
        }

        function getGuessFeedback(guess, target) {
            const feedback = Array(WORD_LEN).fill('absent');
            const targetLetters = target.split('');
            const guessLetters = guess.split('');
            for (let i = 0; i < WORD_LEN; i++) {
                if (guessLetters[i] === targetLetters[i]) {
                    feedback[i] = 'correct';
                    targetLetters[i] = null;
                    guessLetters[i] = null;
                }
            }
            for (let i = 0; i < WORD_LEN; i++) {
                if (guessLetters[i] !== null) {
                    const idx = targetLetters.indexOf(guessLetters[i]);
                    if (idx !== -1) {
                        feedback[i] = 'present';
                        targetLetters[idx] = null;
                    }
                }
            }
            return feedback;
        }

        // Animate a single board's row with staggered 3D flips.
        function revealRow(boardIndex, rowIndex, guess, feedback) {
            return new Promise(resolve => {
                const grid = gridEls[boardIndex];
                let done = 0;
                for (let c = 0; c < WORD_LEN; c++) {
                    const tile = grid.children[rowIndex * WORD_LEN + c];
                    const inner = tile.firstChild;
                    setTimeout(() => {
                        tile.classList.remove('filled');
                        tile.classList.add('flip');
                        if (boardIndex === 0) Sound.reveal();
                        // Apply color at the midpoint of the flip (when edge-on)
                        setTimeout(() => {
                            inner.textContent = guess[c];
                            inner.classList.remove('correct', 'present', 'absent');
                            inner.classList.add(feedback[c]);
                        }, 275);
                        setTimeout(() => {
                            tile.classList.remove('flip');
                            done++;
                            if (done === WORD_LEN) resolve();
                        }, 560);
                    }, c * 130);
                }
            });
        }

        function markBoardSolved(boardIndex, word) {
            const el = boardEls[boardIndex];
            el.classList.add('solved');
            el.querySelector('.quad-word').textContent = word;
            // Tile dance across the solved word row(s) — animate the last filled row.
            const grid = gridEls[boardIndex];
            const startRow = Math.max(0, currentRow);
            for (let c = 0; c < WORD_LEN; c++) {
                const tile = grid.children[startRow * WORD_LEN + c];
                if (tile) {
                    setTimeout(() => {
                        tile.classList.add('dance');
                        setTimeout(() => tile.classList.remove('dance'), 600);
                    }, c * 90);
                }
            }
        }

        function revealUnsolved() {
            // Show answers on boards that weren't solved.
            for (let b = 0; b < NUM_BOARDS; b++) {
                if (!boardSolved[b]) {
                    boardEls[b].classList.add('dim');
                    const w = boardEls[b].querySelector('.quad-word');
                    w.textContent = targetWords[b];
                    w.style.color = 'var(--present)';
                    boardEls[b].classList.add('solved'); // reuse to reveal the word label
                }
            }
        }

        // ===================== KEYBOARD STATE =====================
        // Best status across the 4 boards: correct > present > absent.
        const STATUS_RANK = { absent: 1, present: 2, correct: 3 };
        function updateLetterState(boardIndex, letter, status) {
            const cur = boardLetterStates[boardIndex][letter];
            if (!cur || STATUS_RANK[status] > STATUS_RANK[cur]) {
                boardLetterStates[boardIndex][letter] = status;
            }
        }

        function bestLetterStatus(letter) {
            let best = null;
            for (let b = 0; b < NUM_BOARDS; b++) {
                if (boardSolved[b]) continue; // ignore solved boards
                const s = boardLetterStates[b][letter];
                if (s && (!best || STATUS_RANK[s] > STATUS_RANK[best])) best = s;
            }
            return best;
        }

        function updateKeyboardUI() {
            keyboardDiv.querySelectorAll('button').forEach(btn => {
                const key = btn.dataset.key;
                if (key === 'ENTER' || key === 'BACK') return;
                btn.classList.remove('correct', 'present', 'absent');
                const s = bestLetterStatus(key);
                if (s) btn.classList.add(s);
            });
        }

        function resetKeyboardUI() {
            keyboardDiv.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('correct', 'present', 'absent');
            });
        }

        // ===================== ANIMATIONS / FEEDBACK =====================
        function shakeActiveRow() {
            for (let b = 0; b < NUM_BOARDS; b++) {
                if (boardSolved[b]) continue;
                const grid = gridEls[b];
                for (let c = 0; c < WORD_LEN; c++) {
                    const tile = grid.children[currentRow * WORD_LEN + c];
                    if (!tile) continue;
                    tile.classList.remove('shake');
                    void tile.offsetWidth;
                    tile.classList.add('shake');
                    setTimeout(() => tile.classList.remove('shake'), 460);
                }
            }
        }

        let toastTimer = null;
        function showToast(msg, good) {
            toastEl.textContent = msg;
            toastEl.classList.toggle('good', !!good);
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        function celebrate() {
            const colors = ['#2fae5e', '#d6a623', '#5b6cff', '#e85d75', '#46c7c7', '#ffffff'];
            const count = 90;
            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
                piece.style.animationDelay = (Math.random() * 0.3) + 's';
                piece.style.transform = 'translateY(-10vh)';
                confettiEl.appendChild(piece);
                setTimeout(() => piece.remove(), 3500);
            }
        }

        // ===================== STATS =====================
        function loadStats() {
            try {
                const raw = localStorage.getItem(STATS_KEY);
                if (raw) {
                    const s = JSON.parse(raw);
                    stats.streak = s.streak || 0;
                    stats.bestStreak = s.bestStreak || 0;
                    stats.totalSolved = s.totalSolved || 0;
                    stats.totalGuessesOnSolved = s.totalGuessesOnSolved || 0;
                }
            } catch (e) { console.warn('loadStats failed', e); }
        }

        function saveStats() {
            try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }
            catch (e) { /* ignore */ }
        }

        function renderStats(pulse) {
            statEls.streak.textContent = stats.streak;
            statEls.best.textContent = stats.bestStreak;
            statEls.solved.textContent = stats.totalSolved;
            const avg = stats.totalSolved > 0
                ? (stats.totalGuessesOnSolved / stats.totalSolved).toFixed(1)
                : '—';
            statEls.avg.textContent = avg;
            if (pulse) {
                ['stat-streak', 'stat-solved'].forEach(id => {
                    const el = document.getElementById(id);
                    el.classList.remove('pulse');
                    void el.offsetWidth;
                    el.classList.add('pulse');
                });
            }
        }

        // ===================== THEME =====================
        function loadTheme() {
            let theme;
            try { theme = localStorage.getItem(THEME_KEY); } catch (e) { theme = null; }
            if (theme === null) {
                theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
            }
            applyTheme(theme);
        }
        function applyTheme(theme) {
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            const next = isDark ? 'light' : 'dark';
            applyTheme(next);
            try { localStorage.setItem(THEME_KEY, next); } catch (e) { /* ignore */ }
        }

        // ===================== GO =====================
        init();
    </script>
</body>
</html>
